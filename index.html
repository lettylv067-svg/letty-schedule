<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#007aff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日程">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>日程管理</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card: rgba(255,255,255,0.82);
    --card-solid: #ffffff;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.1);
    --text: #1c1c1e;
    --text-sec: #8e8e93;
    --text-tri: #aeaeb2;
    --primary: #007aff;
    --primary-soft: rgba(0,122,255,0.08);
    --primary-medium: rgba(0,122,255,0.15);
    --done-c: #34c759;
    --done-bg: rgba(52,199,89,0.08);
    --prog-c: #5856d6;
    --prog-bg: rgba(88,86,214,0.08);
    --info-c: #af52de;
    --info-bg: rgba(175,82,222,0.08);
    --warn-c: #ff9500;
    --warn-bg: rgba(255,149,0,0.08);
    --hl-bg: rgba(255,204,0,0.18);
    --today-glow: rgba(0,122,255,0.06);
    --today-border: #007aff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --shadow-up: 0 -1px 4px rgba(0,0,0,0.04);
    --r: 16px;
    --r-lg: 20px;
    --rs: 12px;
    --r-sm: 8px;
    --danger: #ff3b30;
    --glass: saturate(1.8) blur(20px);
    --trans-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --trans-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); line-height:1.5; min-height:100vh;
    letter-spacing: -0.01em;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ========== HEADER — Apple Glass Bar ========== */
  .header {
    background: rgba(255,255,255,0.72);
    -webkit-backdrop-filter: var(--glass);
    backdrop-filter: var(--glass);
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
    color: var(--text);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display:flex; align-items:center; gap:14px; flex:1; min-width:0; }
  .header-center { display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .header-right { display:flex; align-items:center; gap:14px; flex:1; min-width:0; justify-content:flex-end; }
  .header h1 {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .view-tabs {
    display: flex; gap: 2px;
    background: rgba(118,118,128,0.12); padding: 2px; border-radius: 10px;
  }
  .view-tab {
    padding: 6px 18px; border: none; background: transparent;
    color: var(--text-sec); font-size: 13px; font-weight: 600;
    cursor: pointer; border-radius: 8px; transition: all .25s var(--trans-smooth);
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    background: #fff; color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0.5px 1px rgba(0,0,0,0.06);
  }

  .week-nav { display:flex; align-items:center; gap:8px; }
  .week-nav-btn {
    background: rgba(118,118,128,0.08); border: none; color: var(--primary);
    width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
    font-size: 13px; display:flex; align-items:center; justify-content:center;
    transition: all .2s var(--trans-smooth); font-weight: 600;
  }
  .week-nav-btn:hover { background: var(--primary-soft); }
  .week-nav-btn:active { transform: scale(0.92); }
  .week-label {
    font-size: 13px; color: var(--text);
    background: rgba(118,118,128,0.08);
    padding: 6px 16px; border-radius: 10px; font-weight: 600;
    min-width: 190px; text-align: center;
  }
  .week-today-btn {
    background: var(--primary-soft); border: none; color: var(--primary);
    padding: 6px 14px; border-radius: 10px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all .2s var(--trans-smooth);
  }
  .week-today-btn:hover { background: var(--primary-medium); }
  .week-today-btn:active { transform: scale(0.95); }

  /* ========== MAIN ========== */
  .main { max-width: 1440px; margin: 0 auto; padding: 24px; }

  /* ========== MODULE GRID ========== */
  .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }

  .module-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden; transition: box-shadow .3s var(--trans-smooth);
  }
  .module-card:hover { box-shadow: var(--shadow); }

  .module-head {
    padding: 16px 20px; display:flex; align-items:center; justify-content:space-between;
    border-bottom: 0.5px solid var(--border);
    background: rgba(255,255,255,0.5);
  }
  .module-title { display:flex; align-items:center; gap:10px; }
  .m-emoji { font-size: 22px; }
  .m-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .m-badges { display:flex; gap:6px; align-items:center; }
  .mod-del-btn {
    opacity: 0; transition: opacity 0.2s; cursor: pointer;
    background: none; border: none; font-size: 14px; color: var(--text-tri);
    padding: 2px 6px; border-radius: 6px; margin-left: 4px;
  }
  .mod-del-btn:hover { color: var(--danger); background: rgba(255,59,48,0.08); }
  .module-card:hover .mod-del-btn { opacity: 1; }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 2px 10px; border-radius: 100px;
  }
  .badge.todo-b { background: var(--warn-bg); color: var(--warn-c); }
  .badge.done-b { background: var(--done-bg); color: var(--done-c); }
  .badge.info-b { background: var(--info-bg); color: var(--info-c); }

  .module-body { max-height: 800px; overflow-y: auto; }

  .sec-label {
    padding: 8px 20px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-sec); background: rgba(0,0,0,0.02);
    border-bottom: 0.5px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sec-add-btn {
    background: none; border: 1px dashed var(--border-strong);
    padding: 2px 12px; border-radius: 8px; font-size: 11px;
    color: var(--primary); cursor: pointer; font-weight: 600;
    transition: all .2s var(--trans-smooth);
  }
  .sec-add-btn:hover { background: var(--primary-soft); border-color: var(--primary); }

  /* ========== TODO ROW ========== */
  .row {
    padding: 10px 20px; display:flex; align-items:flex-start; gap: 10px;
    border-bottom: 0.5px solid var(--border); transition: background .2s var(--trans-smooth); position:relative;
  }
  .row:hover { background: rgba(0,0,0,0.02); }
  .row:last-child { border-bottom: none; }
  .row.todo.completed { opacity: .38; }
  .row.todo.completed .row-text { text-decoration: line-through; text-decoration-color: var(--text-tri); }

  .row.todo.today-hl {
    background: var(--today-glow);
    border-left: 3px solid var(--today-border);
  }
  .row.todo.today-hl:hover { background: rgba(0,122,255,0.08); }
  .row.todo.overdue-hl {
    background: rgba(255,59,48,0.06);
    border-left: 3px solid #ff3b30;
  }
  .row.todo.overdue-hl:hover { background: rgba(255,59,48,0.10); }

  .row-cb { margin-top: 2px; flex-shrink: 0; }
  .row-cb input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--primary);
    cursor: pointer; border-radius: 50%;
  }
  .row-body { flex:1; min-width:0; }
  .row-text {
    font-size: 14px; font-weight: 500; word-break:break-word;
    outline: none; border-radius: 6px; padding: 2px 4px; margin: -2px -4px;
    transition: all .2s var(--trans-smooth); line-height: 1.5;
  }
  .draggable-todo .row-text[contenteditable="false"] {
    cursor: grab; user-select: none;
  }
  .draggable-todo .row-text[contenteditable="true"] {
    cursor: text;
  }
  .row-text:focus {
    background: var(--primary-soft);
    box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
  }

  .row-meta { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500;
    letter-spacing: -0.01em;
  }
  .tag.date-tag { background: rgba(0,122,255,0.08); color: var(--primary); }
  .tag.prog-tag { background: var(--prog-bg); color: var(--prog-c); }
  .tag.note-tag { background: rgba(0,0,0,0.04); color: var(--text-sec); }
  .tag.auto-date-tag { background: var(--done-bg); color: var(--done-c); }


  /* Day view: todo list drop zone highlight */
  .day-section.drop-highlight {
    outline: 2px dashed var(--primary);
    outline-offset: -2px;
    background: var(--primary-soft) !important;
  }

  .row.info.highlighted { background: var(--hl-bg) !important; }
  .row.info .row-actions { opacity: 0; transition: opacity .2s; }
  .row.info:hover .row-actions { opacity: 1; }
  .row.info .row-actions:focus-within { opacity: 1; }
  .info-dot { width:6px; height:6px; border-radius:50%; background: var(--info-c); margin-top:10px; flex-shrink:0; }

  /* ========== INFO NOTE — 备忘录/笔记风格 ========== */
  .info-note-area {
    flex: 1; min-width: 0;
    font-size: 13.5px; font-weight: 400; font-family: inherit;
    color: var(--text); line-height: 1.65; word-break: break-word;
    background: transparent; border: none; outline: none;
    resize: none; overflow: hidden;
    padding: 4px 8px; margin: -4px -8px;
    border-radius: 8px;
    transition: background .2s var(--trans-smooth), box-shadow .2s var(--trans-smooth);
    width: 100%;
    min-height: 24px;
    box-sizing: border-box;
  }
  .info-note-area:focus {
    background: rgba(175,82,222,0.04);
    box-shadow: 0 0 0 3px rgba(175,82,222,0.1);
  }
  .info-note-area::placeholder { color: var(--text-tri); font-style: italic; }

  .row-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; flex-shrink:0; margin-top:2px; }
  .row:hover .row-actions { opacity:1; }
  .act-btn {
    background: none; border: 1px solid var(--border-strong);
    width: 26px; height: 26px; border-radius: 8px;
    cursor: pointer; display:flex; align-items:center; justify-content:center;
    font-size: 12px; color: var(--text-sec); transition: all .2s var(--trans-smooth);
  }
  .act-btn:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .act-btn.hl-on { background: var(--hl-bg); border-color: #ffcc00; color: #a16207; }
  .act-btn.del:hover { background: rgba(255,59,48,0.08); border-color: var(--danger); color: var(--danger); }
  .act-btn.date-btn { opacity: 0; font-size: 11px; border: none; }
  .row:hover .act-btn.date-btn { opacity: 1; }

  .more-info-btn {
    display:flex; align-items:center; justify-content:center; gap:4px;
    padding: 8px 20px; margin: 4px 16px 12px;
    cursor:pointer; transition:all .2s var(--trans-smooth);
    font-size: 11px; font-weight: 500; color: var(--text-tri);
    border: none; background: none;
  }
  .more-info-btn:hover { color: var(--text-sec); }

  .prev-info-block { margin: 2px 16px 8px; }
  .prev-info-header {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 6px 4px; font-size: 11px; color: var(--text-tri);
    user-select: none;
  }
  .prev-info-header:hover { color: var(--text-sec); }
  .prev-info-arrow { font-size: 9px; }
  .prev-info-label { font-weight: 500; }

  .info-week-label {
    font-size: 10px; color: var(--text-tri); font-weight: 600;
    padding: 6px 20px 2px; letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* ========== ADD MODULE CARD ========== */
  .add-module-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 2px dashed var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    min-height: 160px; cursor: pointer;
    transition: border-color .3s var(--trans-smooth), background .3s var(--trans-smooth);
    flex-direction: column; gap: 10px;
  }
  .add-module-card:hover { border-color: var(--primary); background: var(--primary-soft); }
  .add-module-card .add-icon {
    width: 44px; height: 44px; border-radius: 14px;
    background: var(--primary-soft); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 300; transition: all .3s var(--trans-spring);
  }
  .add-module-card:hover .add-icon { background: var(--primary); color: #fff; transform: scale(1.08); }
  .add-module-card .add-text { font-size: 13px; font-weight: 600; color: var(--text-sec); }
  .add-module-card:hover .add-text { color: var(--primary); }

  /* ========== ADD MODULE MODAL ========== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; transition: opacity .25s var(--trans-smooth);
    pointer-events: none;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-box {
    background: var(--card-solid); border-radius: var(--r-lg);
    padding: 28px 32px; box-shadow: var(--shadow-lg);
    max-width: 420px; width: 90%; text-align: center;
    transform: scale(0.92) translateY(20px);
    transition: transform .35s var(--trans-spring), opacity .25s var(--trans-smooth);
    opacity: 0;
  }
  .modal-overlay.active .modal-box { transform: scale(1) translateY(0); opacity: 1; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-subtitle { font-size: 13px; color: var(--text-sec); margin-bottom: 20px; }

  .emoji-picker {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-bottom: 20px; padding: 12px;
    background: rgba(0,0,0,0.02); border-radius: var(--rs);
  }
  .emoji-opt {
    width: 42px; height: 42px; border: 2px solid transparent;
    border-radius: 12px; background: rgba(0,0,0,0.03);
    font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s var(--trans-spring);
  }
  .emoji-opt:hover { background: rgba(0,122,255,0.08); transform: scale(1.1); }
  .emoji-opt.selected { border-color: var(--primary); background: var(--primary-soft); transform: scale(1.12); }

  .modal-input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border-strong);
    border-radius: var(--rs); font-size: 15px; font-weight: 500;
    outline: none; transition: all .2s var(--trans-smooth);
    background: rgba(0,0,0,0.02); color: var(--text);
    font-family: inherit;
  }
  .modal-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
    background: #fff;
  }
  .modal-input::placeholder { color: var(--text-tri); }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
  .modal-btn {
    padding: 10px 28px; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all .2s var(--trans-smooth);
    font-family: inherit;
  }
  .modal-btn:active { transform: scale(0.96); }
  .modal-btn.cancel { background: rgba(118,118,128,0.12); color: var(--text); }
  .modal-btn.cancel:hover { background: rgba(118,118,128,0.18); }
  .modal-btn.confirm { background: var(--primary); color: #fff; }
  .modal-btn.confirm:hover { background: #0066d6; }
  .modal-btn.confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ========== INFO DETAIL PAGE ========== */
  .page-main { display:block; }
  .page-info-detail { display:none; }
  body.show-info-detail .page-main { display:none; }
  body.show-info-detail .page-info-detail { display:block; }

  .info-detail-header {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    padding: 20px 28px; margin-bottom: 20px; box-shadow: var(--shadow-sm);
    display:flex; align-items:center; gap:16px;
  }
  .info-back-btn {
    width: 38px; height: 38px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 16px;
    display:flex; align-items:center; justify-content:center;
    transition: all .2s var(--trans-smooth); flex-shrink: 0; color: var(--primary);
  }
  .info-back-btn:hover { background: var(--primary-soft); border-color: var(--primary); }
  .info-detail-title { display:flex; align-items:center; gap:10px; }
  .info-detail-title .big-emoji { font-size: 28px; }
  .info-detail-title .title-name { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .info-detail-title .title-sub { font-size: 13px; color: var(--text-sec); margin-left: 2px; }

  .info-detail-add {
    margin-left: auto;
    padding: 10px 22px; border: none; background: var(--primary);
    border-radius: var(--rs); font-size: 13px; font-weight: 600;
    color: #fff; cursor: pointer; transition: all .2s var(--trans-smooth);
    font-family: inherit;
  }
  .info-detail-add:hover { background: #0066d6; }
  .info-detail-add:active { transform: scale(0.96); }

  .info-wk-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 16px;
  }
  .info-wk-header {
    padding: 12px 24px; display:flex; align-items:center; gap:10px;
    background: var(--info-bg); border-bottom: 0.5px solid rgba(175,82,222,0.1);
    font-size: 13px; font-weight: 700; color: var(--info-c);
  }
  .info-wk-header::before {
    content:''; display:inline-block; width:8px; height:8px;
    border-radius:50%; background: var(--info-c); flex-shrink:0;
  }
  .info-wk-header .range { color: var(--text-sec); font-weight: 500; font-size: 12px; }
  .info-wk-body .info-row {
    padding: 12px 24px 12px 42px; display:flex; align-items:flex-start; gap:10px;
    border-bottom: 0.5px solid var(--border); transition: background .2s; position: relative;
  }
  .info-wk-body .info-row:hover { background: rgba(0,0,0,0.02); }
  .info-wk-body .info-row:last-child { border-bottom:none; }
  .info-wk-body .info-row.highlighted { background: var(--hl-bg) !important; }
  .info-wk-body .info-row .dot {
    position: absolute; left: 24px; top: 18px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--info-c);
  }
  .info-wk-body .info-row .i-text {
    flex:1; font-size: 13.5px; font-weight: 400; font-family: inherit;
    color: var(--text); line-height: 1.65;
    word-break: break-word; outline: none; border: none;
    background: transparent; resize: none; overflow: hidden;
    border-radius: 8px; padding: 4px 8px; margin: -4px -8px;
    transition: background .2s var(--trans-smooth), box-shadow .2s var(--trans-smooth);
    width: 100%; min-height: 24px; box-sizing: border-box;
  }
  .info-wk-body .info-row .i-text:focus {
    background: rgba(175,82,222,0.04);
    box-shadow: 0 0 0 3px rgba(175,82,222,0.1);
  }
  .info-wk-body .info-row .i-text::placeholder { color: var(--text-tri); font-style: italic; }
  .info-wk-body .info-row .i-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; flex-shrink:0; }
  .info-wk-body .info-row:hover .i-actions { opacity:1; }

  .info-empty-page { text-align:center; padding:60px; color: var(--text-sec); }
  .info-empty-page .big-icon { font-size: 48px; margin-bottom: 12px; }

  /* ========== DAY VIEW ========== */
  .day-view { display:none; }
  .day-view.active { display:block; }
  .week-view { display:none; }
  .week-view.active { display:block; }
  .ai-view { display:none; }
  .ai-view.active { display:block; }

  .day-header {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    padding: 24px 28px; margin-bottom: 20px; box-shadow: var(--shadow-sm);
    display:flex; align-items:center; justify-content:space-between;
  }
  .day-date {
    font-size: 28px; font-weight: 800; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .day-sub { font-size: 13px; color: var(--text-sec); margin-top: 2px; font-weight: 500; }
  .day-nav { display:flex; gap:8px; }
  .day-nav button {
    width: 36px; height: 36px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 14px;
    display:flex; align-items:center; justify-content:center;
    transition: all .2s var(--trans-smooth); color: var(--primary); font-weight: 600;
  }
  .day-nav button:hover { background: var(--primary-soft); border-color: var(--primary); }
  .day-nav button:active { transform: scale(0.92); }
  .day-nav .day-today-btn { width: auto; padding: 0 14px; font-size: 13px; }
  .day-nav .day-cal-btn { font-size: 16px; background: none; border: none; cursor: pointer; width: 36px; height: 36px; display:flex; align-items:center; justify-content:center; border-radius: var(--rs); transition: background .2s; }
  .day-nav .day-cal-btn:hover { background: var(--primary-soft); }

  /* Week header card — compact nav inside week view */
  .week-header-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    padding: 14px 20px; margin-bottom: 16px; box-shadow: var(--shadow-sm);
    display: flex; align-items: center; justify-content: space-between;
  }
  .wh-date {
    font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .wh-sub { font-size: 12px; color: var(--text-sec); margin-top: 1px; font-weight: 500; }
  .wh-right { display: flex; gap: 6px; align-items: center; }
  .wh-nav-btn {
    width: 32px; height: 32px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s var(--trans-smooth); color: var(--primary); font-weight: 600;
  }
  .wh-nav-btn:hover { background: var(--primary-soft); border-color: var(--primary); }
  .wh-nav-btn:active { transform: scale(0.92); }
  .wh-today-btn {
    padding: 0 12px; height: 32px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--primary); transition: all .2s var(--trans-smooth);
  }
  .wh-today-btn:hover { background: var(--primary-soft); border-color: var(--primary); }
  .wh-cal-btn {
    width: 32px; height: 32px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s var(--trans-smooth);
  }
  .wh-cal-btn:hover { background: var(--primary-soft); border-color: var(--primary); }

  /* Mini calendar popover */
  .mini-cal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 999; }
  .mini-cal {
    position: fixed; z-index: 1000;
    background: var(--card-solid); border: 0.5px solid var(--border);
    border-radius: var(--r-lg); box-shadow: var(--shadow-lg);
    padding: 12px; width: 260px;
  }
  .mini-cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 4px;
  }
  .mini-cal-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .mini-cal-nav { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--primary); padding: 4px 8px; border-radius: 6px; }
  .mini-cal-nav:hover { background: var(--primary-soft); }
  .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .mini-cal-dow { font-size: 10px; color: var(--text-tri); font-weight: 600; padding: 4px 0; }
  .mini-cal-day {
    font-size: 12px; padding: 6px 0; border-radius: 6px; cursor: pointer;
    transition: background .15s; color: var(--text); font-weight: 500;
  }
  .mini-cal-day:hover { background: var(--primary-soft); }
  .mini-cal-day.today { background: var(--primary); color: #fff; font-weight: 700; }
  .mini-cal-day.today:hover { background: #0066d6; }
  .mini-cal-day.selected { background: rgba(0,122,255,0.12); color: var(--primary); font-weight: 700; }
  .mini-cal-day.other-month { color: var(--text-tri); }
  .mini-cal-day.empty { cursor: default; }

  .day-section {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 16px;
  }
  .day-section-head {
    padding: 14px 20px; border-bottom: 0.5px solid var(--border);
    display:flex; align-items:center; gap:10px; justify-content: space-between;
    background: rgba(255,255,255,0.5);
  }
  .day-section-head-left { display: flex; align-items: center; gap: 10px; }
  .day-section-head .sec-add-btn { margin-left: auto; }

  .empty-day { text-align:center; padding:60px; color: var(--text-sec); font-size: 14px; }
  .empty-day .big-emoji { font-size: 48px; margin-bottom: 12px; }

  /* ========== DAY VIEW — ADD TODO QUICK BAR (inside todo section) ========== */
  .day-add-bar {
    padding: 12px 20px; display: flex; align-items: center; gap: 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .day-add-bar .add-label { font-size: 13px; font-weight: 600; color: var(--text-sec); white-space: nowrap; }
  .day-add-select {
    padding: 8px 12px; border: 1px solid var(--border-strong);
    border-radius: var(--rs); font-size: 13px; font-weight: 500;
    background: rgba(0,0,0,0.02); color: var(--text); outline: none;
    font-family: inherit; cursor: pointer;
    transition: border-color .2s;
  }
  .day-add-select:focus { border-color: var(--primary); }
  .day-add-input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border-strong);
    border-radius: var(--rs); font-size: 14px; font-weight: 500;
    outline: none; background: rgba(0,0,0,0.02); color: var(--text);
    font-family: inherit; transition: all .2s var(--trans-smooth);
  }
  .day-add-input:focus {
    border-color: var(--primary); background: #fff;
    box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
  }
  .day-add-input::placeholder { color: var(--text-tri); }
  .day-add-submit {
    padding: 10px 20px; border: none; background: var(--primary);
    color: #fff; border-radius: var(--rs); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s var(--trans-smooth); font-family: inherit;
    white-space: nowrap;
  }
  .day-add-submit:hover { background: #0066d6; }
  .day-add-submit:active { transform: scale(0.95); }

  /* ========== SCROLLBAR ========== */
  .module-body::-webkit-scrollbar { width: 4px; }
  .module-body::-webkit-scrollbar-track { background: transparent; }
  .module-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

  /* ========== TOAST ========== */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: rgba(28,28,30,0.88);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    color: #fff; padding: 12px 22px;
    border-radius: 14px; font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow-lg); transform: translateY(80px); opacity: 0;
    transition: all .4s var(--trans-spring); z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ========== CONFIRM ========== */
  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
  }
  .confirm-box {
    background: var(--card-solid); border-radius: var(--r-lg); padding: 28px 32px;
    box-shadow: var(--shadow-lg); max-width: 340px; width: 90%; text-align: center;
  }
  .confirm-box p { font-size: 15px; margin-bottom: 20px; font-weight: 500; line-height: 1.5; }
  .confirm-btns { display:flex; gap:10px; justify-content:center; }
  .confirm-btns button {
    padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all .2s var(--trans-smooth);
    font-family: inherit;
  }
  .confirm-btns button:active { transform: scale(0.96); }
  .btn-cancel { background: rgba(118,118,128,0.12); color: var(--text); }
  .btn-cancel:hover { background: rgba(118,118,128,0.18); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #e0332b; }

  /* ========== DATE PICKER POPOVER ========== */
  .date-picker-popover {
    position: absolute; top: 100%; left: 40px; z-index: 50;
    background: var(--card-solid); border: 0.5px solid var(--border-strong);
    border-radius: var(--rs); box-shadow: var(--shadow-lg);
    padding: 12px; min-width: 220px;
    animation: fadeIn .2s var(--trans-smooth);
  }
  .date-picker-popover .dp-title {
    font-size: 12px; font-weight: 700; color: var(--text-sec);
    margin-bottom: 8px; text-align: center;
  }
  .date-picker-popover .dp-shortcuts {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .date-picker-popover .dp-shortcut {
    padding: 4px 10px; border: 1px solid var(--border-strong); border-radius: 8px;
    font-size: 11px; font-weight: 600; cursor: pointer; background: transparent;
    color: var(--primary); transition: all .15s var(--trans-smooth);
  }
  .date-picker-popover .dp-shortcut:hover { background: var(--primary-soft); border-color: var(--primary); }

  .tag.no-date-tag {
    background: rgba(255,149,0,0.08); color: var(--warn-c);
    cursor: pointer; border: 1px dashed rgba(255,149,0,0.3);
    transition: all .2s var(--trans-smooth);
  }
  .tag.no-date-tag:hover { background: rgba(255,149,0,0.15); border-style: solid; }

  /* ========== DAY VIEW — TIME SLOTS ========== */
  .time-planner-title {
    font-size: 16px; font-weight: 700; color: var(--text);
    margin: 28px 0 16px; display: flex; align-items: center; gap: 10px;
  }
  .time-planner-title .tp-sub { font-size: 12px; color: var(--text-tri); font-weight: 500; }

  .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }

  .time-slot {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 2px solid transparent;
    box-shadow: var(--shadow-sm); overflow: hidden;
    min-height: 180px; transition: all .25s var(--trans-smooth);
    display: flex; flex-direction: column;
  }
  .time-slot.drag-over {
    border-color: var(--primary);
    box-shadow: var(--shadow), 0 0 0 4px rgba(0,122,255,0.1);
    transform: scale(1.01);
  }
  .time-slot.morning { border-top: 3px solid #ff9500; }
  .time-slot.afternoon { border-top: 3px solid #007aff; }
  .time-slot.evening { border-top: 3px solid #5856d6; }

  .ts-header {
    padding: 14px 16px 10px; display: flex; align-items: center; gap: 8px;
  }
  .ts-icon { font-size: 20px; }
  .ts-label { font-size: 14px; font-weight: 700; }
  .ts-time { font-size: 11px; color: var(--text-tri); font-weight: 500; margin-left: auto; }
  .ts-count {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px;
    margin-left: 6px;
  }
  .morning .ts-label { color: #ff9500; }
  .morning .ts-count { background: rgba(255,149,0,0.08); color: #ff9500; }
  .afternoon .ts-label { color: #007aff; }
  .afternoon .ts-count { background: rgba(0,122,255,0.08); color: #007aff; }
  .evening .ts-label { color: #5856d6; }
  .evening .ts-count { background: rgba(88,86,214,0.08); color: #5856d6; }

  .ts-body { flex: 1; padding: 0 12px 12px; min-height: 80px; }
  .ts-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; min-height: 80px; color: var(--text-tri); font-size: 12px;
    border: 2px dashed var(--border); border-radius: var(--rs);
    padding: 16px; text-align: center; transition: all .2s;
  }
  .time-slot.drag-over .ts-empty {
    border-color: var(--primary); background: var(--primary-soft); color: var(--primary);
  }
  .ts-empty .drop-icon { font-size: 22px; margin-bottom: 4px; }

  .ts-item {
    padding: 8px 12px; margin-bottom: 6px;
    background: rgba(0,0,0,0.02); border: 0.5px solid var(--border);
    border-radius: var(--r-sm); display: flex; align-items: center; gap: 8px;
    transition: all .2s var(--trans-smooth); font-size: 13px;
    cursor: grab;
  }
  .ts-item:active { cursor: grabbing; }
  .ts-item.dragging { opacity: 0.4; }
  .ts-item:hover { background: rgba(0,0,0,0.04); }
  .ts-item .ts-cb { flex-shrink: 0; }
  .ts-item .ts-cb input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; border-radius: 50%;
  }
  .ts-item .ts-mod-tag {
    font-size: 10px; font-weight: 600; color: #fff; white-space: nowrap;
    padding: 1px 6px; border-radius: 4px; background: var(--text-tri);
  }
  .morning .ts-item .ts-mod-tag { background: rgba(255,149,0,0.65); }
  .afternoon .ts-item .ts-mod-tag { background: rgba(0,122,255,0.55); }
  .evening .ts-item .ts-mod-tag { background: rgba(88,86,214,0.55); }
  .ts-item .ts-item-text { flex: 1; font-weight: 500; word-break: break-word; outline: none; border-radius: 4px; padding: 1px 3px; margin: -1px -3px; transition: all .15s; }
  .ts-item .ts-item-text[contenteditable="false"] { cursor: grab; user-select: none; }
  .ts-item .ts-item-text[contenteditable="true"] { cursor: text; background: var(--primary-soft); box-shadow: 0 0 0 2px rgba(0,122,255,0.15); }
  .ts-item.ts-done { opacity: 0.4; }
  .ts-item.ts-done .ts-item-text { text-decoration: line-through; text-decoration-color: var(--text-tri); }
  .ts-item .ts-item-remove {
    background: none; border: none; cursor: pointer; font-size: 11px;
    color: var(--text-tri); opacity: 0; transition: all .15s; padding: 2px 4px; border-radius: 4px;
  }
  .ts-item:hover .ts-item-remove { opacity: 1; }
  .ts-item .ts-item-remove:hover { color: var(--danger); background: rgba(255,59,48,0.08); }

  .ts-item-actions {
    display: flex; align-items: center; gap: 2px; flex-shrink: 0;
  }
  .ts-item-del {
    border: none; background: none; cursor: pointer; font-size: 12px;
    color: var(--text-tri); opacity: 0; transition: all .15s; padding: 2px 4px; border-radius: 4px;
  }
  .ts-item:hover .ts-item-del { opacity: 1; }
  .ts-item .ts-item-del:hover { color: var(--danger); background: rgba(255,59,48,0.08); }
  .ts-item-date {
    border: none; background: none; cursor: pointer; font-size: 11px;
    color: var(--text-tri); opacity: 0; transition: all .15s; padding: 2px 4px; border-radius: 4px;
  }
  .ts-item:hover .ts-item-date { opacity: 1; }
  .ts-item .ts-item-date:hover { background: var(--primary-soft); }

  .ts-add-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px 12px; margin: 4px 0;
    background: transparent; border: 1px dashed var(--border-strong);
    border-radius: var(--r-sm); cursor: pointer; font-size: 11px;
    font-weight: 600; color: var(--text-tri); transition: all .2s var(--trans-smooth);
    width: 100%;
  }
  .ts-add-btn:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-soft); }

  .row.todo.draggable-todo { cursor: grab; }
  .row.todo.draggable-todo:active { cursor: grabbing; }
  .row.todo.dragging { opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; border: none; }

  /* Sort drag indicator */
  .sort-indicator {
    height: 2px; background: var(--primary); border-radius: 1px;
    margin: 0 16px; pointer-events: none;
    animation: fadeIn .15s ease;
  }
  .todo-sort-zone { min-height: 4px; }
  .todo-sort-zone.sort-drag-over { background: rgba(0,122,255,0.03); border-radius: 8px; }

  /* ========== ANIMATIONS ========== */
  .fade-in { animation: fadeIn .35s var(--trans-smooth); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .scale-in { animation: scaleIn .3s var(--trans-spring); }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  /* ========== DATA MANAGEMENT BUTTONS ========== */
  .data-mgmt { display: flex; gap: 6px; align-items: center; }
  .data-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; border: 1px solid var(--border-strong);
    border-radius: var(--r-sm); background: var(--card);
    font-size: 11px; font-weight: 500; color: var(--text-sec);
    cursor: pointer; transition: all .2s var(--trans-smooth);
    white-space: nowrap;
  }
  .data-btn:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-soft); }
  .data-btn .btn-icon { font-size: 13px; }
  .data-btn-import { position: relative; overflow: hidden; }
  .data-btn-import input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0;
  }

  /* ========== VERSION MANAGEMENT ========== */
  .version-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    z-index: 500; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  .version-overlay.active { display: flex; }
  .version-panel {
    background: var(--card-solid); border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg); width: 520px; max-width: 92vw;
    max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
    animation: scaleIn .3s var(--trans-spring);
  }
  .version-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .version-header h2 {
    font-size: 17px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .version-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(118,118,128,0.12); border: none;
    font-size: 14px; color: var(--text-sec); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .version-close:hover { background: rgba(118,118,128,0.2); color: var(--text); }
  .version-body { padding: 8px 0; overflow-y: auto; flex: 1; }
  .version-empty {
    padding: 40px 24px; text-align: center; color: var(--text-tri);
    font-size: 14px;
  }
  .version-item {
    padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: background .15s; position: relative;
  }
  .version-item:hover { background: var(--primary-soft); }
  .version-item.active { background: var(--primary-medium); }
  .version-item-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, rgba(0,122,255,0.1), rgba(88,86,214,0.1));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .version-item-info { flex: 1; min-width: 0; }
  .version-item-time {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .version-item-meta {
    font-size: 12px; color: var(--text-sec); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .version-item-tag {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; white-space: nowrap; flex-shrink: 0;
  }
  .version-item-tag.current {
    background: rgba(52,199,89,0.12); color: #34c759;
  }
  .version-item-tag.auto {
    background: rgba(0,122,255,0.08); color: var(--primary);
  }
  .version-actions {
    padding: 14px 24px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .version-btn {
    padding: 8px 20px; border-radius: 10px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: all .2s;
  }
  .version-btn-preview {
    background: rgba(88,86,214,0.1); color: #5856d6;
  }
  .version-btn-preview:hover { background: rgba(88,86,214,0.18); }
  .version-btn-restore {
    background: var(--primary); color: #fff;
  }
  .version-btn-restore:hover { background: #0066d6; }
  .version-btn-cancel {
    background: rgba(118,118,128,0.12); color: var(--text-sec);
  }
  .version-btn-cancel:hover { background: rgba(118,118,128,0.2); }
  .version-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
  }

  /* Version diff highlights */
  .diff-added {
    border-left: 3px solid #34c759 !important;
    background: rgba(52,199,89,0.06) !important;
    position: relative;
  }
  .diff-added::after {
    content: '找回';
    position: absolute; top: 4px; right: 8px;
    font-size: 10px; font-weight: 700; color: #34c759;
    background: rgba(52,199,89,0.12); padding: 1px 7px; border-radius: 6px;
    pointer-events: none;
  }
  .diff-removed {
    border-left: 3px solid #ff3b30 !important;
    background: rgba(255,59,48,0.06) !important;
    position: relative;
    opacity: 0.55;
  }
  .diff-removed::after {
    content: '未插入';
    position: absolute; top: 4px; right: 8px;
    font-size: 10px; font-weight: 700; color: #ff3b30;
    background: rgba(255,59,48,0.12); padding: 1px 7px; border-radius: 6px;
    pointer-events: none;
  }
  .diff-changed {
    border-left: 3px solid #ff9500 !important;
    background: rgba(255,149,0,0.06) !important;
    position: relative;
  }
  .diff-changed::after {
    content: '有变化';
    position: absolute; top: 4px; right: 8px;
    font-size: 10px; font-weight: 700; color: #ff9500;
    background: rgba(255,149,0,0.12); padding: 1px 7px; border-radius: 6px;
    pointer-events: none;
  }
  /* Diff legend bar inside preview banner */
  .diff-legend {
    display: inline-flex; gap: 14px; margin-left: 16px; font-size: 11px; font-weight: 500;
  }
  .diff-legend-item {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .diff-legend-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  /* Module-level diff badge */
  .diff-mod-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 8px; margin-left: 8px;
  }
  .diff-mod-new { background: rgba(52,199,89,0.12); color: #34c759; }
  .diff-mod-removed { background: rgba(255,59,48,0.12); color: #ff3b30; }

  /* Version preview banner */
  .version-preview-banner {
    display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 400;
    background: linear-gradient(135deg, #5856d6, #007aff);
    color: #fff; padding: 10px 24px; font-size: 13px; font-weight: 600;
    text-align: center; box-shadow: 0 2px 12px rgba(88,86,214,0.3);
  }
  .version-preview-banner.active { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .version-preview-banner button {
    padding: 5px 16px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.15); color: #fff; font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .version-preview-banner button:hover { background: rgba(255,255,255,0.25); }
  .version-preview-banner .vp-restore-btn {
    background: #fff; color: #5856d6; border-color: #fff;
  }
  .version-preview-banner .vp-restore-btn:hover { background: rgba(255,255,255,0.9); }

  /* ========== AUTH — Login / Register ========== */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    transition: opacity .4s var(--trans-smooth);
  }
  .auth-overlay.hidden { opacity: 0; pointer-events: none; }
  .auth-card {
    background: rgba(255,255,255,0.82);
    -webkit-backdrop-filter: saturate(1.8) blur(30px);
    backdrop-filter: saturate(1.8) blur(30px);
    border-radius: 24px; padding: 40px 36px;
    width: 380px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
    animation: authSlideUp .5s var(--trans-spring);
  }
  @keyframes authSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .auth-card h2 {
    font-size: 24px; font-weight: 700; margin-bottom: 6px;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-card .auth-subtitle { color: var(--text-sec); font-size: 14px; margin-bottom: 28px; }
  .auth-input-group { text-align: left; margin-bottom: 16px; }
  .auth-input-group label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-sec);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .auth-input-group input {
    width: 100%; padding: 12px 16px; border: 1.5px solid var(--border-strong);
    border-radius: 12px; font-size: 15px; font-family: inherit;
    background: rgba(255,255,255,0.7); color: var(--text);
    transition: all .2s var(--trans-smooth); outline: none;
  }
  .auth-input-group input:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
  }
  .auth-input-group .auth-hint {
    font-size: 11px; color: var(--text-tri); margin-top: 4px;
  }
  .auth-input-group .auth-error {
    font-size: 12px; color: var(--danger); margin-top: 4px; display: none;
  }
  .auth-btn {
    width: 100%; padding: 13px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, #007aff, #5856d6);
    color: #fff; margin-top: 8px;
    transition: all .2s var(--trans-smooth);
    box-shadow: 0 4px 12px rgba(0,122,255,0.25);
  }
  .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,122,255,0.35); }
  .auth-btn:active { transform: translateY(0) scale(0.98); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .auth-switch {
    margin-top: 20px; font-size: 13px; color: var(--text-sec);
  }
  .auth-switch a {
    color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: none;
  }
  .auth-switch a:hover { text-decoration: underline; }

  /* User avatar in header */
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 12px 4px 6px; border-radius: 20px;
    background: rgba(118,118,128,0.08); cursor: pointer;
    transition: all .2s var(--trans-smooth); position: relative;
  }
  .user-badge:hover { background: rgba(118,118,128,0.15); }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #007aff, #5856d6);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 700;
  }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .user-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--card-solid); border-radius: 12px;
    box-shadow: var(--shadow-lg); padding: 6px;
    min-width: 140px; display: none; z-index: 200;
    border: 0.5px solid var(--border);
  }
  .user-menu.show { display: block; }
  .user-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    color: var(--text); cursor: pointer; transition: background .15s;
  }
  .user-menu-item:hover { background: rgba(118,118,128,0.08); }
  .user-menu-item.danger { color: var(--danger); }

  /* ========== AI SMART INPUT (Tab 视图) ========== */
  .ai-view-inner {
    max-width: 640px; margin: 0 auto; padding: 24px 8px 40px;
  }
  .ai-view-title {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 6px;
  }
  .ai-view-desc {
    font-size: 13px; color: var(--text-tri); margin: 0 0 20px;
  }


  .ai-input-area {
    width: 100%; min-height: 100px; max-height: 200px; resize: none;
    border: 1.5px solid var(--border-strong); border-radius: 14px;
    padding: 14px 16px; font-size: 14px; font-family: inherit;
    line-height: 1.6; color: var(--text); background: rgba(0,0,0,0.02);
    outline: none; transition: all .2s var(--trans-smooth);
  }
  .ai-input-area:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
    background: #fff;
  }
  .ai-input-area::placeholder { color: var(--text-tri); }

  /* AI image upload area */
  .ai-img-zone {
    margin-top: 10px; position: relative;
  }
  .ai-img-drop {
    border: 1.5px dashed var(--border-strong); border-radius: 12px;
    padding: 14px 16px; text-align: center; cursor: pointer;
    color: var(--text-tri); font-size: 12px; line-height: 1.6;
    transition: all .2s var(--trans-smooth);
    background: rgba(0,0,0,0.01);
  }
  .ai-img-drop:hover, .ai-img-drop.dragover {
    border-color: var(--primary); background: var(--primary-soft);
    color: var(--primary);
  }
  .ai-img-drop-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .ai-img-previews {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .ai-img-thumb {
    position: relative; width: 72px; height: 72px; border-radius: 10px;
    overflow: hidden; border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .ai-img-thumb img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .ai-img-thumb .ai-img-remove {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: #fff;
    border: none; cursor: pointer; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s;
  }
  .ai-img-thumb:hover .ai-img-remove { opacity: 1; }

  .ai-input-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; gap: 10px;
  }
  .ai-input-hint { font-size: 11px; color: var(--text-tri); }
  .ai-parse-btn {
    padding: 10px 24px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, #007aff, #5856d6);
    color: #fff; transition: all .2s var(--trans-smooth);
    box-shadow: 0 2px 10px rgba(0,122,255,0.2);
    display: flex; align-items: center; gap: 6px;
  }
  .ai-parse-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,122,255,0.3); }
  .ai-parse-btn:active { transform: scale(0.97); }
  .ai-parse-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .ai-parse-btn .ai-spin { display: inline-block; animation: spin .8s linear infinite; }

  /* API Key config */
  .ai-config-toggle {
    font-size: 11px; color: var(--text-tri); cursor: pointer;
    text-decoration: underline; text-underline-offset: 2px;
    transition: color .2s;
  }
  .ai-config-toggle:hover { color: var(--text-sec); }
  .ai-config-section {
    margin-top: 12px; padding: 14px 16px;
    background: rgba(0,0,0,0.02); border-radius: 12px;
    border: 0.5px solid var(--border); display: none;
  }
  .ai-config-section.show { display: block; }
  .ai-config-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .ai-config-row:last-child { margin-bottom: 0; }
  .ai-config-label {
    font-size: 11px; font-weight: 600; color: var(--text-sec);
    min-width: 60px; text-align: right;
  }
  .ai-config-input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong);
    border-radius: 8px; font-size: 12px; font-family: inherit;
    background: #fff; color: var(--text); outline: none;
    transition: border-color .2s;
  }
  .ai-config-input:focus { border-color: var(--primary); }
  .ai-config-select {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong);
    border-radius: 8px; font-size: 12px; font-family: inherit;
    background: #fff; color: var(--text); outline: none; cursor: pointer;
  }

  /* Preview cards */
  .ai-preview { margin-top: 16px; }
  .ai-preview-title {
    font-size: 13px; font-weight: 700; color: var(--text-sec);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .ai-preview-card {
    background: rgba(0,0,0,0.02); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all .2s;
  }
  .ai-preview-card:hover { border-color: var(--primary); background: var(--primary-soft); }
  .ai-preview-card .ai-pc-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .ai-preview-card .ai-pc-body { flex: 1; min-width: 0; }
  .ai-preview-card .ai-pc-text {
    font-size: 14px; font-weight: 600; color: var(--text);
    word-break: break-word;
  }
  .ai-preview-card .ai-pc-meta {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
  }
  .ai-preview-card .ai-pc-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500;
  }
  .ai-pc-tag.type-todo { background: var(--warn-bg); color: var(--warn-c); }
  .ai-pc-tag.type-info { background: var(--info-bg); color: var(--info-c); }
  .ai-pc-tag.mod-tag { background: rgba(0,122,255,0.08); color: var(--primary); }
  .ai-pc-tag.date-tag { background: var(--done-bg); color: var(--done-c); }
  .ai-preview-card .ai-pc-remove {
    flex-shrink: 0; width: 24px; height: 24px;
    border: none; background: none; color: var(--text-tri);
    cursor: pointer; font-size: 14px; border-radius: 6px;
    transition: all .15s;
  }
  .ai-preview-card .ai-pc-remove:hover { color: var(--danger); background: rgba(255,59,48,0.08); }

  /* 编辑按钮 */
  .ai-pc-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; margin-left: 2px; }
  .ai-pc-edit {
    width: 24px; height: 24px;
    border: none; background: none; color: var(--text-tri);
    cursor: pointer; border-radius: 6px; font-size: 12px;
    transition: all .15s; display: flex; align-items: center; justify-content: center;
  }
  .ai-pc-edit:hover { color: var(--primary); background: var(--primary-soft); }

  /* 编辑表单 */
  .ai-pc-edit-form { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .ai-pc-edit-form input, .ai-pc-edit-form select {
    font-size: 13px; padding: 6px 10px; border: 1px solid var(--border-strong);
    border-radius: 8px; background: var(--card-solid); color: var(--text);
    outline: none; font-family: inherit;
  }
  .ai-pc-edit-form input:focus, .ai-pc-edit-form select:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
  }
  .ai-pc-edit-row { display: flex; gap: 8px; align-items: center; }
  .ai-pc-edit-row label { font-size: 12px; color: var(--text-sec); min-width: 36px; flex-shrink: 0; }
  .ai-pc-edit-row input, .ai-pc-edit-row select { flex: 1; }
  .ai-pc-edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }
  .ai-pc-edit-actions button {
    font-size: 12px; padding: 4px 14px; border-radius: 8px;
    border: none; cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .ai-pc-edit-save { background: var(--primary); color: #fff; }
  .ai-pc-edit-save:hover { opacity: 0.85; }
  .ai-pc-edit-cancel { background: rgba(0,0,0,0.05); color: var(--text-sec); }
  .ai-pc-edit-cancel:hover { background: rgba(0,0,0,0.1); }

  .ai-confirm-bar {
    display: flex; justify-content: flex-end; gap: 10px; margin-top: 14px;
  }
  .ai-confirm-btn {
    padding: 10px 28px; border-radius: 12px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none;
    transition: all .2s var(--trans-smooth);
  }
  .ai-confirm-btn:active { transform: scale(0.96); }
  .ai-confirm-btn.cancel { background: rgba(118,118,128,0.12); color: var(--text); }
  .ai-confirm-btn.cancel:hover { background: rgba(118,118,128,0.18); }
  .ai-confirm-btn.confirm {
    background: linear-gradient(135deg, #34c759, #30b04d);
    color: #fff; box-shadow: 0 2px 10px rgba(52,199,89,0.25);
  }
  .ai-confirm-btn.confirm:hover { box-shadow: 0 4px 16px rgba(52,199,89,0.35); }

  .ai-error-msg {
    margin-top: 12px; padding: 10px 14px; border-radius: 10px;
    background: rgba(255,59,48,0.08); color: var(--danger);
    font-size: 12px; font-weight: 500; display: none;
  }
  .ai-error-msg.show { display: block; }

  /* ========== RESPONSIVE ========== */
  @media (max-width:860px) {
    .module-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 12px; padding: 14px 20px; }
    .main { padding: 16px; }
    .day-add-bar { flex-wrap: wrap; }
    .day-add-bar .add-label { width: 100%; }
    .time-slots { grid-template-columns: 1fr; }
    .data-mgmt { order: -1; width: 100%; justify-content: flex-end; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<!-- ========== AUTH OVERLAY ========== -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card" id="authCard">
    <!-- Login Form -->
    <div id="loginForm">
      <h2>📋 日程管理</h2>
      <p class="auth-subtitle">登录你的账号，开始管理日程</p>
      <div class="auth-input-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="输入用户名" maxlength="20" autocomplete="username">
        <div class="auth-error" id="loginUsernameError"></div>
      </div>
      <div class="auth-input-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
        <div class="auth-error" id="loginPasswordError"></div>
      </div>
      <button class="auth-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
      <div class="auth-switch">没有账号？<a onclick="showRegister()">创建账号</a></div>
    </div>
    <!-- Register Form -->
    <div id="registerForm" style="display:none;">
      <h2>📋 创建账号</h2>
      <p class="auth-subtitle">创建你自己的日程管理空间</p>
      <div class="auth-input-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="中英文皆可，20 字符以内" maxlength="20" autocomplete="username">
        <div class="auth-hint">中英文皆可，20 个字符以内</div>
        <div class="auth-error" id="regUsernameError"></div>
      </div>
      <div class="auth-input-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="至少 6 位" autocomplete="new-password">
        <div class="auth-hint">至少 6 位</div>
        <div class="auth-error" id="regPasswordError"></div>
      </div>
      <div class="auth-input-group">
        <label>确认密码</label>
        <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" autocomplete="new-password">
        <div class="auth-error" id="regConfirmError"></div>
      </div>
      <button class="auth-btn" id="regBtn" onclick="handleRegister()">创建并登录</button>
      <div class="auth-switch">已有账号？<a onclick="showLogin()">返回登录</a></div>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <h1>📋 日程管理</h1>
    <div class="sync-badge" id="syncBadge" style="display:none;"></div>
  </div>
  <div class="header-center">
    <div class="view-tabs">
      <button class="view-tab active" data-view="week" onclick="switchView('week')">周视图</button>
      <button class="view-tab" data-view="day" onclick="switchView('day')">日视图</button>
      <button class="view-tab" data-view="ai" onclick="switchView('ai')">✨ 智能识别</button>
    </div>
  </div>
  <div class="header-right">
    <span id="weekLabel" style="display:none;"></span>
    <div class="data-mgmt">
      <button class="data-btn" onclick="openVersionPanel()" title="查看历史版本"><span class="btn-icon">🕐</span> 版本</button>
      <button class="data-btn" onclick="exportData()" title="导出所有数据为 JSON 备份"><span class="btn-icon">📥</span> 导出</button>
      <label class="data-btn data-btn-import" title="从 JSON 备份文件恢复数据"><span class="btn-icon">📤</span> 导入<input type="file" accept=".json" onchange="importData(event)" /></label>
    </div>
    <div class="user-badge" id="userBadge" onclick="toggleUserMenu()">
      <div class="user-avatar" id="userAvatar"></div>
      <span class="user-name" id="userName"></span>
      <div class="user-menu" id="userMenu">
        <div class="user-menu-item danger" onclick="handleLogout(event)">🚪 退出登录</div>
      </div>
    </div>
  </div>
</div>

<!-- 主内容区 -->
<div class="main page-main" id="pageMain">
  <div class="week-view active" id="weekView"></div>
  <div class="day-view" id="dayView"></div>
  <div class="ai-view" id="aiView">
    <div class="ai-view-inner" id="aiPanel">
      <div class="ai-view-title">✨ 智能识别</div>
      <p class="ai-view-desc">粘贴文字、截图或聊天记录，AI 自动识别并分类为待办/信息</p>

      <textarea class="ai-input-area" id="aiInputArea"
        placeholder="粘贴消息、会议纪要、或直接描述你的待办…&#10;&#10;例如：&#10;· 明天下午3点和产品组开会讨论联想功能方案&#10;· 本周五前完成输入法 V2.3 版本评审材料&#10;· FYI：竞品搜狗上线了 AI 写作功能"></textarea>

<script>
// ================================================================
// DATE UTILS
// ================================================================
const NOW = new Date();
let weekOffset = 0;
let dayOffset = 0;

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function fmtDate(d) { return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'); }

function getCurrentWeekMonday() {
  const mon = getMonday(NOW);
  mon.setDate(mon.getDate() + weekOffset * 7);
  return mon;
}

function getCurrentWeekDates() {
  const mon = getCurrentWeekMonday();
  const dates = [];
  for(let i=0; i<7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    dates.push(fmtDate(d));
  }
  return dates;
}

function getWeekLabel() {
  const mon = getCurrentWeekMonday();
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  let prefix = '';
  if(weekOffset === 0) prefix = '本周 · ';
  else if(weekOffset === -1) prefix = '上周 · ';
  else if(weekOffset === 1) prefix = '下周 · ';
  return `${prefix}${mon.getFullYear()}/${fmtDate(mon)} ~ ${fmtDate(sun)}`;
}

function getWeekLabelForMonday(monDate) {
  const sun = new Date(monDate); sun.setDate(monDate.getDate()+6);
  const thisMon = getMonday(NOW);
  const diff = Math.round((monDate - thisMon) / (7*24*60*60*1000));
  let prefix = '';
  if(diff === 0) prefix = '本周';
  else if(diff === -1) prefix = '上周';
  else if(diff === 1) prefix = '下周';
  else prefix = `${fmtDate(monDate)}周`;
  return `${prefix} · ${fmtDate(monDate)} ~ ${fmtDate(sun)}`;
}

function getTodayStr() { return fmtDate(NOW); }

function dateToObj(dateStr) {
  const m = parseInt(dateStr.split('/')[0]) - 1;
  const d = parseInt(dateStr.split('/')[1]);
  return new Date(NOW.getFullYear(), m, d);
}

function infoInWeek(info, weekDates) {
  if(!info.week) return false;
  const monDate = dateToObj(info.week);
  const mon = getMonday(monDate);
  for(let i=0;i<7;i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    if(weekDates.includes(fmtDate(d))) return true;
  }
  return false;
}

// ================================================================
// TIME AUTO-DETECTION
// ================================================================
function parseTimeFromText(text, referenceMonday) {
  const today = new Date();
  // referenceMonday: the Monday of the week this todo belongs to
  // If provided, "周X" resolves relative to that week, not the current system week
  const baseMon = referenceMonday ? new Date(referenceMonday) : getMonday(today);

  if(/下周/.test(text)) {
    const m2 = text.match(/下周([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5\u5929])/);
    if(m2) {
      const weekDayMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};
      const targetDay = weekDayMap[m2[1]];
      if(targetDay !== undefined) {
        const nextMon = new Date(baseMon);
        nextMon.setDate(nextMon.getDate() + 7);
        const d = new Date(nextMon);
        const offset = targetDay === 0 ? 6 : targetDay - 1;
        d.setDate(nextMon.getDate() + offset);
        return fmtDate(d);
      }
    }
    const nextMon = new Date(baseMon);
    nextMon.setDate(nextMon.getDate() + 7);
    return fmtDate(nextMon);
  }

  const weekDayMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};
  let m = text.match(/(?:周|星期)([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5\u5929])/);
  if(m) {
    const targetDay = weekDayMap[m[1]];
    if(targetDay !== undefined) {
      const d = new Date(baseMon);
      const offset = targetDay === 0 ? 6 : targetDay - 1;
      d.setDate(baseMon.getDate() + offset);
      return fmtDate(d);
    }
  }

  if(/今天/.test(text)) return fmtDate(today);
  if(/明天/.test(text)) { const d=new Date(today);d.setDate(d.getDate()+1);return fmtDate(d); }
  if(/后天/.test(text)) { const d=new Date(today);d.setDate(d.getDate()+2);return fmtDate(d); }
  if(/大后天/.test(text)) { const d=new Date(today);d.setDate(d.getDate()+3);return fmtDate(d); }

  m = text.match(/(\d{1,2})\/(\d{1,2})/);
  if(m) return m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0');

  m = text.match(/(\d{1,2})月(\d{1,2})[日号]/);
  if(m) return m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0');

  return null;
}

function detectDateFromItem(item) {
  // Derive reference Monday from item's week field so "周X" resolves to the correct week
  let refMon = null;
  if(item.week) {
    refMon = getMonday(dateToObj(item.week));
  }
  let detected = parseTimeFromText(item.text || '', refMon);
  if(!detected && item.note) {
    detected = parseTimeFromText(item.note, refMon);
  }
  return detected;
}

function normalizeRelativeTimeInText(text, detectedDate) {
  if(!text || !detectedDate) return text;
  const d = dateToObj(detectedDate);
  const wdNames = ['日','一','二','三','四','五','六'];
  const weekDay = '周' + wdNames[d.getDay()];

  let result = text;
  result = result.replace(/下周([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5\u5929])/, weekDay);
  result = result.replace(/下周(?![一二三四五六日天])/, weekDay);
  result = result.replace(/大后天/, weekDay);
  result = result.replace(/后天/, weekDay);
  result = result.replace(/明天/, weekDay);
  result = result.replace(/今天/, weekDay);

  return result;
}

const AUTH_SESSION_KEY = 'schedule_auth_session';
const USERS_ROW_ID = '_users_registry';
let _currentUser = null; // { username, display_name }

// SHA-256 hash (Web Crypto API)
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Fetch users registry from cloud
async function fetchUsersRegistry() {
  if(!_cloudAvailable || !_supabaseClient) return [];
  try {
    const { data, error } = await _supabaseClient
      .from('schedule_data')
      .select('*')
      .eq('id', USERS_ROW_ID)
      .single();
    if(error || !data || !Array.isArray(data.modules)) return [];
    return data.modules;
  } catch(e) { return []; }
}

// Save users registry to cloud
async function saveUsersRegistry(users) {
  if(!_cloudAvailable || !_supabaseClient) return false;
  try {
    const { error } = await _supabaseClient
      .from('schedule_data')
      .upsert({
        id: USERS_ROW_ID,
        modules: users,
        updated_at: new Date().toISOString()
      });
    return !error;
  } catch(e) { return false; }
}

// Check saved session (7-day expiry)
function getSavedSession() {
  try {
    const raw = localStorage.getItem(AUTH_SESSION_KEY);
    if(!raw) return null;
    const session = JSON.parse(raw);
    if(!session.username || !session.expires_at) return null;
    if(new Date(session.expires_at) < new Date()) {
      localStorage.removeItem(AUTH_SESSION_KEY);
      return null;
    }
    return session;
  } catch(e) { return null; }
}

// Save session (7 days)
function saveSession(username, displayName) {
  const expires = new Date();
  expires.setDate(expires.getDate() + 7);
  localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify({
    username: username,
    display_name: displayName || username,
    expires_at: expires.toISOString()
  }));
}

function clearSession() {
  localStorage.removeItem(AUTH_SESSION_KEY);
}

// Login handler
async function handleLogin() {
  clearAuthErrors();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!username) { showAuthError('loginUsernameError', '请输入用户名'); return; }
  if(!password) { showAuthError('loginPasswordError', '请输入密码'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中…';

  const users = await fetchUsersRegistry();
  const user = users.find(u => u.username === username);
  if(!user) {
    showAuthError('loginUsernameError', '用户不存在');
    btn.disabled = false; btn.textContent = '登 录';
    return;
  }

  const hash = await sha256(password);
  if(hash !== user.password_hash) {
    showAuthError('loginPasswordError', '密码错误');
    btn.disabled = false; btn.textContent = '登 录';
    return;
  }

  // Success
  _currentUser = { username: user.username, display_name: user.display_name || user.username };
  saveSession(_currentUser.username, _currentUser.display_name);
  applyUserContext();
  hideAuthOverlay();
  btn.disabled = false; btn.textContent = '登 录';

  // Boot app data
  await bootAppData();
}

// Register handler
async function handleRegister() {
  clearAuthErrors();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regPasswordConfirm').value;

  if(!username) { showAuthError('regUsernameError', '请输入用户名'); return; }
  if(username.length > 20) { showAuthError('regUsernameError', '用户名不能超过 20 个字符'); return; }
  // Check for invalid chars (allow Chinese, letters, numbers, underscore, hyphen)
  if(!/^[\u4e00-\u9fa5a-zA-Z0-9_-]+$/.test(username)) {
    showAuthError('regUsernameError', '用户名只能包含中文、英文、数字、下划线、连字符');
    return;
  }
  if(!password) { showAuthError('regPasswordError', '请输入密码'); return; }
  if(password.length < 6) { showAuthError('regPasswordError', '密码至少 6 位'); return; }
  if(password !== confirm) { showAuthError('regConfirmError', '两次密码不一致'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '创建中…';

  const users = await fetchUsersRegistry();
  if(users.find(u => u.username === username)) {
    showAuthError('regUsernameError', '用户名已被占用');
    btn.disabled = false; btn.textContent = '创建并登录';
    return;
  }

  const hash = await sha256(password);
  users.push({
    username: username,
    password_hash: hash,
    display_name: username,
    created_at: new Date().toISOString()
  });

  const saved = await saveUsersRegistry(users);
  if(!saved) {
    showAuthError('regUsernameError', '网络错误，请稍后重试');
    btn.disabled = false; btn.textContent = '创建并登录';
    return;
  }

  // Create starter schedule data for new user (demo modules)
  if(_cloudAvailable && _supabaseClient) {
    try {
      const starterModules = buildNewUserModules();
      await _supabaseClient.from('schedule_data').upsert({
        id: username + '_main',
        modules: starterModules,
        time_slots: {},
        updated_at: new Date().toISOString()
      });
    } catch(e) { console.warn('Failed to init user data:', e); }
  }

  // Success
  _currentUser = { username: username, display_name: username };
  saveSession(_currentUser.username, _currentUser.display_name);
  applyUserContext();
  hideAuthOverlay();
  btn.disabled = false; btn.textContent = '创建并登录';

  // Boot app data (will be empty for new user)
  await bootAppData();
}

  return _currentUser ? _currentUser.username + '_versions' : 'letty_versions';
}

// --- Sync state ---
let _cloudReady = false;       // True after first cloud load attempt completes
let _userHasEdited = false;    // True once user makes any change this session
let _pendingSync = false;      // True when local has unsynced changes (offline queue)
let _localUpdatedAt = null;    // ISO timestamp of last known state — used for version comparison
let _cloudSyncTimer = null;    // Debounce timer for cloud push
let _isSyncing = false;        // Prevent concurrent sync operations
let _pullInProgress = false;   // Prevent concurrent pull operations

// --- Sync status UI ---
let _lastSyncStatus = 'init';
function showSyncStatus(status) {
  _lastSyncStatus = status;
  let el = document.getElementById('syncStatus');
  if(!el) {
    const headerLeft = document.querySelector('.header-left');
    if(headerLeft) {
      el = document.createElement('div');
      el.id = 'syncStatus';
      el.style.cssText = 'display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-left:12px;transition:all .3s ease;cursor:default;white-space:nowrap;vertical-align:middle;';
      headerLeft.appendChild(el);
    } else {
      el = document.createElement('div');
      el.id = 'syncStatus';
      el.style.cssText = 'position:fixed;top:14px;left:280px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;z-index:200;transition:all .3s ease;cursor:default;white-space:nowrap;';
      document.body.appendChild(el);
    }
  }
  const styles = {
    saving:  { html:'<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> 同步中', bg:'rgba(0,122,255,0.1)', color:'#007aff', title:'' },
    saved:   { html:'☁️ 已同步', bg:'rgba(52,199,89,0.1)', color:'#34c759', title:'' },
    error:   { html:'⚠️ 同步失败 <span style="text-decoration:underline;cursor:pointer">重试</span>', bg:'rgba(255,59,48,0.1)', color:'#ff3b30', title:'云端同步失败，数据已本地保存' },
    offline: { html:'📴 离线（本地已保存）', bg:'rgba(255,149,0,0.1)', color:'#ff9500', title:'离线模式，数据仅保存在本地，联网后自动同步' },
    pulling: { html:'<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> 拉取中', bg:'rgba(88,86,214,0.1)', color:'#5856d6', title:'正在从云端获取最新数据' },
    conflict:{ html:'⚠️ 已更新到最新版', bg:'rgba(255,204,0,0.15)', color:'#ff9500', title:'检测到其他窗口的更新，已自动同步' },
  };
  const s = styles[status] || styles.saved;
  el.innerHTML = s.html;
  el.style.background = s.bg;
  el.style.color = s.color;
  el.title = s.title;
  el.onclick = status === 'error' ? () => pushToCloud() : null;
  // Spin animation
  if(!document.getElementById('syncSpinStyle')) {
    const style = document.createElement('style');
    style.id = 'syncSpinStyle';
    style.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(style);
  }
}

// ================================================================
// CLOUD PUSH — save local data to cloud
// ================================================================
function scheduleCloudSync() {
  if(_cloudSyncTimer) clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer = setTimeout(() => pushToCloud(), 500);
}

async function pushToCloud() {
  if(!_cloudAvailable || !_supabaseClient) {
    _pendingSync = true;
    showSyncStatus('offline');
    return;
  }
  if(_isSyncing) {
    // Already syncing, schedule another round
    _pendingSync = true;
    return;
  }
  _isSyncing = true;
  try {
    showSyncStatus('saving');
    const now = new Date().toISOString();
    _localUpdatedAt = now;
    const payload = {
      id: getDataRowId(),
      modules: MODULES,
      time_slots: JSON.parse(localStorage.getItem(getSlotKey()) || '{}'),
      updated_at: now
    };
    const { error } = await _supabaseClient
      .from('schedule_data')
      .upsert(payload, { onConflict: 'id' });
    if(error) throw error;
    _pendingSync = false;
    // Update localStorage cache
    localStorage.setItem(getStoreKey(), JSON.stringify({
      modules: MODULES, updated_at: now
    }));
    showSyncStatus('saved');
    console.log(`☁️ Pushed to cloud. updated_at=${now}`);
    // Auto-save version snapshot (debounced — skip if last snapshot was <30s ago)
    if(!_isPreviewingVersion) {
      const lastVer = _versions[0];
      const shouldSave = !lastVer || (Date.now() - new Date(lastVer.timestamp).getTime() > 30000);
      if(shouldSave) {
        saveVersionSnapshot().catch(e => console.warn('Version save failed:', e));
      }
    }
  } catch(e) {
    console.error('Cloud push failed:', e);
    _pendingSync = true;
    showSyncStatus('error');
  } finally {
    _isSyncing = false;
  }
}

// ================================================================
// CLOUD PULL — fetch latest data from cloud
// ================================================================
async function pullFromCloud(opts = {}) {
  const { silent = false, isInit = false } = opts;
  if(!_cloudAvailable || !_supabaseClient) {
    console.log('Cloud not available');
    return { ok: false, reason: 'unavailable' };
  }
  if(_pullInProgress && !isInit) {
    return { ok: false, reason: 'in_progress' };
  }
  _pullInProgress = true;
  try {
    if(!silent) showSyncStatus('pulling');
    const { data, error } = await _supabaseClient
      .from('schedule_data')
      .select('*')
      .eq('id', getDataRowId())
      .single();
    if(error) {
      if(error.code === 'PGRST116') {
        // No row yet — first time use
        console.log('No cloud data yet');
        return { ok: false, reason: 'no_data' };
      }
      throw error;
    }
    if(!data || !data.modules) {
      return { ok: false, reason: 'empty' };
    }
    const cloudTime = data.updated_at ? new Date(data.updated_at).getTime() : 0;
    const localTime = _localUpdatedAt ? new Date(_localUpdatedAt).getTime() : 0;
    console.log(`☁️ Cloud: ${data.updated_at} (${cloudTime}). Local: ${_localUpdatedAt} (${localTime})`);
    if(isInit) {
      // On page load, always adopt cloud data (cloud is source of truth)
      console.log('☁️ INIT: adopting cloud data');
      MODULES = data.modules;
      _localUpdatedAt = data.updated_at;
      localStorage.setItem(getStoreKey(), JSON.stringify({
        modules: MODULES, updated_at: data.updated_at
      }));
      if(data.time_slots) {
        localStorage.setItem(getSlotKey(), JSON.stringify(data.time_slots));
      }
      return { ok: true, updated: true };
    }
    // Non-init: compare timestamps
    if(cloudTime > localTime) {
      // Cloud is newer — adopt it (another window pushed newer data)
      console.log(`☁️ Cloud is newer, adopting cloud data`);
      MODULES = data.modules;
      _localUpdatedAt = data.updated_at;
      localStorage.setItem(getStoreKey(), JSON.stringify({
        modules: MODULES, updated_at: data.updated_at
      }));
      if(data.time_slots) {
        localStorage.setItem(getSlotKey(), JSON.stringify(data.time_slots));
      }
      if(!silent) showSyncStatus('conflict');
      return { ok: true, updated: true };
    } else {
      // Local is same or newer — we're in sync
      if(!silent) showSyncStatus('saved');
      return { ok: true, updated: false };
    }
  } catch(e) {
    console.error('Cloud pull failed:', e);
    if(!silent) showSyncStatus('offline');
    return { ok: false, reason: 'error' };
  } finally {
    _pullInProgress = false;
  }
}
