<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letty 的日程管理</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card: rgba(255,255,255,0.82);
    --card-solid: #ffffff;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.1);
    --text: #1c1c1e;
    --text-sec: #8e8e93;
    --text-tri: #aeaeb2;
    --primary: #007aff;
    --primary-soft: rgba(0,122,255,0.08);
    --primary-medium: rgba(0,122,255,0.15);
    --done-c: #34c759;
    --done-bg: rgba(52,199,89,0.08);
    --prog-c: #5856d6;
    --prog-bg: rgba(88,86,214,0.08);
    --info-c: #af52de;
    --info-bg: rgba(175,82,222,0.08);
    --warn-c: #ff9500;
    --warn-bg: rgba(255,149,0,0.08);
    --hl-bg: rgba(255,204,0,0.18);
    --today-glow: rgba(0,122,255,0.06);
    --today-border: #007aff;
    --week-hl: rgba(88,86,214,0.05);
    --week-border: #5856d6;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --shadow-up: 0 -1px 4px rgba(0,0,0,0.04);
    --r: 16px;
    --r-lg: 20px;
    --rs: 12px;
    --r-sm: 8px;
    --danger: #ff3b30;
    --glass: saturate(1.8) blur(20px);
    --trans-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --trans-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); line-height:1.5; min-height:100vh;
    letter-spacing: -0.01em;
  }

  /* ========== HEADER — Apple Glass Bar ========== */
  .header {
    background: rgba(255,255,255,0.72);
    -webkit-backdrop-filter: var(--glass);
    backdrop-filter: var(--glass);
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
    color: var(--text);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .header h1 {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right { display:flex; align-items:center; gap:14px; }

  .view-tabs {
    display: flex; gap: 2px;
    background: rgba(118,118,128,0.12); padding: 2px; border-radius: 10px;
  }
  .view-tab {
    padding: 6px 18px; border: none; background: transparent;
    color: var(--text-sec); font-size: 13px; font-weight: 600;
    cursor: pointer; border-radius: 8px; transition: all .25s var(--trans-smooth);
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    background: #fff; color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0.5px 1px rgba(0,0,0,0.06);
  }

  .week-nav { display:flex; align-items:center; gap:8px; }
  .week-nav-btn {
    background: rgba(118,118,128,0.08); border: none; color: var(--primary);
    width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
    font-size: 13px; display:flex; align-items:center; justify-content:center;
    transition: all .2s var(--trans-smooth); font-weight: 600;
  }
  .week-nav-btn:hover { background: var(--primary-soft); }
  .week-nav-btn:active { transform: scale(0.92); }
  .week-label {
    font-size: 13px; color: var(--text);
    background: rgba(118,118,128,0.08);
    padding: 6px 16px; border-radius: 10px; font-weight: 600;
    min-width: 190px; text-align: center;
  }
  .week-today-btn {
    background: var(--primary-soft); border: none; color: var(--primary);
    padding: 6px 14px; border-radius: 10px; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all .2s var(--trans-smooth);
  }
  .week-today-btn:hover { background: var(--primary-medium); }
  .week-today-btn:active { transform: scale(0.95); }

  /* ========== MAIN ========== */
  .main { max-width: 1440px; margin: 0 auto; padding: 24px; }

  /* ========== MODULE GRID ========== */
  .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }

  .module-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden; transition: box-shadow .3s var(--trans-smooth);
  }
  .module-card:hover { box-shadow: var(--shadow); }

  .module-head {
    padding: 16px 20px; display:flex; align-items:center; justify-content:space-between;
    border-bottom: 0.5px solid var(--border);
    background: rgba(255,255,255,0.5);
  }
  .module-title { display:flex; align-items:center; gap:10px; }
  .m-emoji { font-size: 22px; }
  .m-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
  .m-badges { display:flex; gap:6px; }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 2px 10px; border-radius: 100px;
  }
  .badge.todo-b { background: var(--warn-bg); color: var(--warn-c); }
  .badge.done-b { background: var(--done-bg); color: var(--done-c); }
  .badge.info-b { background: var(--info-bg); color: var(--info-c); }

  .module-body { max-height: 800px; overflow-y: auto; }

  .sec-label {
    padding: 8px 20px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-sec); background: rgba(0,0,0,0.02);
    border-bottom: 0.5px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sec-add-btn {
    background: none; border: 1px dashed var(--border-strong);
    padding: 2px 12px; border-radius: 8px; font-size: 11px;
    color: var(--primary); cursor: pointer; font-weight: 600;
    transition: all .2s var(--trans-smooth);
  }
  .sec-add-btn:hover { background: var(--primary-soft); border-color: var(--primary); }

  /* ========== TODO ROW ========== */
  .row {
    padding: 10px 20px; display:flex; align-items:flex-start; gap: 10px;
    border-bottom: 0.5px solid var(--border); transition: background .2s var(--trans-smooth); position:relative;
  }
  .row:hover { background: rgba(0,0,0,0.02); }
  .row:last-child { border-bottom: none; }
  .row.todo.completed { opacity: .38; }
  .row.todo.completed .row-text { text-decoration: line-through; text-decoration-color: var(--text-tri); }

  .row.todo.today-hl {
    background: var(--today-glow);
    border-left: 3px solid var(--today-border);
  }
  .row.todo.today-hl:hover { background: rgba(0,122,255,0.08); }
  .row.todo.this-week-hl {
    background: var(--week-hl);
    border-left: 3px solid var(--week-border);
  }
  .row.todo.this-week-hl:hover { background: rgba(88,86,214,0.08); }

  .row-cb { margin-top: 2px; flex-shrink: 0; }
  .row-cb input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--primary);
    cursor: pointer; border-radius: 50%;
  }
  .row-body { flex:1; min-width:0; }
  .row-text {
    font-size: 14px; font-weight: 500; word-break:break-word;
    outline: none; border-radius: 6px; padding: 2px 4px; margin: -2px -4px;
    transition: all .2s var(--trans-smooth); line-height: 1.5;
  }
  .draggable-todo .row-text[contenteditable="false"] {
    cursor: grab; user-select: none;
  }
  .draggable-todo .row-text[contenteditable="true"] {
    cursor: text;
  }
  .row-text:focus {
    background: var(--primary-soft);
    box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
  }

  .row-meta { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500;
    letter-spacing: -0.01em;
  }
  .tag.date-tag { background: rgba(0,122,255,0.08); color: var(--primary); }
  .tag.prog-tag { background: var(--prog-bg); color: var(--prog-c); }
  .tag.note-tag { background: rgba(0,0,0,0.04); color: var(--text-sec); }
  .tag.auto-date-tag { background: var(--done-bg); color: var(--done-c); }


  /* Day view: todo list drop zone highlight */
  .day-section.drop-highlight {
    outline: 2px dashed var(--primary);
    outline-offset: -2px;
    background: var(--primary-soft) !important;
  }

  .row.info.highlighted { background: var(--hl-bg) !important; }
  .row.info .row-actions { opacity: 0; transition: opacity .2s; }
  .row.info:hover .row-actions { opacity: 1; }
  .row.info .row-actions:focus-within { opacity: 1; }
  .info-dot { width:6px; height:6px; border-radius:50%; background: var(--info-c); margin-top:10px; flex-shrink:0; }

  /* ========== INFO NOTE — 备忘录/笔记风格 ========== */
  .info-note-area {
    flex: 1; min-width: 0;
    font-size: 13.5px; font-weight: 400; font-family: inherit;
    color: var(--text); line-height: 1.65; word-break: break-word;
    background: transparent; border: none; outline: none;
    resize: none; overflow: hidden;
    padding: 4px 8px; margin: -4px -8px;
    border-radius: 8px;
    transition: all .2s var(--trans-smooth);
    width: 100%;
    min-height: 24px;
  }
  .info-note-area:focus {
    background: rgba(175,82,222,0.04);
    box-shadow: 0 0 0 3px rgba(175,82,222,0.1);
  }
  .info-note-area::placeholder { color: var(--text-tri); font-style: italic; }

  .row-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; flex-shrink:0; margin-top:2px; }
  .row:hover .row-actions { opacity:1; }
  .act-btn {
    background: none; border: 1px solid var(--border-strong);
    width: 26px; height: 26px; border-radius: 8px;
    cursor: pointer; display:flex; align-items:center; justify-content:center;
    font-size: 12px; color: var(--text-sec); transition: all .2s var(--trans-smooth);
  }
  .act-btn:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .act-btn.hl-on { background: var(--hl-bg); border-color: #ffcc00; color: #a16207; }
  .act-btn.del:hover { background: rgba(255,59,48,0.08); border-color: var(--danger); color: var(--danger); }
  .act-btn.date-btn { opacity: 0; font-size: 11px; border: none; }
  .row:hover .act-btn.date-btn { opacity: 1; }

  .more-info-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding: 12px 20px; margin: 6px 16px 16px;
    background: var(--info-bg); border: 1px dashed rgba(175,82,222,0.3);
    border-radius: var(--rs); cursor:pointer; transition:all .2s var(--trans-smooth);
    font-size: 12px; font-weight: 600; color: var(--info-c);
  }
  .more-info-btn:hover { background: rgba(175,82,222,0.12); border-style: solid; }

  /* ========== ADD MODULE CARD ========== */
  .add-module-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 2px dashed var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    min-height: 160px; cursor: pointer;
    transition: border-color .3s var(--trans-smooth), background .3s var(--trans-smooth);
    flex-direction: column; gap: 10px;
  }
  .add-module-card:hover { border-color: var(--primary); background: var(--primary-soft); }
  .add-module-card .add-icon {
    width: 44px; height: 44px; border-radius: 14px;
    background: var(--primary-soft); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 300; transition: all .3s var(--trans-spring);
  }
  .add-module-card:hover .add-icon { background: var(--primary); color: #fff; transform: scale(1.08); }
  .add-module-card .add-text { font-size: 13px; font-weight: 600; color: var(--text-sec); }
  .add-module-card:hover .add-text { color: var(--primary); }

  /* ========== ADD MODULE MODAL ========== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; opacity: 0; transition: opacity .25s var(--trans-smooth);
    pointer-events: none;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-box {
    background: var(--card-solid); border-radius: var(--r-lg);
    padding: 28px 32px; box-shadow: var(--shadow-lg);
    max-width: 420px; width: 90%; text-align: center;
    transform: scale(0.92) translateY(20px);
    transition: transform .35s var(--trans-spring), opacity .25s var(--trans-smooth);
    opacity: 0;
  }
  .modal-overlay.active .modal-box { transform: scale(1) translateY(0); opacity: 1; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-subtitle { font-size: 13px; color: var(--text-sec); margin-bottom: 20px; }

  .emoji-picker {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-bottom: 20px; padding: 12px;
    background: rgba(0,0,0,0.02); border-radius: var(--rs);
  }
  .emoji-opt {
    width: 42px; height: 42px; border: 2px solid transparent;
    border-radius: 12px; background: rgba(0,0,0,0.03);
    font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s var(--trans-spring);
  }
  .emoji-opt:hover { background: rgba(0,122,255,0.08); transform: scale(1.1); }
  .emoji-opt.selected { border-color: var(--primary); background: var(--primary-soft); transform: scale(1.12); }

  .modal-input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border-strong);
    border-radius: var(--rs); font-size: 15px; font-weight: 500;
    outline: none; transition: all .2s var(--trans-smooth);
    background: rgba(0,0,0,0.02); color: var(--text);
    font-family: inherit;
  }
  .modal-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
    background: #fff;
  }
  .modal-input::placeholder { color: var(--text-tri); }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
  .modal-btn {
    padding: 10px 28px; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all .2s var(--trans-smooth);
    font-family: inherit;
  }
  .modal-btn:active { transform: scale(0.96); }
  .modal-btn.cancel { background: rgba(118,118,128,0.12); color: var(--text); }
  .modal-btn.cancel:hover { background: rgba(118,118,128,0.18); }
  .modal-btn.confirm { background: var(--primary); color: #fff; }
  .modal-btn.confirm:hover { background: #0066d6; }
  .modal-btn.confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ========== INFO DETAIL PAGE ========== */
  .page-main { display:block; }
  .page-info-detail { display:none; }
  body.show-info-detail .page-main { display:none; }
  body.show-info-detail .page-info-detail { display:block; }

  .info-detail-header {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    padding: 20px 28px; margin-bottom: 20px; box-shadow: var(--shadow-sm);
    display:flex; align-items:center; gap:16px;
  }
  .info-back-btn {
    width: 38px; height: 38px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 16px;
    display:flex; align-items:center; justify-content:center;
    transition: all .2s var(--trans-smooth); flex-shrink: 0; color: var(--primary);
  }
  .info-back-btn:hover { background: var(--primary-soft); border-color: var(--primary); }
  .info-detail-title { display:flex; align-items:center; gap:10px; }
  .info-detail-title .big-emoji { font-size: 28px; }
  .info-detail-title .title-name { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .info-detail-title .title-sub { font-size: 13px; color: var(--text-sec); margin-left: 2px; }

  .info-detail-add {
    margin-left: auto;
    padding: 10px 22px; border: none; background: var(--primary);
    border-radius: var(--rs); font-size: 13px; font-weight: 600;
    color: #fff; cursor: pointer; transition: all .2s var(--trans-smooth);
    font-family: inherit;
  }
  .info-detail-add:hover { background: #0066d6; }
  .info-detail-add:active { transform: scale(0.96); }

  .info-wk-card {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 16px;
  }
  .info-wk-header {
    padding: 12px 24px; display:flex; align-items:center; gap:10px;
    background: var(--info-bg); border-bottom: 0.5px solid rgba(175,82,222,0.1);
    font-size: 13px; font-weight: 700; color: var(--info-c);
  }
  .info-wk-header::before {
    content:''; display:inline-block; width:8px; height:8px;
    border-radius:50%; background: var(--info-c); flex-shrink:0;
  }
  .info-wk-header .range { color: var(--text-sec); font-weight: 500; font-size: 12px; }
  .info-wk-body .info-row {
    padding: 12px 24px 12px 42px; display:flex; align-items:flex-start; gap:10px;
    border-bottom: 0.5px solid var(--border); transition: background .2s; position: relative;
  }
  .info-wk-body .info-row:hover { background: rgba(0,0,0,0.02); }
  .info-wk-body .info-row:last-child { border-bottom:none; }
  .info-wk-body .info-row.highlighted { background: var(--hl-bg) !important; }
  .info-wk-body .info-row .dot {
    position: absolute; left: 24px; top: 18px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--info-c);
  }
  .info-wk-body .info-row .i-text {
    flex:1; font-size: 13.5px; font-weight: 400; font-family: inherit;
    color: var(--text); line-height: 1.65;
    word-break: break-word; outline: none; border: none;
    background: transparent; resize: none; overflow: hidden;
    border-radius: 8px; padding: 4px 8px; margin: -4px -8px;
    transition: all .2s var(--trans-smooth); width: 100%; min-height: 24px;
  }
  .info-wk-body .info-row .i-text:focus {
    background: rgba(175,82,222,0.04);
    box-shadow: 0 0 0 3px rgba(175,82,222,0.1);
  }
  .info-wk-body .info-row .i-text::placeholder { color: var(--text-tri); font-style: italic; }
  .info-wk-body .info-row .i-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; flex-shrink:0; }
  .info-wk-body .info-row:hover .i-actions { opacity:1; }

  .info-empty-page { text-align:center; padding:60px; color: var(--text-sec); }
  .info-empty-page .big-icon { font-size: 48px; margin-bottom: 12px; }

  /* ========== DAY VIEW ========== */
  .day-view { display:none; }
  .day-view.active { display:block; }
  .week-view { display:none; }
  .week-view.active { display:block; }

  .day-header {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    padding: 24px 28px; margin-bottom: 20px; box-shadow: var(--shadow-sm);
    display:flex; align-items:center; justify-content:space-between;
  }
  .day-date {
    font-size: 28px; font-weight: 800; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #007aff, #5856d6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .day-sub { font-size: 13px; color: var(--text-sec); margin-top: 2px; font-weight: 500; }
  .day-nav { display:flex; gap:8px; }
  .day-nav button {
    width: 36px; height: 36px; border: 1px solid var(--border-strong); background: #fff;
    border-radius: var(--rs); cursor: pointer; font-size: 14px;
    display:flex; align-items:center; justify-content:center;
    transition: all .2s var(--trans-smooth); color: var(--primary); font-weight: 600;
  }
  .day-nav button:hover { background: var(--primary-soft); border-color: var(--primary); }
  .day-nav button:active { transform: scale(0.92); }

  .day-section {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 16px;
  }
  .day-section-head {
    padding: 14px 20px; border-bottom: 0.5px solid var(--border);
    display:flex; align-items:center; gap:10px; justify-content: space-between;
    background: rgba(255,255,255,0.5);
  }
  .day-section-head-left { display: flex; align-items: center; gap: 10px; }
  .day-section-head .sec-add-btn { margin-left: auto; }

  .empty-day { text-align:center; padding:60px; color: var(--text-sec); font-size: 14px; }
  .empty-day .big-emoji { font-size: 48px; margin-bottom: 12px; }

  /* ========== DAY VIEW — ADD TODO QUICK BAR ========== */
  .day-add-bar {
    background: var(--card-solid);
    border-radius: var(--r-lg); border: 0.5px solid var(--border);

<script>
// ================================================================
// DATE UTILS
// ================================================================
const NOW = new Date();
let weekOffset = 0;
let dayOffset = 0;

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function fmtDate(d) { return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'); }

function getCurrentWeekMonday() {
  const mon = getMonday(NOW);
  mon.setDate(mon.getDate() + weekOffset * 7);
  return mon;
}

function getCurrentWeekDates() {
  const mon = getCurrentWeekMonday();
  const dates = [];
  for(let i=0; i<7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    dates.push(fmtDate(d));
  }
  return dates;
}

function getWeekLabel() {
  const mon = getCurrentWeekMonday();
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  let prefix = '';
  if(weekOffset === 0) prefix = '本周 · ';
  else if(weekOffset === -1) prefix = '上周 · ';
  else if(weekOffset === 1) prefix = '下周 · ';
  return `${prefix}${mon.getFullYear()}/${fmtDate(mon)} ~ ${fmtDate(sun)}`;
}

function getWeekLabelForMonday(monDate) {
  const sun = new Date(monDate); sun.setDate(monDate.getDate()+6);
  const thisMon = getMonday(NOW);
  const diff = Math.round((monDate - thisMon) / (7*24*60*60*1000));
  let prefix = '';
  if(diff === 0) prefix = '本周';
  else if(diff === -1) prefix = '上周';
  else if(diff === 1) prefix = '下周';
  else prefix = `${fmtDate(monDate)}周`;
  return `${prefix} · ${fmtDate(monDate)} ~ ${fmtDate(sun)}`;
}

function getTodayStr() { return fmtDate(NOW); }

function dateToObj(dateStr) {
  const m = parseInt(dateStr.split('/')[0]) - 1;
  const d = parseInt(dateStr.split('/')[1]);
  return new Date(NOW.getFullYear(), m, d);
}

function infoInWeek(info, weekDates) {
  if(!info.week) return false;
  const monDate = dateToObj(info.week);
  const mon = getMonday(monDate);
  for(let i=0;i<7;i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    if(weekDates.includes(fmtDate(d))) return true;
  }
  return false;
}

// ================================================================
// TIME AUTO-DETECTION
// ================================================================
function parseTimeFromText(text) {
  const today = new Date();

  if(/下周/.test(text)) {
    const m2 = text.match(/下周([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5\u5929])/);
    if(m2) {
      const weekDayMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};
      const targetDay = weekDayMap[m2[1]];
      if(targetDay !== undefined) {
        const nextMon = getMonday(today);
        nextMon.setDate(nextMon.getDate() + 7);
        const d = new Date(nextMon);
        const offset = targetDay === 0 ? 6 : targetDay - 1;
        d.setDate(nextMon.getDate() + offset);
        return fmtDate(d);
      }
    }
    const mon = getMonday(today);
    mon.setDate(mon.getDate() + 7);
    return fmtDate(mon);
  }

  const weekDayMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};
  let m = text.match(/(?:周|星期)([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5\u5929])/);
  if(m) {
    const targetDay = weekDayMap[m[1]];
    if(targetDay !== undefined) {
      const mon = getMonday(today);
      const d = new Date(mon);
      const offset = targetDay === 0 ? 6 : targetDay - 1;
      d.setDate(mon.getDate() + offset);
      return fmtDate(d);
    }
  }

  if(/今天/.test(text)) return fmtDate(today);
  if(/明天/.test(text)) { const d=new Date(today);d.setDate(d.getDate()+1);return fmtDate(d); }
  if(/后天/.test(text)) { const d=new Date(today);d.setDate(d.getDate()+2);return fmtDate(d); }
  if(/大后天/.test(text)) { const d=new Date(today);d.setDate(d.getDate()+3);return fmtDate(d); }

  m = text.match(/(\d{1,2})\/(\d{1,2})/);
  if(m) return m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0');

  m = text.match(/(\d{1,2})月(\d{1,2})[日号]/);
  if(m) return m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0');

  return null;
}

function detectDateFromItem(item) {
  let detected = parseTimeFromText(item.text || '');
  if(!detected && item.note) {
    detected = parseTimeFromText(item.note);
  }
  return detected;
}

function normalizeRelativeTimeInText(text, detectedDate) {
  if(!text || !detectedDate) return text;
  const d = dateToObj(detectedDate);
  const wdNames = ['日','一','二','三','四','五','六'];
  const weekDay = '周' + wdNames[d.getDay()];

  let result = text;
  result = result.replace(/下周([\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5\u5929])/, weekDay);
  result = result.replace(/下周(?![一二三四五六日天])/, weekDay);
  result = result.replace(/大后天/, weekDay);
  result = result.replace(/后天/, weekDay);
  result = result.replace(/明天/, weekDay);
  result = result.replace(/今天/, weekDay);

  return result;
}

// Sync status indicator — always visible in header
let _lastSyncStatus = 'init';
function showSyncStatus(status) {
  _lastSyncStatus = status;
  let el = document.getElementById('syncStatus');
  if(!el) {
    // Insert into the header bar, next to the title
    const headerLeft = document.querySelector('.header-left');

      document.body.appendChild(el);
    }
  }
  if(status === 'saving') {
    el.innerHTML = '<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> 同步中';

// Debounced cloud save — waits 500ms after last change then syncs
function scheduleCloudSync() {
  if(_cloudSyncTimer) clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer = setTimeout(async () => {
    await syncToCloud();
  }, 500);
}

async function syncToCloud() {
  if(!_cloudAvailable || !_supabaseClient) {
    showSyncStatus('offline');
    return;
  }
  try {
    showSyncStatus('saving');
    const payload = {
      id: DATA_ROW_ID,
      modules: MODULES,
      time_slots: JSON.parse(localStorage.getItem(SLOT_KEY) || '{}'),
      updated_at: new Date().toISOString()
    };
    const { error } = await _supabaseClient
      .from('schedule_data')
      .upsert(payload, { onConflict: 'id' });
    if(error) throw error;
    showSyncStatus('saved');
  } catch(e) {
    console.error('Cloud sync failed:', e);
    showSyncStatus('error');
  }
}

async function loadFromCloud() {
  if(!_cloudAvailable || !_supabaseClient) {
    console.log('Cloud not available, using localStorage only');
    return false;
  }
  try {
    const { data, error } = await _supabaseClient
      .from('schedule_data')
      .select('*')
      .eq('id', DATA_ROW_ID)
      .single();
    if(error) {
      if(error.code === 'PGRST116') {
        // No row yet — first time use, will create on first save
        console.log('No cloud data yet, using local data');
        return false;
      }
      throw error;
    }
    if(data) {
      // Compare timestamps: only overwrite local if cloud is newer (or local has no timestamp)
      const cloudTime = data.updated_at ? new Date(data.updated_at).getTime() : 0;
      const localTime = _localUpdatedAt ? new Date(_localUpdatedAt).getTime() : 0;
      if(localTime > 0 && cloudTime > 0 && localTime > cloudTime) {
        console.log('Local data is strictly newer, keeping local. Local:', _localUpdatedAt, 'Cloud:', data.updated_at);
        return false;
      }
      console.log('Cloud data will be used. Local:', _localUpdatedAt || '(none)', 'Cloud:', data.updated_at);
      if(data.modules) {
        MODULES = data.modules;
        _localUpdatedAt = data.updated_at;
        // Also update localStorage cache
        localStorage.setItem(STORE_KEY, JSON.stringify({ modules: MODULES, updated_at: data.updated_at }));
      }
      if(data.time_slots) {
        localStorage.setItem(SLOT_KEY, JSON.stringify(data.time_slots));
      }
      return true;
    }
    return false;
  } catch(e) {
    console.error('Cloud load failed:', e);
    showSyncStatus('offline');
    return false;
  }
}

// ================================================================
let currentView = 'week';
const STORE_KEY = 'letty_schedule_v3';
const SLOT_KEY = 'letty_time_slots';

let _localUpdatedAt = null; // Track local data freshness

function loadState() {
  // Load from localStorage first (fast, offline-capable)
  const raw = localStorage.getItem(STORE_KEY);
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    if (saved.modules) MODULES = saved.modules;
    if (saved.updated_at) _localUpdatedAt = saved.updated_at;
  } catch(e) {}
  // Restore _uid counter to avoid ID collisions with existing data
  restoreUidCounter();
}

function restoreUidCounter() {
  let maxId = _uid;
  MODULES.forEach(m => {
    m.todos.forEach(t => {
      const n = parseInt(t.id.replace('u',''), 10);
      if(!isNaN(n) && n > maxId) maxId = n;
    });
    if(m.infos) m.infos.forEach(i => {
      const n = parseInt(i.id.replace('u',''), 10);
      if(!isNaN(n) && n > maxId) maxId = n;
    });
  });
  _uid = maxId;
}

function saveState() {
  // Always save to localStorage with timestamp (instant, offline)
  const now = new Date().toISOString();
  localStorage.setItem(STORE_KEY, JSON.stringify({ modules: MODULES, updated_at: now }));
  _localUpdatedAt = now;
  // Schedule async cloud sync
  scheduleCloudSync();
}

function exportData() {
  const data = {
    _format: 'letty_schedule_backup',
    _version: 3,
    _exportedAt: new Date().toISOString(),
    modules: MODULES,
    timeSlots: JSON.parse(localStorage.getItem(SLOT_KEY) || '{}')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `letty-schedule-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ 数据已导出');
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data._format !== 'letty_schedule_backup') {
        toast('❌ 文件格式不正确'); return;
      }
      // Confirm before overwriting
      if (!confirm('导入将覆盖当前所有数据，确定继续？\n\n建议先导出当前数据作为备份。')) return;
      if (data.modules) {
        MODULES = data.modules;
        saveState();
      }
      if (data.timeSlots) {
        localStorage.setItem(SLOT_KEY, JSON.stringify(data.timeSlots));
      }
      // Restore _uid counter
      let maxId = _uid;
      MODULES.forEach(m => {
        m.todos.forEach(t => { const n=parseInt(t.id.replace('u',''),10); if(!isNaN(n)&&n>maxId) maxId=n; });
        if(m.infos) m.infos.forEach(i => { const n=parseInt(i.id.replace('u',''),10); if(!isNaN(n)&&n>maxId) maxId=n; });
      });
      _uid = maxId;
      // Re-render
      if (currentView === 'week') renderWeek(); else renderDay();
      // Sync imported data to cloud
      scheduleCloudSync();
      toast('✅ 数据已导入恢复');
    } catch(err) {
      toast('❌ 文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  evt.target.value = ''; // allow re-selecting same file
}

// Strip leading time expressions for day view display (data unchanged)
function stripTimePrefix(text) {
  if(!text) return text;
  // Remove leading day references: 周五、今天、明天、后天、下周一 etc.
  let s = text.replace(/^(下周[一二三四五六日天]|周[一二三四五六日天]|今天|明天|后天|大后天)\s*/g, '');
  // Also remove mid-sentence standalone day refs followed by time/action
  s = s.replace(/(：|:)\s*(下周[一二三四五六日天]|周[一二三四五六日天]|今天|明天|后天|大后天)\s*/g, '$1');
  return s || text; // fallback to original if everything got stripped
}

// Textarea 自动撑高（优化版：减少 reflow）
function autoResizeTextarea(el) {
  if (!el.value || el.value.trim() === '') {
    el.style.height = '24px';
    return;
  }
  el.style.height = '24px';

// 页面渲染后批量初始化所有 textarea 高度（用 rAF 避免阻塞滚动）
function initAllTextareas() {
  requestAnimationFrame(() => {
    const els = document.querySelectorAll('.info-note-area, .i-text-area');
    // 批量写
    els.forEach(el => {
      if (!el.value || el.value.trim() === '') {
        el.style.height = '24px';
      } else {
        el.style.height = '24px';
      }
    });
    // 批量读 + 写（减少交替 reflow）

        }
      });
    });
  });
}

        if(weekOffset === 0 && t.status !== 'done') {
          const itemDate = dateToObj(t.date);
          const mon = getCurrentWeekMonday();

        }

      }

    });

    const notDone = relevantTodos.filter(t=>t.status!=='done');

    if(done.length) {
      h += `<div class="sec-label" style="font-size:10px;padding:5px 20px"><span>✅ 已完成</span></div>`;
      done.forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'week'); });

function todoRowHTML(t, weekDates, todayStr, context, hiddenSlotIds, slotLabel) {
  context = context || 'week';
  hiddenSlotIds = hiddenSlotIds || [];
  const isDone = t.status==='done';
  const isInSlot = hiddenSlotIds.includes(t.id);

  // In day view, hide todos that are already assigned to a time slot
  if(context === 'day' && !isDone && isInSlot) {
    return '';
  }

  const isToday = t.date && t.date === todayStr;
  const isThisWeek = t.date && weekDates && weekDates.includes(t.date) && !isToday;
  const cls = ['row','todo'];
  if(isDone) cls.push('completed');

  // Only highlight in week view
  if(context === 'week') {
    if(isToday && !isDone) cls.push('today-hl');
    else if(isThisWeek && !isDone) cls.push('this-week-hl');
  }

  // In day view, make items draggable (both assigned and unassigned)
  if(context === 'day' && !isDone) cls.push('draggable-todo');

  let meta = '';
  if(t.date && context === 'week') {
    if(isToday) {
      meta += `<span class="tag date-tag" onclick="openDatePicker('${t.id}',event)" style="cursor:pointer" title="点击修改日期">📍 今天 ${t.date}</span>`;
    } else {
      const dt = dateToObj(t.date);
      const wd = ['日','一','二','三','四','五','六'];
      meta += `<span class="tag date-tag" onclick="openDatePicker('${t.id}',event)" style="cursor:pointer" title="点击修改日期">${t.date} 周${wd[dt.getDay()]}</span>`;
    }
  }
  // No date + week view → show assign date button
  if(!t.date && context === 'week' && !isDone) {
    meta += `<span class="tag no-date-tag" onclick="openDatePicker('${t.id}',event)">📅 分配日期</span>`;
  }
  if(t.autoDate && context === 'week') {
    meta += `<span class="tag auto-date-tag">🔍 自动识别</span>`;
  }
  if(t.status==='progress') meta += `<span class="tag prog-tag">进行中</span>`;
  if(t.note) meta += `<span class="tag note-tag">${esc(t.note)}</span>`;

  const draggable = (context === 'day' && !isDone) ? ` draggable="true" ondragstart="onTodoDragStart(event,'${t.id}')"` : '';
  // In day view with draggable: default contenteditable=false, double-click to edit
  const isDayDraggable = (context === 'day' && !isDone);
  const cedit = isDayDraggable ? 'false' : 'true';
  const editTrigger = isDayDraggable
    ? `ondblclick="enableRowEdit(this,'${t.id}')" onblur="disableRowEdit(this,'${t.id}')"`
    : `onblur="editTodoText('${t.id}',this.textContent)"`;

  return `
    <div class="${cls.join(' ')}" data-id="${t.id}"${draggable}>
      <div class="row-cb"><input type="checkbox" ${isDone?'checked':''} onchange="toggleTodo('${t.id}',this.checked)"/></div>
      <div class="row-body">
        <div class="row-text" contenteditable="${cedit}" ${editTrigger}>${esc(context === 'day' ? stripTimePrefix(t.text) : t.text)}</div>
        ${meta?`<div class="row-meta">${meta}</div>`:''}
      </div>
      <div class="row-actions">
        ${context === 'day' && !isDone ? `<button class="act-btn date-btn" onclick="openDatePickerDay('${t.id}',event)" title="修改日期">📅</button>` : ''}
        <button class="act-btn del" onclick="delTodo('${t.id}')" title="删除">✕</button>
      </div>
    </div>`;
}

function infoRowHTML(i) {
  return `
    <div class="row info ${i.highlighted?'highlighted':''}" data-id="${i.id}" data-type="info">
      <div class="info-dot"></div>
      <div class="row-body">
        <textarea class="info-note-area" rows="1" onblur="editInfoText('${i.id}',this.value)" oninput="autoResizeTextarea(this)" placeholder="写点什么…">${esc(i.text)}</textarea>
      </div>
      <div class="row-actions">
        <button class="act-btn ${i.highlighted?'hl-on':''}" onclick="hlInfo('${i.id}')" title="高亮">💡</button>
        <button class="act-btn del" onclick="delInfo('${i.id}')" title="删除">✕</button>
      </div>
    </div>`;
}

// ================================================================
// RENDER — DAY
// ================================================================
function renderDay() {
  const c = document.getElementById('dayView');
  const d = new Date(NOW); d.setDate(d.getDate()+dayOffset);
  const ds = fmtDate(d);
  const wd = ['日','一','二','三','四','五','六'];
  const todayStr = getTodayStr();
  const weekDates = getCurrentWeekDates();

  let h = '';

  // Day Header
  h += `<div class="day-header fade-in"><div><div class="day-date">${d.getMonth()+1}月${d.getDate()}日</div><div class="day-sub">星期${wd[d.getDay()]}${dayOffset===0?' · 今天':''}</div></div><div class="day-nav"><button onclick="navDay(-1)">◀</button><button onclick="navDay(0)" title="回到今天">●</button><button onclick="navDay(1)">▶</button></div></div>`;

  // Quick Add Bar
  h += `<div class="day-add-bar fade-in">`;
  h += `<span class="add-label">➕ 快速添加</span>`;
  h += `<select class="day-add-select" id="dayAddModule">`;
  MODULES.forEach(mod => {
    h += `<option value="${mod.id}">${mod.emoji} ${mod.name}</option>`;
  });
  h += `</select>`;
  h += `<input class="day-add-input" id="dayAddInput" placeholder="输入待办内容，回车添加…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTodoInDay();}"/>`;
  h += `<button class="day-add-submit" onclick="addTodoInDay()">添加</button>`;
  h += `</div>`;

  // Collect all todos for this day grouped by module
  let found = false;
  const modGroups = [];
  MODULES.forEach(mod => {
    const items = mod.todos.filter(t => t.date === ds);
    if(!items.length) return;
    found = true;
    modGroups.push({ mod, items });
  });

  // Get time slot data and build hidden IDs set (todos already placed in slots)
  const slotData = getTimeSlots(ds);
  // Clean slot data: remove duplicate IDs and IDs referencing non-existent todos
  let slotDirty = false;
  ['morning','afternoon','evening'].forEach(k => {
    if(!slotData[k]) { slotData[k] = []; return; }
    const seen = new Set();
    slotData[k] = slotData[k].filter(id => {
      if(seen.has(id)) { slotDirty = true; return false; }
      seen.add(id);
      if(!findTodo(id)) { slotDirty = true; return false; }
      return true;
    });
  });
  if(slotDirty) setTimeSlots(ds, slotData);
  const allSlotIds = new Set([...slotData.morning, ...slotData.afternoon, ...slotData.evening]);

  // ---- Today's Todo List ----
  const allDayTodos = modGroups.flatMap(g => g.items);
  const unassignedNotDone = allDayTodos.filter(t => !allSlotIds.has(t.id) && t.status !== 'done');
  const doneTodos = allDayTodos.filter(t => t.status === 'done' && !allSlotIds.has(t.id));
  const showTodoSection = unassignedNotDone.length > 0 || doneTodos.length > 0 || !found;

  h += `<div class="day-section fade-in" id="todoListDropZone" ondragover="onTodoListDragOver(event)" ondragleave="onTodoListDragLeave(event)" ondrop="onTodoListDrop(event,'${ds}')">`;
  h += `<div class="day-section-head">`;
  h += `<div class="day-section-head-left"><span style="font-size:18px">📋</span><span class="m-name" style="font-size:14px;font-weight:700">今日待办</span></div>`;
  if(unassignedNotDone.length) h += `<span class="badge todo-b">${unassignedNotDone.length} 待办</span>`;
  if(doneTodos.length) h += `<span class="badge done-b">${doneTodos.length} 完成</span>`;
  h += `</div>`;

  if(!found) {
    h += `<div style="text-align:center;padding:24px 0;color:var(--text-tri);font-size:13px">暂无待办，在上方快速添加栏中新增</div>`;
  } else if(unassignedNotDone.length === 0 && doneTodos.length === 0) {
    h += `<div style="text-align:center;padding:16px 0;color:var(--text-tri);font-size:13px">✅ 全部已安排到时间段<br><span style="font-size:11px">从下方时间段拖回此处可取消安排</span></div>`;
  } else {
    modGroups.forEach(grp => {
      const visibleNotDone = grp.items.filter(t => !allSlotIds.has(t.id) && t.status !== 'done');
      const visibleDone = grp.items.filter(t => t.status === 'done' && !allSlotIds.has(t.id));
      if(visibleNotDone.length === 0 && visibleDone.length === 0) return;

      h += `<div class="sec-label" style="font-size:10px;padding:5px 20px"><span>${grp.mod.emoji} ${grp.mod.name}</span><button class="sec-add-btn" onclick="event.stopPropagation();addTodoInDayForModule('${grp.mod.id}')">+ 新增</button></div>`;
      visibleNotDone.forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'day'); });
      visibleDone.forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'day'); });
    });
  }
  h += `</div>`;

  // ---- Time Planner (早中晚) ----
  h += `<div class="time-planner-title fade-in">⏰ 时间规划 <span class="tp-sub">拖拽待办到下方时段 · 也可从时段拖回待办区</span></div>`;
  h += `<div class="time-slots fade-in">`;

  const slotsConfig = [
    { key: 'morning', icon: '🌅', label: '上午', time: '09:00 - 12:00', cls: 'morning' },
    { key: 'afternoon', icon: '☀️', label: '下午', time: '14:00 - 18:00', cls: 'afternoon' },
    { key: 'evening', icon: '🌙', label: '晚上', time: '19:00 - 22:00', cls: 'evening' },
  ];

  slotsConfig.forEach(slot => {
    const ids = slotData[slot.key] || [];
    const items = ids.map(todoId => {
      const r = findTodo(todoId);
      if(!r) return null;
      return { id: todoId, text: r.todo.text, emoji: r.mod.emoji, modName: r.mod.name, status: r.todo.status };
    }).filter(Boolean);

    h += `<div class="time-slot ${slot.cls}" ondragover="onSlotDragOver(event)" ondragleave="onSlotDragLeave(event)" ondrop="onSlotDrop(event,'${slot.key}','${ds}')">`;
    h += `<div class="ts-header"><span class="ts-icon">${slot.icon}</span><span class="ts-label">${slot.label}</span><span class="ts-time">${slot.time}</span>`;
    if(items.length) h += `<span class="ts-count">${items.length}</span>`;
    h += `</div><div class="ts-body">`;

    if(!items.length) {
      h += `<div class="ts-empty"><div class="drop-icon">📥</div>拖拽待办到这里<button class="ts-add-btn" style="margin-top:8px" onclick="addTodoInSlot('${slot.key}','${ds}')">+ 新增待办</button></div>`;
    } else {
      items.forEach(item => {
        const isDone = item.status === 'done';
        const doneCls = isDone ? ' ts-done' : '';
        h += `<div class="ts-item${doneCls}" draggable="true" ondragstart="onTodoDragStart(event,'${item.id}')" data-id="${item.id}">`;
        h += `<div class="ts-cb"><input type="checkbox" ${isDone?'checked':''} onchange="toggleTodo('${item.id}',this.checked)"/></div>`;
        h += `<span class="ts-mod-tag" onclick="switchTodoModule('${item.id}',this,event)" style="cursor:pointer" title="点击切换项目">${item.emoji} ${item.modName}</span>`;
        h += `<span class="ts-item-text" contenteditable="false" ondblclick="enableSlotEdit(this,'${item.id}')" onblur="disableSlotEdit(this,'${item.id}')">${esc(stripTimePrefix(item.text))}</span>`;
        h += `<div class="ts-item-actions">`;
        h += `<button class="ts-item-date" onclick="openDatePickerSlot('${item.id}',event)" title="修改日期">📅</button>`;
        h += `<button class="ts-item-remove" onclick="removeFromSlot('${item.id}','${slot.key}','${ds}')" title="移回待办区">↩</button>`;
        h += `<button class="ts-item-del" onclick="delTodoFromSlot('${item.id}','${slot.key}','${ds}')" title="删除">✕</button>`;
        h += `</div>`;
        h += `</div>`;
      });
    }
    // Add button inside each time slot
    h += `<button class="ts-add-btn" onclick="addTodoInSlot('${slot.key}','${ds}')">+ 新增待办</button>`;
    h += `</div></div>`;
  });

  h += `</div>`;
  c.innerHTML = h;
}

// Add todo in day view — quick bar
function addTodoInDay() {
  const input = document.getElementById('dayAddInput');
  const select = document.getElementById('dayAddModule');
  const text = input.value.trim();
  if(!text) { input.focus(); return; }

  const modId = select.value;
  const mod = findMod(modId);
  if(!mod) return;

  const d = new Date(NOW); d.setDate(d.getDate()+dayOffset);
  const ds = fmtDate(d);

  const newId = uid();
  const newTodo = {id:newId, text:text, status:'pending', note:'', date:ds};

  // Auto-detect date from text (might override)
  const detected = detectDateFromItem(newTodo);
  if(detected) {
    newTodo.date = detected;
    newTodo.autoDate = true;
    const normalized = normalizeRelativeTimeInText(newTodo.text, detected);
    if(normalized !== newTodo.text) newTodo.text = normalized;
  }

  mod.todos.push(newTodo);
  saveState();
  input.value = '';
  renderDay();
  toast(`✅ 已添加到「${mod.emoji} ${mod.name}」`);
}

// Add todo in day view — per module
function addTodoInDayForModule(modId) {
  const mod = findMod(modId);
  if(!mod) return;
  const d = new Date(NOW); d.setDate(d.getDate()+dayOffset);
  const ds = fmtDate(d);

  const newId = uid();
  mod.todos.push({id:newId, text:'新待办事项', status:'pending', note:'', date:ds});
  saveState();
  renderDay();
  setTimeout(()=>{
    const el = document.querySelector(`[data-id="${newId}"] .row-text`);
    if(el) {
      enableRowEdit(el, newId);
    }
  }, 50);
  toast('➕ 已添加待办');
}

// ================================================================
// INFO DETAIL PAGE
// ================================================================
let infoDetailModId = null;

function openInfoDetail(modId) {
  const mod = findMod(modId);
  if(!mod) return;
  infoDetailModId = modId;
  document.body.classList.add('show-info-detail');
  renderInfoDetailPage(mod);
  window.scrollTo(0,0);
}

function closeInfoDetail() {
  document.body.classList.remove('show-info-detail');
  infoDetailModId = null;
  renderWeek();
}

function renderInfoDetailPage(mod) {
  const c = document.getElementById('pageInfoDetail');
  const allInfos = mod.infos;

  let h = '';

  h += `<div class="info-detail-header fade-in">`;
  h += `<button class="info-back-btn" onclick="closeInfoDetail()">◀</button>`;
  h += `<div class="info-detail-title">`;
  h += `<span class="big-emoji">${mod.emoji}</span>`;
  h += `<span class="title-name">${mod.name}</span>`;
  h += `<span class="title-sub">· 全部信息备注（${allInfos.length} 条）</span>`;
  h += `</div>`;
  h += `<button class="info-detail-add" onclick="addInfoInDetail('${mod.id}')">+ 添加信息</button>`;
  h += `</div>`;

  if(!allInfos.length) {
    h += `<div class="info-empty-page fade-in"><div class="big-icon">📝</div><div>暂无信息备注</div></div>`;
    c.innerHTML = h;
    return;
  }

  const weekGroups = {};
  allInfos.forEach(i => {
    const wk = i.week || '04/14';
    const monDate = getMonday(dateToObj(wk));
    const key = fmtDate(monDate);
    if(!weekGroups[key]) weekGroups[key] = { monday: monDate, items: [] };
    weekGroups[key].items.push(i);
  });

  const sortedKeys = Object.keys(weekGroups).sort((a,b) => weekGroups[b].monday - weekGroups[a].monday);

  sortedKeys.forEach(key => {
    const grp = weekGroups[key];
    const label = getWeekLabelForMonday(grp.monday);

    h += `<div class="info-wk-card fade-in">`;
    h += `<div class="info-wk-header"><span>${label}</span><span class="range">${grp.items.length} 条</span></div>`;
    h += `<div class="info-wk-body">`;

    grp.items.forEach(i => {
      h += `<div class="info-row ${i.highlighted?'highlighted':''}" data-id="${i.id}">`;
      h += `<div class="dot"></div>`;
      h += `<textarea class="i-text i-text-area" rows="1" onblur="editInfoInDetail('${i.id}',this.value)" oninput="autoResizeTextarea(this)" placeholder="写点什么…">${esc(i.text)}</textarea>`;
      h += `<div class="i-actions">`;
      h += `<button class="act-btn ${i.highlighted?'hl-on':''}" onclick="hlInfoInDetail('${i.id}')" title="高亮">💡</button>`;
      h += `<button class="act-btn del" onclick="delInfoInDetail('${i.id}')" title="删除">✕</button>`;
      h += `</div></div>`;
    });

    h += `</div></div>`;
  });

  c.innerHTML = h;
  setTimeout(initAllTextareas, 10);
}

function editInfoInDetail(id, text) {
  const r = findInfo(id);
  if(!r) return;
  r.info.text = text.trim();
  saveState();
}

function hlInfoInDetail(id) {
  const r = findInfo(id);
  if(!r) return;
  r.info.highlighted = !r.info.highlighted;
  saveState();
  const mod = findMod(infoDetailModId);
  if(mod) renderInfoDetailPage(mod);
  toast('💡 高亮已切换');
}

let _delInfoDetailLock = false;
async function delInfoInDetail(id) {
  if(_delInfoDetailLock) return;
  _delInfoDetailLock = true;
  try {
    const ok = await showConfirm('确定要删除这条信息吗？');
    if(!ok) return;
    MODULES.forEach(m => { m.infos = m.infos.filter(i=>i.id!==id); });
    saveState();
    const mod = findMod(infoDetailModId);
    if(mod) renderInfoDetailPage(mod);
    toast('🗑️ 已删除');
  } finally {
    _delInfoDetailLock = false;
  }
}

function addInfoInDetail(modId) {
  const mod = findMod(modId);
  if(!mod) return;
  const newId = uid();
  const currentMonday = fmtDate(getCurrentWeekMonday());
  mod.infos.push({id:newId, text:'', highlighted:false, week:currentMonday});
  saveState();
  renderInfoDetailPage(mod);
  setTimeout(()=>{
    const el = document.querySelector(`#pageInfoDetail [data-id="${newId}"] .i-text-area`);
    if(el) { el.focus(); autoResizeTextarea(el); }
  }, 50);
  toast('➕ 已添加信息');
}

// ================================================================
// INTERACTIONS
// ================================================================
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('weekView').classList.toggle('active',v==='week');
  document.getElementById('dayView').classList.toggle('active',v==='day');
  document.getElementById('weekNavBar').style.display = v==='week'?'flex':'none';
  if(v==='day') renderDay();
  if(v==='week') renderWeek();
}

// --- Todo ---
function toggleTodo(id,checked) {
  const r=findTodo(id);
  if(r) r.todo.status=checked?'done':'pending';
  saveState();
  toast(checked?'✅ 已完成':'↩️ 已恢复');
  setTimeout(()=>{ renderWeek(); if(currentView==='day') renderDay(); }, 200);
}

// Double-click to enable editing on a day-view draggable todo
function enableRowEdit(el, todoId) {
  el.contentEditable = 'true';
  el.focus();
  // Select all text for easy replacement
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  // Temporarily disable draggable on parent row
  const row = el.closest('.row');
  if(row) row.draggable = false;
}
function disableRowEdit(el, todoId) {
  editTodoText(todoId, el.textContent);
  el.contentEditable = 'false';
  // Restore draggable
  const row = el.closest('.row');
  if(row) row.draggable = true;
}

// Same pattern for time-slot items
function enableSlotEdit(el, todoId) {
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  const item = el.closest('.ts-item');
  if(item) item.draggable = false;
}
function disableSlotEdit(el, todoId) {
  editTodoText(todoId, el.textContent);
  el.contentEditable = 'false';
  const item = el.closest('.ts-item');
  if(item) item.draggable = true;
}

// Switch a todo's module via a dropdown menu near the clicked tag
function switchTodoModule(todoId, tagEl, event) {
  event.stopPropagation();
  // Remove any existing menu
  const old = document.getElementById('modSwitchMenu');
  if(old) old.remove();

  const r = findTodo(todoId);
  if(!r) return;

  const menu = document.createElement('div');
  menu.id = 'modSwitchMenu';
  menu.style.cssText = 'position:fixed;z-index:9999;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:4px 0;min-width:140px;';
  const rect = tagEl.getBoundingClientRect();
  menu.style.left = rect.left + 'px';
  menu.style.top = (rect.bottom + 4) + 'px';

  MODULES.forEach(mod => {
    const item = document.createElement('div');
    const isCurrent = mod.id === r.mod.id;
    item.style.cssText = 'padding:8px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;' + (isCurrent ? 'background:var(--primary-soft);font-weight:600;' : '');
    item.innerHTML = `<span>${mod.emoji}</span><span>${mod.name}</span>${isCurrent ? '<span style="margin-left:auto;color:var(--primary)">✓</span>' : ''}`;
    item.onmouseenter = () => { if(!isCurrent) item.style.background = '#f5f5f5'; };
    item.onmouseleave = () => { if(!isCurrent) item.style.background = ''; };
    item.onclick = (e) => {
      e.stopPropagation();
      menu.remove();
      if(isCurrent) return;
      // Move todo from current module to target module
      const todo = r.todo;
      r.mod.todos = r.mod.todos.filter(t => t.id !== todoId);
      mod.todos.push(todo);
      saveState();
      if(currentView === 'day') renderDay();
      else renderWeek();
      toast(`📂 已移到「${mod.emoji} ${mod.name}」`);
    };
    menu.appendChild(item);
  });

  document.body.appendChild(menu);
  // Close on click outside
  setTimeout(() => {
    const closeHandler = (e) => {
      if(!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closeHandler); }
    };
    document.addEventListener('click', closeHandler);
  }, 0);
}

function editTodoText(id,text) {
  const r=findTodo(id);
  if(!r) return;
  const trimmed = text.trim();
  r.todo.text = trimmed;

  tryAutoDetectDate(r.todo);
  saveState();
}

// Centralized auto-detect date logic — used by editTodoText, oninput, and addTodo
function tryAutoDetectDate(todo) {
  const detected = detectDateFromItem(todo);
  if(detected && detected !== todo.date) {
    todo.date = detected;
    todo.autoDate = true;

    const normalized = normalizeRelativeTimeInText(todo.text, detected);
    if(normalized !== todo.text) {
      todo.text = normalized;
    }
    if(todo.note) {
      const normalizedNote = normalizeRelativeTimeInText(todo.note, detected);
      if(normalizedNote !== todo.note) todo.note = normalizedNote;
    }

    toast(`🔍 自动识别日期：${detected}`);
    saveState();
    setTimeout(()=>{ renderWeek(); if(currentView==='day') renderDay(); }, 100);
    return true;
  }
  return false;
}

function addTodo(modId) {
  const mod=findMod(modId);
  if(!mod) return;
  const newId = uid();

let openDatePickerTodoId = null;

function closeDatePicker() {
  const existing = document.querySelector('.date-picker-popover');

  openDatePickerTodoId = null;
}

function openDatePicker(todoId, event) {
  event.stopPropagation();
  closeDatePicker();
  openDatePickerTodoId = todoId;

  const row = event.target.closest('.row');
  if(!row) return;

  const today = new Date();
  const todayStr = fmtDate(today);
  const wdNames = ['日','一','二','三','四','五','六'];

  let h = '<div class="date-picker-popover" onclick="event.stopPropagation()">';
  h += '<div class="dp-title">选择日期</div>';
  h += '<div class="dp-shortcuts">';

  // Generate 14 days starting from today, in chronological order
  for(let i = 0; i < 14; i++) {
    const dd = new Date(today); dd.setDate(today.getDate() + i);
    const dds = fmtDate(dd);
    let label;
    if(i === 0) label = '今天';
    else if(i === 1) label = '明天';
    else if(i === 2) label = '后天';
    else {
      // Show "周X" for this week, "下周X" for next week
      const todayMon = getMonday(today);
      const ddMon = getMonday(dd);
      const isNextWeek = ddMon.getTime() > todayMon.getTime();
      label = (isNextWeek ? '下' : '') + '周' + wdNames[dd.getDay()];
    }
    h += `<button class="dp-shortcut" onclick="assignDate('${todoId}','${dds}')">${label}</button>`;
  }

  // Clear date option (only show if todo already has a date)
  const r = findTodo(todoId);
  if(r && r.todo.date) {
    h += `<button class="dp-shortcut" style="color:var(--danger);margin-top:4px" onclick="assignDate('${todoId}','')">✕ 清除日期</button>`;
  }

  h += '</div></div>';
  row.style.position = 'relative';
  row.insertAdjacentHTML('beforeend', h);
}

// ================================================================
// TIME SLOT STORAGE (localStorage cache + cloud sync)
// ================================================================

function loadTimeSlots() {
  try { return JSON.parse(localStorage.getItem(SLOT_KEY) || '{}'); } catch(e) { return {}; }
}

function saveTimeSlots(data) {
  localStorage.setItem(SLOT_KEY, JSON.stringify(data));
  // Schedule cloud sync (will include timeSlots)
  scheduleCloudSync();
}

function getTimeSlots(dateStr) {
  const all = loadTimeSlots();
  return all[dateStr] || { morning: [], afternoon: [], evening: [] };
}

function setTimeSlots(dateStr, slots) {
  const all = loadTimeSlots();
  all[dateStr] = slots;
  saveTimeSlots(all);
}

// ================================================================
// DRAG & DROP for time planner
// ================================================================
let dragTodoId = null;

function onTodoDragStart(event, todoId) {
  dragTodoId = todoId;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', todoId);
  setTimeout(() => {
    // Support both .row and .ts-item drag sources
    const el = event.target.closest('.row') || event.target.closest('.ts-item');
    if(el) el.classList.add('dragging');
  }, 0);
}

document.addEventListener('dragend', () => {
  document.querySelectorAll('.row.dragging, .ts-item.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.time-slot.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragTodoId = null;
});

function onSlotDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const slot = event.target.closest('.time-slot');
  if(slot) slot.classList.add('drag-over');
}

function onSlotDragLeave(event) {
  const slot = event.target.closest('.time-slot');
  if(slot && !slot.contains(event.relatedTarget)) slot.classList.remove('drag-over');
}

let _dropLock = false;
function onSlotDrop(event, slotKey, dateStr) {
  event.preventDefault();
  event.stopPropagation();
  const slot = event.target.closest('.time-slot');
  if(slot) slot.classList.remove('drag-over');

  if(_dropLock) return;
  const todoId = event.dataTransfer.getData('text/plain') || dragTodoId;
  if(!todoId) return;
  if(!findTodo(todoId)) return; // Don't add non-existent todo
  _dropLock = true;

  const slots = getTimeSlots(dateStr);
  if(!slots.morning) slots.morning = [];
  if(!slots.afternoon) slots.afternoon = [];
  if(!slots.evening) slots.evening = [];

  // Remove from all slots first
  ['morning','afternoon','evening'].forEach(k => {
    slots[k] = slots[k].filter(id => id !== todoId);
  });
  slots[slotKey].push(todoId);
  setTimeSlots(dateStr, slots);
  renderDay();
  _dropLock = false;

  const slotNames = { morning: '上午', afternoon: '下午', evening: '晚上' };
  toast(`⏰ 已安排到${slotNames[slotKey]}`);
}

// Get which slot label a todo is in
function getSlotLabelForTodo(todoId, slotData) {
  const labels = { morning: '上午', afternoon: '下午', evening: '晚上' };
  for(const key of ['morning','afternoon','evening']) {
    if(slotData[key] && slotData[key].includes(todoId)) return labels[key];
  }
  return '';
}

// ---- Todo list drop zone (for dragging back from time slots) ----
function onTodoListDragOver(e) {
  e.preventDefault();
  const zone = document.getElementById('todoListDropZone');
  if(zone) zone.classList.add('drop-highlight');
}
function onTodoListDragLeave(e) {
  const zone = document.getElementById('todoListDropZone');
  if(zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drop-highlight');
}
function onTodoListDrop(e, dateStr) {
  e.preventDefault();
  e.stopPropagation();
  const zone = document.getElementById('todoListDropZone');
  if(zone) zone.classList.remove('drop-highlight');

  const todoId = e.dataTransfer.getData('text/plain') || dragTodoId;
  if(!todoId) return;

  // Remove from all slots
  const slots = getTimeSlots(dateStr);
  let removed = false;
  ['morning','afternoon','evening'].forEach(k => {
    if(slots[k] && slots[k].includes(todoId)) {
      slots[k] = slots[k].filter(id => id !== todoId);
      removed = true;
    }
  });
  if(removed) {
    setTimeSlots(dateStr, slots);
    renderDay();
    toast('↩️ 已移回待办区');
  }
}

function removeFromSlot(todoId, slotKey, dateStr) {
  const slots = getTimeSlots(dateStr);
  if(slots[slotKey]) {
    slots[slotKey] = slots[slotKey].filter(id => id !== todoId);
    setTimeSlots(dateStr, slots);
    renderDay();
    toast('↩️ 已移回待办区');
  }
}

// Delete a todo from time slot (removes from slot AND from MODULES)
let _delSlotLock = false;
async function delTodoFromSlot(todoId, slotKey, dateStr) {
  if(_delSlotLock) return;
  _delSlotLock = true;
  try {
    const ok = await showConfirm('确定要删除这条待办吗？');
    if(!ok) return;
    // Remove from slot
    const slots = getTimeSlots(dateStr);
    if(slots[slotKey]) {
      slots[slotKey] = slots[slotKey].filter(id => id !== todoId);
      setTimeSlots(dateStr, slots);
    }
    // Remove from MODULES
    MODULES.forEach(m => { m.todos = m.todos.filter(t => t.id !== todoId); });
    saveState();
    renderDay();
    toast('🗑️ 已删除');
  } finally {
    _delSlotLock = false;
  }
}

// Add a new todo directly into a time slot
function addTodoInSlot(slotKey, dateStr) {
  // Use the module selected in day view's add bar, or fallback to first module
  const select = document.getElementById('dayAddModule');
  const modId = select ? select.value : (MODULES[0] ? MODULES[0].id : null);
  const mod = modId ? findMod(modId) : MODULES[0];
  if(!mod) return;

  const newId = uid();
  const newTodo = {id:newId, text:'新待办事项', status:'pending', note:'', date:dateStr};
  mod.todos.push(newTodo);

  // Assign to slot
  const slots = getTimeSlots(dateStr);
  if(!slots[slotKey]) slots[slotKey] = [];
  slots[slotKey].push(newId);
  setTimeSlots(dateStr, slots);

  saveState();
  renderDay();

  // Focus on the new item text for editing
  setTimeout(() => {
    const el = document.querySelector(`.ts-item[data-id="${newId}"] .ts-item-text`);
    if(el) {
      enableSlotEdit(el, newId);
      el.onblur = function() {
        const newText = el.textContent.trim();
        if(newText && newText !== '新待办事项') {
          editTodoText(newId, newText);
        } else if(!newText) {
          editTodoText(newId, '新待办事项');
        }
        el.contentEditable = 'false';
        const item = el.closest('.ts-item');
        if(item) item.draggable = true;
        renderDay();
      };
    }
  }, 50);

  const slotNames = { morning: '上午', afternoon: '下午', evening: '晚上' };
  toast(`➕ 已添加到${slotNames[slotKey]}`);
}

// ================================================================
// INIT
// ================================================================
loadState(); // Fast: load from localStorage first

// 规范化所有 info 的 week 字段
function normalizeInfoWeeks() {
  MODULES.forEach(mod => {
    mod.infos.forEach(i => {
      if(!i.week) {
        i.week = fmtDate(getMonday(NOW));
      } else {
        const d = dateToObj(i.week);
        const mon = getMonday(d);
        i.week = fmtDate(mon);
      }
    });
  });
}

function deduplicateTodos() {
  const seenTodoIds = new Set();
  MODULES.forEach(mod => {
    mod.todos = mod.todos.filter(t => {
      if(seenTodoIds.has(t.id)) return false;
      seenTodoIds.add(t.id);
      return true;
    });
  });
}

function autoDetectAllDates() {
  let autoFixed = 0;
  MODULES.forEach(mod => {
    mod.todos.forEach(t => {
      if(!t.date || t.date === '') {
        const detected = detectDateFromItem(t);
        if(detected) {
          t.date = detected;
          t.autoDate = true;
          const normalized = normalizeRelativeTimeInText(t.text, detected);
          if(normalized !== t.text) t.text = normalized;
          if(t.note) {
            const normalizedNote = normalizeRelativeTimeInText(t.note, detected);
            if(normalizedNote !== t.note) t.note = normalizedNote;
          }
          autoFixed++;
        }
      } else if(t.autoDate && t.date) {
        const detected = detectDateFromItem(t);
        if(detected && detected !== t.date) {
          t.date = detected;
          const normalized = normalizeRelativeTimeInText(t.text, detected);
          if(normalized !== t.text) t.text = normalized;
          if(t.note) {
            const normalizedNote = normalizeRelativeTimeInText(t.note, detected);
            if(normalizedNote !== t.note) t.note = normalizedNote;
          }
          autoFixed++;
        } else {
          const normalized = normalizeRelativeTimeInText(t.text, t.date);
          if(normalized !== t.text) t.text = normalized;
          if(t.note) {
            const normalizedNote = normalizeRelativeTimeInText(t.note, t.date);
            if(normalizedNote !== t.note) t.note = normalizedNote;
          }
        }
      }
    });
  });
  return autoFixed;
}

// Initial render with local data (fast) — DO NOT trigger cloud sync yet
normalizeInfoWeeks();
deduplicateTodos();
let autoFixed = autoDetectAllDates();
if(autoFixed > 0) {
  setTimeout(() => toast(`🔍 自动识别了 ${autoFixed} 条待办的日期`), 500);
}

// Save normalized data to localStorage only (no cloud sync until cloud data is loaded)
// IMPORTANT: preserve original updated_at for cloud comparison — do NOT stamp new time here
localStorage.setItem(STORE_KEY, JSON.stringify({ modules: MODULES, updated_at: _localUpdatedAt || '' }));

document.getElementById('weekLabel').textContent = getWeekLabel();
renderWeek();

// Then async: load from cloud and refresh if newer data exists
(async function initCloudSync() {
  const loaded = await loadFromCloud();
  if(loaded) {
    restoreUidCounter();
    normalizeInfoWeeks();
    deduplicateTodos();
    autoDetectAllDates();
    // Save normalized cloud data back to localStorage
    localStorage.setItem(STORE_KEY, JSON.stringify({ modules: MODULES, updated_at: _localUpdatedAt }));
    document.getElementById('weekLabel').textContent = getWeekLabel();
    if(currentView === 'week') renderWeek();
    else renderDay();
    _cloudReady = true;
    showSyncStatus('saved');
    console.log('✅ Cloud data loaded and synced');
  } else {
    _cloudReady = true;
    // Local is newer or first time — push local data to cloud
    await syncToCloud();
    console.log('☁️ Local data pushed to cloud');
  }
})();

// Protect against data loss on page close/navigate — force sync immediately
window.addEventListener('beforeunload', () => {
  if(!_cloudAvailable || !_supabaseClient) return;
  // Use sendBeacon for reliable delivery even during page close
  const payload = JSON.stringify({
    id: DATA_ROW_ID,
    modules: MODULES,
    time_slots: JSON.parse(localStorage.getItem(SLOT_KEY) || '{}'),
    updated_at: new Date().toISOString()
  });
  // sendBeacon with Supabase REST API
  const url = SUPABASE_URL + '/rest/v1/schedule_data?on_conflict=id';
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'resolution=merge-duplicates'
  };
  try {
    const blob = new Blob([payload], { type: 'application/json' });
    // navigator.sendBeacon doesn't support custom headers, use fetch keepalive instead
    fetch(url, {
      method: 'POST',
      headers: headers,
      body: payload,
      keepalive: true
    }).catch(() => {});
  } catch(e) {}
});

// Also sync when tab becomes hidden (user switches tabs)
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden' && _cloudAvailable) {
    syncToCloud();
  }
});
