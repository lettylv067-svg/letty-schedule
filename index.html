// STATE (localStorage cache + Supabase cloud)

let currentView = 'week';
// STORE_KEY / SLOT_KEY are now dynamic — use getStoreKey() / getSlotKey()

function loadState() {
  // Load from localStorage (fast, offline-capable)
  const raw = localStorage.getItem(getStoreKey());
  if (!raw) return false;
  try {
    const saved = JSON.parse(raw);
    if (saved.modules) MODULES = saved.modules;
    if (saved.updated_at) _localUpdatedAt = saved.updated_at;
    restoreUidCounter();
    return true;
  } catch(e) { return false; }
}

function restoreUidCounter() {
  let maxId = _uid;
  MODULES.forEach(m => {
    m.todos.forEach(t => {
      const n = parseInt(t.id.replace('u',''), 10);
      if(!isNaN(n) && n > maxId) maxId = n;
    });
    if(m.infos) m.infos.forEach(i => {
      const n = parseInt(i.id.replace('u',''), 10);
      if(!isNaN(n) && n > maxId) maxId = n;
    });
  });
  _uid = maxId;
}

function saveState() {
  // Block saves during version preview (read-only mode)
  if(_isPreviewingVersion) {
    toast('⚠️ 预览模式下无法编辑，请先退出预览');
    return;
  }
  // 1. Instantly save to localStorage (never blocks UI)
  const now = new Date().toISOString();
  localStorage.setItem(getStoreKey(), JSON.stringify({
    modules: MODULES, updated_at: now
  }));
  _localUpdatedAt = now;
  _userHasEdited = true;
  // 2. Schedule debounced cloud push
  if(_cloudReady) {
    scheduleCloudSync();
  } else {
    _pendingSync = true;
  }
}

// ================================================================
// VERSION MANAGEMENT — 版本历史 (最多保留 5 个)
// ================================================================
// VERSION_KEY / VERSION_ROW_ID are now dynamic — use getVersionKey() / getVersionRowId()
const MAX_VERSIONS = 5;

let _versions = [];              // Array of version snapshots
let _selectedVersionIdx = -1;    // Currently selected version in panel
let _isPreviewingVersion = false;
let _previewBackup = null;       // Backup of real data while previewing

// --- Save a version snapshot (called after each successful cloud push) ---
async function saveVersionSnapshot() {
  const snapshot = {
    id: 'v_' + Date.now(),
    timestamp: new Date().toISOString(),
    modules: JSON.parse(JSON.stringify(MODULES)),
    timeSlots: JSON.parse(localStorage.getItem(getSlotKey()) || '{}'),
    summary: generateVersionSummary()
  };

  // Add to front, limit to MAX_VERSIONS
  _versions.unshift(snapshot);
  if(_versions.length > MAX_VERSIONS) {
    _versions = _versions.slice(0, MAX_VERSIONS);
  }

  // Save to localStorage
  localStorage.setItem(getVersionKey(), JSON.stringify(_versions));

  // Push to cloud (separate row)
  if(_cloudAvailable && _supabaseClient) {
    try {
      await _supabaseClient
        .from('schedule_data')
        .upsert({
          id: getVersionRowId(),
          modules: _versions, // reuse modules column to store versions array
          updated_at: new Date().toISOString()
        }, { onConflict: 'id' });
      console.log('📸 Version snapshot saved to cloud');
    } catch(e) {
      console.warn('Version cloud save failed:', e);
    }
  }
}

// Generate a brief summary for the version
function generateVersionSummary() {
  let totalTodos = 0, doneTodos = 0, totalInfos = 0;
  MODULES.forEach(m => {
    totalTodos += m.todos.length;
    doneTodos += m.todos.filter(t => t.status === 'done').length;
    totalInfos += (m.infos || []).length;
  });
  return `${MODULES.length} 模块 · ${totalTodos} 待办(${doneTodos}完成) · ${totalInfos} 信息`;
}

// --- Load versions from cloud or localStorage ---
async function loadVersions() {
  // Try cloud first
  if(_cloudAvailable && _supabaseClient) {
    try {
      const { data, error } = await _supabaseClient
        .from('schedule_data')
        .select('*')
        .eq('id', getVersionRowId())
        .single();
      if(!error && data && data.modules && Array.isArray(data.modules)) {
        _versions = data.modules;
        localStorage.setItem(getVersionKey(), JSON.stringify(_versions));
        console.log(`📸 Loaded ${_versions.length} versions from cloud`);
        return;
      }
    } catch(e) {
      console.warn('Version cloud load failed:', e);
    }
  }

  // Fallback to localStorage
  try {
    const raw = localStorage.getItem(getVersionKey());
    if(raw) _versions = JSON.parse(raw);
  } catch(e) {
    _versions = [];
  }
}

function formatVersionTime(d) {
  const now = new Date();
  const y = d.getFullYear(), mo = d.getMonth(), da = d.getDate();
  const ny = now.getFullYear(), nmo = now.getMonth(), nda = now.getDate();

  let dateStr;
  if(y === ny && mo === nmo && da === nda) {
    dateStr = '今天';
  } else {
    const yesterday = new Date(now); yesterday.setDate(nda - 1);
    if(y === yesterday.getFullYear() && mo === yesterday.getMonth() && da === yesterday.getDate()) {
      dateStr = '昨天';
    } else {
      dateStr = `${mo + 1}月${da}日`;
    }
  }
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const ss = String(d.getSeconds()).padStart(2, '0');
  return `${dateStr} ${hh}:${mm}:${ss}`;
}

function getRelativeTime(d) {
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return '刚刚';
  if(mins < 60) return `${mins} 分钟前`;
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return `${hrs} 小时前`;
  const days = Math.floor(hrs / 24);
  return `${days} 天前`;
}

// ================================================================
// VERSION DIFF — compute differences between current and old version
// ================================================================
// _versionDiff stores the computed diff while in preview mode
// Structure: { todos: { id -> 'added'|'removed'|'changed' }, infos: { id -> 'added'|'removed'|'changed' }, modules: { id -> 'added'|'removed' } }
let _versionDiff = null;

function computeVersionDiff(currentModules, oldModules) {
  const diff = { todos: {}, infos: {}, modules: {} };

  // Build lookup maps for current data
  const curModMap = {};
  const curTodoMap = {};
  const curInfoMap = {};
  currentModules.forEach(m => {
    curModMap[m.id] = m;
    m.todos.forEach(t => { curTodoMap[t.id] = { todo: t, modId: m.id }; });
    (m.infos || []).forEach(i => { curInfoMap[i.id] = { info: i, modId: m.id }; });
  });

  // Build lookup maps for old (preview) data
  const oldModMap = {};
  const oldTodoMap = {};
  const oldInfoMap = {};
  oldModules.forEach(m => {
    oldModMap[m.id] = m;
    m.todos.forEach(t => { oldTodoMap[t.id] = { todo: t, modId: m.id }; });
    (m.infos || []).forEach(i => { oldInfoMap[i.id] = { info: i, modId: m.id }; });
  });

  // --- Module-level diff ---
  for(const mId in oldModMap) {
    if(!curModMap[mId]) {
      diff.modules[mId] = 'added'; // old has it, current doesn't → "will be recovered"
    }
  }
  for(const mId in curModMap) {
    if(!oldModMap[mId]) {
      diff.modules[mId] = 'removed'; // current has it, old doesn't → "will be lost"
    }
  }

  // --- Todo-level diff ---
  // "added" = exists in old version but NOT in current → restoring will bring it back (green)
  for(const tId in oldTodoMap) {
    if(!curTodoMap[tId]) {
      diff.todos[tId] = 'added';
    } else {
      // Both exist — check if content or status changed
      const oldT = oldTodoMap[tId].todo;
      const curT = curTodoMap[tId].todo;
      if(oldT.text !== curT.text || oldT.status !== curT.status || oldT.date !== curT.date || oldT.note !== curT.note) {
        diff.todos[tId] = 'changed';
      }
    }
  }
  // "removed" = exists in current but NOT in old → restoring will lose it (red)
  // We need to inject "ghost" items in the preview for these
  for(const tId in curTodoMap) {
    if(!oldTodoMap[tId]) {
      diff.todos[tId] = 'removed';
    }
  }

  // --- Info-level diff ---
  for(const iId in oldInfoMap) {
    if(!curInfoMap[iId]) {
      diff.infos[iId] = 'added';
    } else {
      const oldI = oldInfoMap[iId].info;
      const curI = curInfoMap[iId].info;
      if(oldI.text !== curI.text || oldI.highlighted !== curI.highlighted) {
        diff.infos[iId] = 'changed';
      }
    }
  }
  for(const iId in curInfoMap) {
    if(!oldInfoMap[iId]) {
      diff.infos[iId] = 'removed';
    }
  }

  return diff;
}

// Build "ghost" items for removed todos/infos (items that exist in current but will be lost)
function injectGhostItems(currentModules, oldModules) {
  const oldModMap = {};
  oldModules.forEach(m => { oldModMap[m.id] = m; });

  const curTodoMap = {};
  const curInfoMap = {};
  currentModules.forEach(m => {
    m.todos.forEach(t => { curTodoMap[t.id] = { todo: t, modId: m.id }; });
    (m.infos || []).forEach(i => { curInfoMap[i.id] = { info: i, modId: m.id }; });
  });

  // For each module in oldModules, append ghost todos/infos that exist in current but not in old
  oldModules.forEach(m => {
    const curMod = currentModules.find(cm => cm.id === m.id);
    if(!curMod) return;

    // Ghost todos: in current module but not in old module
    curMod.todos.forEach(t => {
      const existsInOld = m.todos.some(ot => ot.id === t.id);
      if(!existsInOld) {
        m.todos.push({ ...JSON.parse(JSON.stringify(t)), _ghost: true });
      }
    });

    // Ghost infos: in current module but not in old module
    (curMod.infos || []).forEach(i => {
      const existsInOld = (m.infos || []).some(oi => oi.id === i.id);
      if(!existsInOld) {
        if(!m.infos) m.infos = [];
        m.infos.push({ ...JSON.parse(JSON.stringify(i)), _ghost: true });
      }
    });
  });

  // Ghost modules: modules that exist in current but not in old
  currentModules.forEach(cm => {
    if(!oldModMap[cm.id]) {
      const ghost = JSON.parse(JSON.stringify(cm));
      ghost._ghost = true;
      ghost.todos.forEach(t => { t._ghost = true; });
      (ghost.infos || []).forEach(i => { i._ghost = true; });
      oldModules.push(ghost);
    }
  });
}

function getDiffClass(id, type) {
  if(!_versionDiff) return '';
  const map = type === 'todo' ? _versionDiff.todos : _versionDiff.infos;
  const d = map[id];
  if(d === 'added') return ' diff-added';
  if(d === 'removed') return ' diff-removed';
  if(d === 'changed') return ' diff-changed';
  return '';
}

function getModDiffClass(modId) {
  if(!_versionDiff) return '';
  const d = _versionDiff.modules[modId];
  if(d === 'added') return '<span class="diff-mod-badge diff-mod-new">找回的模块</span>';
  if(d === 'removed') return '<span class="diff-mod-badge diff-mod-removed">未插入</span>';
  return '';
}

function getDiffSummary() {
  if(!_versionDiff) return '';
  let added = 0, removed = 0, changed = 0;
  Object.values(_versionDiff.todos).forEach(d => {
    if(d === 'added') added++;
    else if(d === 'removed') removed++;
    else if(d === 'changed') changed++;
  });
  Object.values(_versionDiff.infos).forEach(d => {
    if(d === 'added') added++;
    else if(d === 'removed') removed++;
    else if(d === 'changed') changed++;
  });
  const parts = [];
  if(added) parts.push(`${added} 项找回`);
  if(removed) parts.push(`${removed} 项未插入`);
  if(changed) parts.push(`${changed} 项有变化`);
  return parts.length ? parts.join('，') : '无差异';
}

// --- Preview a version (read-only, non-destructive) ---
function previewSelectedVersion() {
  if(_selectedVersionIdx < 0) return;
  const ver = _versions[_selectedVersionIdx];
  if(!ver) return;

  // Backup current real data
  _previewBackup = {
    modules: JSON.parse(JSON.stringify(MODULES)),
    timeSlots: localStorage.getItem(getSlotKey()),
    localUpdatedAt: _localUpdatedAt,
    versionIdx: _selectedVersionIdx
  };

  // Compute diff: current vs old version
  const currentMods = JSON.parse(JSON.stringify(MODULES));
  const oldMods = JSON.parse(JSON.stringify(ver.modules));
  _versionDiff = computeVersionDiff(currentMods, oldMods);

  // Apply version data (temporarily, NOT saving)
  MODULES = JSON.parse(JSON.stringify(ver.modules));

  // Inject ghost items (items that exist in current but not old, shown in red)
  injectGhostItems(currentMods, MODULES);

  if(ver.timeSlots) {
    localStorage.setItem(getSlotKey(), JSON.stringify(ver.timeSlots));
  }

  _isPreviewingVersion = true;

  // Close panel
  closeVersionPanel();

  // Show preview banner with diff summary
  const banner = document.getElementById('versionPreviewBanner');
  const d = new Date(ver.timestamp);
  const diffSummary = getDiffSummary();
  document.getElementById('vpBannerText').innerHTML =
    `📷 正在预览「${formatVersionTime(d)}」的版本` +
    `<span class="diff-legend">` +
      `<span class="diff-legend-item"><span class="diff-legend-dot" style="background:#34c759"></span>找回</span>` +
      `<span class="diff-legend-item"><span class="diff-legend-dot" style="background:#ff3b30"></span>未插入</span>` +

function restoreFromPreview() {

  MODULES.forEach(m => {

  _previewBackup = null;
  _versionDiff = null;

  document.getElementById('versionPreviewBanner').classList.remove('active');

function exportData() {
  const data = {
    _format: 'letty_schedule_backup',
    _version: 3,
    _exportedAt: new Date().toISOString(),
    modules: MODULES,
    timeSlots: JSON.parse(localStorage.getItem(getSlotKey()) || '{}')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `letty-schedule-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ 数据已导出');
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data._format !== 'letty_schedule_backup') {
        toast('❌ 文件格式不正确'); return;
      }
      // Confirm before overwriting
      if (!confirm('导入将覆盖当前所有数据，确定继续？\n\n建议先导出当前数据作为备份。')) return;
      if (data.modules) {
        MODULES = data.modules;
        saveState();
      }
      if (data.timeSlots) {
        localStorage.setItem(getSlotKey(), JSON.stringify(data.timeSlots));
      }
      // Restore _uid counter
      let maxId = _uid;
      MODULES.forEach(m => {
        m.todos.forEach(t => { const n=parseInt(t.id.replace('u',''),10); if(!isNaN(n)&&n>maxId) maxId=n; });
        if(m.infos) m.infos.forEach(i => { const n=parseInt(i.id.replace('u',''),10); if(!isNaN(n)&&n>maxId) maxId=n; });
      });
      _uid = maxId;
      // Re-render
      if (currentView === 'week') renderWeek(); else renderDay();
      // Sync imported data to cloud
      scheduleCloudSync();
      toast('✅ 数据已导入恢复');
    } catch(err) {
      toast('❌ 文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  evt.target.value = ''; // allow re-selecting same file
}

function toast(msg) { const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200); }
function findMod(modId) { return MODULES.find(m=>m.id===modId); }
function findTodo(todoId) { for(const m of MODULES) { const t=m.todos.find(x=>x.id===todoId); if(t) return {mod:m,todo:t}; } return null; }

// Sort todos:
// - If any todo has sortIndex (user manually reordered) → sort by sortIndex only
// - Otherwise → dated items by date ASC (same date → original order), undated last
function sortTodos(todos) {
  const hasManualSort = todos.some(t => typeof t.sortIndex === 'number');
  if(hasManualSort) {
    return [...todos].sort((a, b) => {
      const sa = typeof a.sortIndex === 'number' ? a.sortIndex : 9999;
      const sb = typeof b.sortIndex === 'number' ? b.sortIndex : 9999;
      if(sa !== sb) return sa - sb;
      return todos.indexOf(a) - todos.indexOf(b);
    });
  }
  return [...todos].sort((a, b) => {
    const da = a.date || '', db = b.date || '';
    if(da && db) {
      if(da !== db) return da.localeCompare(db);
      return todos.indexOf(a) - todos.indexOf(b);
    }
    if(da && !db) return -1;
    if(!da && db) return 1;
    return todos.indexOf(a) - todos.indexOf(b);
  });
}
function findInfo(infoId) { for(const m of MODULES) { const i=m.infos.find(x=>x.id===infoId); if(i) return {mod:m,info:i}; } return null; }
function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// Strip leading time expressions for day view display (data unchanged)
function stripTimePrefix(text) {
  if(!text) return text;
  // Remove leading day references: 周五、今天、明天、后天、下周一 etc.
  let s = text.replace(/^(下周[一二三四五六日天]|周[一二三四五六日天]|今天|明天|后天|大后天)\s*/g, '');
  // Also remove mid-sentence standalone day refs followed by time/action
  s = s.replace(/(：|:)\s*(下周[一二三四五六日天]|周[一二三四五六日天]|今天|明天|后天|大后天)\s*/g, '$1');
  return s || text; // fallback to original if everything got stripped
}

// Textarea 自动撑高（优化版：减少 reflow）
function autoResizeTextarea(el) {
  if (!el.value || el.value.trim() === '') {
    el.style.height = '24px';
    return;
  }
  // Temporarily allow scroll so scrollHeight reflects true content height
  el.style.overflow = 'auto';
  el.style.height = '0';
  const sh = el.scrollHeight;
  el.style.height = Math.max(24, sh) + 'px';
  el.style.overflow = 'hidden';
}

// 页面渲染后批量初始化所有 textarea 高度（用 rAF 避免阻塞滚动）
function initAllTextareas() {
  requestAnimationFrame(() => {
    const els = document.querySelectorAll('.info-note-area, .i-text-area');
    els.forEach(el => autoResizeTextarea(el));
  });
}

let _confirmResolve = null;
function showConfirm(msg) {
  return new Promise(resolve => {
    // If a confirm is already open, reject the previous one
    if(_confirmResolve) {
      _confirmResolve(false);
      _confirmResolve = null;
    }
    _confirmResolve = resolve;
    const root = document.getElementById('confirmRoot');
    root.innerHTML = `
      <div class="confirm-overlay" id="cfOverlay">
        <div class="confirm-box scale-in">
          <p>${msg}</p>
          <div class="confirm-btns">
            <button class="btn-cancel" id="cfCancel">取消</button>
            <button class="btn-danger" id="cfOk">确认删除</button>
          </div>
        </div>
      </div>`;
    document.getElementById('cfOverlay').onclick = (e) => {
      if(e.target.id === 'cfOverlay') { root.innerHTML=''; if(_confirmResolve){_confirmResolve(false);_confirmResolve=null;} }
    };
    document.getElementById('cfCancel').onclick = () => { root.innerHTML=''; if(_confirmResolve){_confirmResolve(false);_confirmResolve=null;} };
    document.getElementById('cfOk').onclick = () => { root.innerHTML=''; if(_confirmResolve){_confirmResolve(true);_confirmResolve=null;} };
  });
}

// ================================================================
// MINI CALENDAR — for quick week/day jump
// ================================================================
let _miniCalMode = 'week'; // 'week' or 'day'
let _miniCalMonth = null;   // Date object for displayed month

function openWeekCalendar(e) {
  e.stopPropagation();
  _miniCalMode = 'week';
  const mon = getCurrentWeekMonday();
  _miniCalMonth = new Date(mon.getFullYear(), mon.getMonth(), 1);
  showMiniCal(e);
}

function openDayCalendar(e) {
  e.stopPropagation();
  _miniCalMode = 'day';
  const d = new Date(NOW);
  d.setDate(d.getDate() + dayOffset);
  _miniCalMonth = new Date(d.getFullYear(), d.getMonth(), 1);
  showMiniCal(e);
}

function showMiniCal(e) {
  closeMiniCal();
  const rect = e.currentTarget.getBoundingClientRect();

  const overlay = document.createElement('div');
  overlay.className = 'mini-cal-overlay';
  overlay.onclick = closeMiniCal;

  const cal = document.createElement('div');
  cal.className = 'mini-cal';
  cal.id = 'miniCalPopover';

  // Position below the button
  let top = rect.bottom + 6;
  let left = rect.left - 100;
  if(left < 10) left = 10;
  if(left + 270 > window.innerWidth) left = window.innerWidth - 275;
  if(top + 300 > window.innerHeight) top = rect.top - 306;

  cal.style.top = top + 'px';
  cal.style.left = left + 'px';

  overlay.appendChild(cal);
  document.body.appendChild(overlay);
  renderMiniCal();
}

function closeMiniCal() {
  const el = document.querySelector('.mini-cal-overlay');
  if(el) el.remove();
}

function renderMiniCal() {
  const cal = document.getElementById('miniCalPopover');
  if(!cal) return;

  const year = _miniCalMonth.getFullYear();
  const month = _miniCalMonth.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
  // Adjust to Mon-start: Mon=0, Sun=6
  const startOffset = firstDow === 0 ? 6 : firstDow - 1;

  const today = new Date(NOW);
  const todayStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

  // Current selection for highlighting
  let selectedDates = [];
  if(_miniCalMode === 'week') {
    const mon = getCurrentWeekMonday();
    for(let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      selectedDates.push(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
    }
  } else {
    const d = new Date(NOW); d.setDate(d.getDate() + dayOffset);
    selectedDates.push(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  }

  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dowNames = ['一','二','三','四','五','六','日'];

  let h = `<div class="mini-cal-header">`;
  h += `<button class="mini-cal-nav" onclick="event.stopPropagation();miniCalNav(-1)">◀</button>`;
  h += `<span class="mini-cal-title">${year}年${monthNames[month]}</span>`;
  h += `<button class="mini-cal-nav" onclick="event.stopPropagation();miniCalNav(1)">▶</button>`;
  h += `</div>`;

  h += `<div class="mini-cal-grid">`;
  dowNames.forEach(d => { h += `<div class="mini-cal-dow">${d}</div>`; });

  // Empty cells before first day
  for(let i = 0; i < startOffset; i++) {
    h += `<div class="mini-cal-day empty"></div>`;
  }

  for(let day = 1; day <= daysInMonth; day++) {
    const key = `${year}-${month}-${day}`;
    const cls = ['mini-cal-day'];
    if(key === todayStr) cls.push('today');
    if(selectedDates.includes(key)) cls.push('selected');
    h += `<div class="${cls.join(' ')}" onclick="event.stopPropagation();miniCalSelect(${year},${month},${day})">${day}</div>`;
  }
  h += `</div>`;

  cal.innerHTML = h;
}

function miniCalNav(dir) {
  _miniCalMonth.setMonth(_miniCalMonth.getMonth() + dir);
  renderMiniCal();
}

function miniCalSelect(year, month, day) {
  const selected = new Date(year, month, day);

  if(_miniCalMode === 'week') {
    // Jump to the week containing this date
    const selectedMon = getMonday(selected);
    const thisMon = getMonday(NOW);
    const diffWeeks = Math.round((selectedMon - thisMon) / (7 * 24 * 60 * 60 * 1000));
    weekOffset = diffWeeks;
    document.getElementById('weekLabel').textContent = getWeekLabel();
    renderWeek();
  } else {
    // Jump to this day
    const today = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());
    const target = new Date(year, month, day);
    const diffDays = Math.round((target - today) / (24 * 60 * 60 * 1000));
    dayOffset = diffDays;
    renderDay();
  }
  closeMiniCal();
}

// ================================================================
// RENDER — WEEK
// ================================================================
function renderWeek() {
  const c = document.getElementById('weekView');
  const todayStr = getTodayStr();
  const weekDates = getCurrentWeekDates();
  const mon = getCurrentWeekMonday();
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const wd = ['日','一','二','三','四','五','六'];

  let h = '';

  // Week navigation card (compact, matching day-header style)
  let weekDesc = '';
  if(weekOffset === 0) weekDesc = '本周';
  else if(weekOffset === -1) weekDesc = '上周';
  else if(weekOffset === 1) weekDesc = '下周';
  else weekDesc = `${mon.getFullYear()}/${fmtDate(mon)} ~ ${fmtDate(sun)}`;

  const dateRange = `${mon.getMonth()+1}月${mon.getDate()}日 — ${sun.getMonth()+1}月${sun.getDate()}日`;

  h += `<div class="week-header-card fade-in">`;
  h += `<div class="wh-left">`;
  h += `<div class="wh-date">${dateRange}</div>`;
  h += `<div class="wh-sub">${weekDesc}</div>`;
  h += `</div>`;
  h += `<div class="wh-right">`;
  h += `<button class="wh-nav-btn" onclick="navWeek(-1)" title="上一周">◀</button>`;
  h += `<button class="wh-today-btn" onclick="navWeek(0)" title="回到本周">本周</button>`;
  h += `<button class="wh-nav-btn" onclick="navWeek(1)" title="下一周">▶</button>`;
  h += `<button class="wh-cal-btn" onclick="openWeekCalendar(event)" title="选择周">📅</button>`;
  h += `</div></div>`;

  h += '<div class="module-grid fade-in">';

  MODULES.forEach(mod => {
    const allTodos = mod.todos;
    const relevantTodos = allTodos.filter(t => {
      if(t.date) {
        if(weekDates.includes(t.date)) return true;
        if(weekOffset === 0 && t.status !== 'done') {
          const itemDate = dateToObj(t.date);
          const mon = getCurrentWeekMonday();
          if(itemDate < mon) return true;
        }
        return false;
      }
      // No date: check week field; if no week field, default to current week (weekOffset===0)
      if(t.week) {
        const todoMon = fmtDate(getMonday(dateToObj(t.week)));
        const viewMon = fmtDate(getCurrentWeekMonday());
        return todoMon === viewMon;
      }
      return weekOffset === 0;
    });

    const notDone = sortTodos(relevantTodos.filter(t=>t.status!=='done'));
    const done = relevantTodos.filter(t=>t.status==='done');

    const weekInfos = mod.infos.filter(i => infoInWeek(i, weekDates));
    const otherInfos = mod.infos.filter(i => !infoInWeek(i, weekDates));
    const totalInfos = mod.infos.length;

    h += `<div class="module-card">`;
    h += `<div class="module-head">`;
    h += `<div class="module-title"><span class="m-emoji">${mod.emoji}</span><span class="m-name">${mod.name}</span>${getModDiffClass(mod.id)}</div>`;
    h += `<div class="m-badges">`;
    if(notDone.length) h+=`<span class="badge todo-b">${notDone.length} 待办</span>`;
    if(done.length) h+=`<span class="badge done-b">${done.length} 完成</span>`;
    if(weekInfos.length) h+=`<span class="badge info-b">${weekInfos.length} 信息</span>`;
    h += `<button class="mod-del-btn" title="删除模块" onclick="event.stopPropagation();deleteModule('${mod.id}')">🗑️</button>`;
    h += `</div></div>`;

    h += `<div class="module-body" id="body-${mod.id}">`;

    // TODOS
    h += `<div class="todo-sort-zone" data-mod-id="${mod.id}" data-context="week">`;
    h += `<div class="sec-label"><span>📌 待办事项</span><button class="sec-add-btn" onclick="event.stopPropagation();addTodo('${mod.id}')">+ 新增</button></div>`;
    notDone.forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'week'); });
    h += `</div>`;
    if(done.length) {
      h += `<div class="sec-label" style="font-size:10px;padding:5px 20px"><span>✅ 已完成</span></div>`;
      done.forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'week'); });
    }

    // INFOS — latest 3 grouped by week, collapsible, with "more" if > 3
    h += `<div class="sec-label"><span>💬 信息备注</span><button class="sec-add-btn" onclick="event.stopPropagation();addInfo('${mod.id}')">+ 新增</button></div>`;

    if(totalInfos > 0) {
      // Sort all infos by week desc, then by array order desc (newest first)
      const allSorted = [...mod.infos].sort((a, b) => {
        const wa = a.week || '0000-00-00', wb = b.week || '0000-00-00';
        if(wa !== wb) return wb.localeCompare(wa);
        return mod.infos.indexOf(b) - mod.infos.indexOf(a);
      });
      const show3 = allSorted.slice(0, 3);

      // Group the 3 items by week, preserving order
      const curMonStr = fmtDate(getCurrentWeekMonday());
      const prevMon = new Date(getCurrentWeekMonday());
      prevMon.setDate(prevMon.getDate() - 7);
      const prevMonStr = fmtDate(prevMon);

      const groups = [];
      let lastWeek = null;
      show3.forEach(info => {
        const w = info.week || '';
        if(w !== lastWeek) {
          // Determine label
          let label;
          if(w === curMonStr) {
            label = '当周';
          } else if(w === prevMonStr) {
            label = '上周';
          } else if(w) {
            const wMon = dateToObj(w);
            const wSun = new Date(wMon); wSun.setDate(wMon.getDate() + 6);
            label = fmtDate(wMon) + ' ~ ' + fmtDate(wSun);
          } else {
            label = '未分类';
          }
          groups.push({ label, infos: [info] });
          lastWeek = w;
        } else {
          groups[groups.length - 1].infos.push(info);
        }
      });

      h += `<div class="prev-info-block">`;
      h += `<div class="prev-info-header" onclick="togglePrevInfos('${mod.id}')">`;
      h += `<span class="prev-info-arrow" id="prevArrow-${mod.id}">▼</span>`;
      h += `<span class="prev-info-label">最近备注（共 ${totalInfos} 条）</span>`;
      h += `</div>`;
      h += `<div class="prev-info-body" id="prevBody-${mod.id}">`;
      groups.forEach(g => {
        h += `<div class="info-week-label">${g.label}</div>`;
        g.infos.forEach(i => { h += infoRowHTML(i); });
      });
      if(totalInfos > 3) {
        h += `<div class="more-info-btn" onclick="openInfoDetail('${mod.id}')">查看全部备注 →</div>`;
      }
      h += `</div></div>`;
    }

    h += `</div></div>`;
  });

  // Add Module Card — 最后一张
  h += `<div class="add-module-card" onclick="openAddModuleModal()">`;
  h += `<div class="add-icon">+</div>`;
  h += `<div class="add-text">新增模块</div>`;
  h += `</div>`;

  h += '</div>';
  c.innerHTML = h;
  setTimeout(initAllTextareas, 10);
}

function todoRowHTML(t, weekDates, todayStr, context, hiddenSlotIds, slotLabel) {
  context = context || 'week';
  hiddenSlotIds = hiddenSlotIds || [];
  const isDone = t.status==='done';
  const isInSlot = hiddenSlotIds.includes(t.id);

  // In day view, hide todos that are already assigned to a time slot
  if(context === 'day' && !isDone && isInSlot) {
    return '';
  }

  const isToday = t.date && t.date === todayStr;
  const cls = ['row','todo'];
  if(isDone) cls.push('completed');

  // Version diff highlight
  const diffCls = getDiffClass(t.id, 'todo');
  if(diffCls) cls.push(diffCls.trim());

  // Only highlight in week view: today = blue, overdue = red
  if(context === 'week' && !isDone) {
    if(isToday) cls.push('today-hl');
    else if(t.date && t.date < todayStr) cls.push('overdue-hl');
  }

  // Make all undone todos draggable for reordering
  if(!isDone) cls.push('draggable-todo');

  let meta = '';
  if(t.date && context === 'week') {
    if(isToday) {
      meta += `<span class="tag date-tag" onclick="openDatePicker('${t.id}',event)" style="cursor:pointer" title="点击修改日期">📍 今天 ${t.date}</span>`;
    } else {
      const dt = dateToObj(t.date);
      const wd = ['日','一','二','三','四','五','六'];
      meta += `<span class="tag date-tag" onclick="openDatePicker('${t.id}',event)" style="cursor:pointer" title="点击修改日期">${t.date} 周${wd[dt.getDay()]}</span>`;
    }
  }
  // No date + week view → show assign date button
  if(!t.date && context === 'week' && !isDone) {
    meta += `<span class="tag no-date-tag" onclick="openDatePicker('${t.id}',event)">📅 分配日期</span>`;
  }
  if(t.autoDate && context === 'week') {
    meta += `<span class="tag auto-date-tag">🔍 自动识别</span>`;
  }
  if(t.status==='progress') meta += `<span class="tag prog-tag">进行中</span>`;
  if(t.note) meta += `<span class="tag note-tag">${esc(t.note)}</span>`;

  const draggable = !isDone ? ` draggable="true" ondragstart="onTodoDragStart(event,'${t.id}')"` : '';
  // In day view with draggable: default contenteditable=false, double-click to edit
  const isDayDraggable = (!isDone);
  const cedit = isDayDraggable ? 'false' : 'true';
  const editTrigger = isDayDraggable
    ? `ondblclick="enableRowEdit(this,'${t.id}')" onblur="disableRowEdit(this,'${t.id}')"`
    : `onblur="editTodoText('${t.id}',this.textContent)"`;

  return `
    <div class="${cls.join(' ')}" data-id="${t.id}"${draggable}>
      <div class="row-cb"><input type="checkbox" ${isDone?'checked':''} onchange="toggleTodo('${t.id}',this.checked)"/></div>
      <div class="row-body">
        <div class="row-text" contenteditable="${cedit}" ${editTrigger}>${esc(context === 'day' ? stripTimePrefix(t.text) : t.text)}</div>
        ${meta?`<div class="row-meta">${meta}</div>`:''}
      </div>
      <div class="row-actions">
        ${context === 'day' && !isDone ? `<button class="act-btn date-btn" onclick="openDatePickerDay('${t.id}',event)" title="修改日期">📅</button>` : ''}
        <button class="act-btn del" onclick="delTodo('${t.id}')" title="删除">✕</button>
      </div>
    </div>`;
}

function infoRowHTML(i) {
  const infoDiffCls = getDiffClass(i.id, 'info');
  return `
    <div class="row info ${i.highlighted?'highlighted':''} ${infoDiffCls.trim()}" data-id="${i.id}" data-type="info">
      <div class="info-dot"></div>
      <div class="row-body">

}

// RENDER — DAY
// ================================================================
function renderDay() {
  const c = document.getElementById('dayView');
  const d = new Date(NOW); d.setDate(d.getDate()+dayOffset);
  const ds = fmtDate(d);
  const wd = ['日','一','二','三','四','五','六'];
  const todayStr = getTodayStr();
  const weekDates = getCurrentWeekDates();

  let h = '';

  // Day Header
  h += `<div class="day-header fade-in"><div><div class="day-date">${d.getMonth()+1}月${d.getDate()}日</div><div class="day-sub">星期${wd[d.getDay()]}${dayOffset===0?' · 今天':''}</div></div><div class="day-nav"><button onclick="navDay(-1)">◀</button><button class="day-today-btn" onclick="navDay(0)" title="回到今天">今天</button><button onclick="navDay(1)">▶</button><button class="day-cal-btn" onclick="openDayCalendar(event)" title="选择日期">📅</button></div></div>`;

  // Collect all todos for this day grouped by module
  let found = false;
  const modGroups = [];
  MODULES.forEach(mod => {
    const items = mod.todos.filter(t => t.date === ds);
    if(!items.length) return;
    found = true;
    modGroups.push({ mod, items });
  });

  // Get time slot data and build hidden IDs set (todos already placed in slots)
  const slotData = getTimeSlots(ds);
  // Clean slot data: remove duplicate IDs and IDs referencing non-existent todos
  let slotDirty = false;
  ['morning','afternoon','evening'].forEach(k => {
    if(!slotData[k]) { slotData[k] = []; return; }
    const seen = new Set();
    slotData[k] = slotData[k].filter(id => {
      if(seen.has(id)) { slotDirty = true; return false; }
      seen.add(id);
      if(!findTodo(id)) { slotDirty = true; return false; }
      return true;
    });
  });
  if(slotDirty) setTimeSlots(ds, slotData);
  const allSlotIds = new Set([...slotData.morning, ...slotData.afternoon, ...slotData.evening]);

  // ---- Today's Todo List ----
  const allDayTodos = modGroups.flatMap(g => g.items);
  const unassignedNotDone = allDayTodos.filter(t => !allSlotIds.has(t.id) && t.status !== 'done');
  const doneTodos = allDayTodos.filter(t => t.status === 'done' && !allSlotIds.has(t.id));
  const showTodoSection = unassignedNotDone.length > 0 || doneTodos.length > 0 || !found;

  h += `<div class="day-section fade-in" id="todoListDropZone" ondragover="onTodoListDragOver(event)" ondragleave="onTodoListDragLeave(event)" ondrop="onTodoListDrop(event,'${ds}')">`;
  h += `<div class="day-section-head">`;
  h += `<div class="day-section-head-left"><span style="font-size:18px">📋</span><span class="m-name" style="font-size:14px;font-weight:700">今日待办</span></div>`;
  if(unassignedNotDone.length) h += `<span class="badge todo-b">${unassignedNotDone.length} 待办</span>`;
  if(doneTodos.length) h += `<span class="badge done-b">${doneTodos.length} 完成</span>`;
  h += `</div>`;

  // Quick Add Bar (inside todo section)
  h += `<div class="day-add-bar">`;
  h += `<select class="day-add-select" id="dayAddModule">`;
  MODULES.forEach(mod => {
    h += `<option value="${mod.id}">${mod.emoji} ${mod.name}</option>`;
  });
  h += `</select>`;
  h += `<input class="day-add-input" id="dayAddInput" placeholder="输入待办内容，回车添加…" onkeydown="if(event.key==='Enter'&&!event.isComposing&&!_isComposing){event.preventDefault();addTodoInDay();}"/>`;
  h += `<button class="day-add-submit" onclick="addTodoInDay()">添加</button>`;
  h += `</div>`;

  if(!found) {
    h += `<div style="text-align:center;padding:24px 0;color:var(--text-tri);font-size:13px">暂无待办，在上方输入框中快速新增</div>`;
  } else if(unassignedNotDone.length === 0 && doneTodos.length === 0) {
    h += `<div style="text-align:center;padding:16px 0;color:var(--text-tri);font-size:13px">✅ 全部已安排到时间段<br><span style="font-size:11px">从下方时间段拖回此处可取消安排</span></div>`;
  } else {
    modGroups.forEach(grp => {
      const visibleNotDone = grp.items.filter(t => !allSlotIds.has(t.id) && t.status !== 'done');
      const visibleDone = grp.items.filter(t => t.status === 'done' && !allSlotIds.has(t.id));
      if(visibleNotDone.length === 0 && visibleDone.length === 0) return;

      h += `<div class="todo-sort-zone" data-mod-id="${grp.mod.id}" data-context="day">`;
      h += `<div class="sec-label" style="font-size:10px;padding:5px 20px"><span>${grp.mod.emoji} ${grp.mod.name}</span><button class="sec-add-btn" onclick="event.stopPropagation();addTodoInDayForModule('${grp.mod.id}')">+ 新增</button></div>`;
      sortTodos(visibleNotDone).forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'day'); });
      h += `</div>`;
      visibleDone.forEach(t => { h += todoRowHTML(t, weekDates, todayStr, 'day'); });
    });
  }
  h += `</div>`;

  // ---- Time Planner (早中晚) ----
  h += `<div class="time-planner-title fade-in">⏰ 时间规划 <span class="tp-sub">拖拽待办到下方时段 · 也可从时段拖回待办区</span></div>`;
  h += `<div class="time-slots fade-in">`;

  const slotsConfig = [
    { key: 'morning', icon: '🌅', label: '上午', time: '09:00 - 12:00', cls: 'morning' },
    { key: 'afternoon', icon: '☀️', label: '下午', time: '14:00 - 18:00', cls: 'afternoon' },
    { key: 'evening', icon: '🌙', label: '晚上', time: '19:00 - 22:00', cls: 'evening' },
  ];

  slotsConfig.forEach(slot => {
    const ids = slotData[slot.key] || [];
    const items = ids.map(todoId => {
      const r = findTodo(todoId);
      if(!r) return null;
      return { id: todoId, text: r.todo.text, emoji: r.mod.emoji, modName: r.mod.name, status: r.todo.status };
    }).filter(Boolean);

    h += `<div class="time-slot ${slot.cls}" ondragover="onSlotDragOver(event)" ondragleave="onSlotDragLeave(event)" ondrop="onSlotDrop(event,'${slot.key}','${ds}')">`;
    h += `<div class="ts-header"><span class="ts-icon">${slot.icon}</span><span class="ts-label">${slot.label}</span><span class="ts-time">${slot.time}</span>`;
    if(items.length) h += `<span class="ts-count">${items.length}</span>`;
    h += `</div><div class="ts-body">`;

    if(!items.length) {
      h += `<div class="ts-empty"><div class="drop-icon">📥</div>拖拽待办到这里<button class="ts-add-btn" style="margin-top:8px" onclick="addTodoInSlot('${slot.key}','${ds}')">+ 新增待办</button></div>`;
    } else {
      items.forEach(item => {
        const isDone = item.status === 'done';
        const doneCls = isDone ? ' ts-done' : '';
        h += `<div class="ts-item${doneCls}" draggable="true" ondragstart="onTodoDragStart(event,'${item.id}')" data-id="${item.id}">`;
        h += `<div class="ts-cb"><input type="checkbox" ${isDone?'checked':''} onchange="toggleTodo('${item.id}',this.checked)"/></div>`;
        h += `<span class="ts-mod-tag" onclick="switchTodoModule('${item.id}',this,event)" style="cursor:pointer" title="点击切换项目">${item.emoji} ${item.modName}</span>`;
        h += `<span class="ts-item-text" contenteditable="false" ondblclick="enableSlotEdit(this,'${item.id}')" onblur="disableSlotEdit(this,'${item.id}')">${esc(stripTimePrefix(item.text))}</span>`;
        h += `<div class="ts-item-actions">`;
        h += `<button class="ts-item-date" onclick="openDatePickerSlot('${item.id}',event)" title="修改日期">📅</button>`;
        h += `<button class="ts-item-remove" onclick="removeFromSlot('${item.id}','${slot.key}','${ds}')" title="移回待办区">↩</button>`;
        h += `<button class="ts-item-del" onclick="delTodoFromSlot('${item.id}','${slot.key}','${ds}')" title="删除">✕</button>`;
        h += `</div>`;
        h += `</div>`;
      });
    }
    // Add button inside each time slot
    h += `<button class="ts-add-btn" onclick="addTodoInSlot('${slot.key}','${ds}')">+ 新增待办</button>`;
    h += `</div></div>`;
  });

  h += `</div>`;
  c.innerHTML = h;
}

// Add todo in day view — quick bar
function addTodoInDay() {
  const input = document.getElementById('dayAddInput');
  const select = document.getElementById('dayAddModule');
  const text = input.value.trim();
  if(!text) { input.focus(); return; }

  const modId = select.value;
  const mod = findMod(modId);
  if(!mod) return;

  const d = new Date(NOW); d.setDate(d.getDate()+dayOffset);
  const ds = fmtDate(d);

  const newId = uid();
  const newTodo = {id:newId, text:text, status:'pending', note:'', date:ds};

  // Auto-detect date from text (might override)
  const detected = detectDateFromItem(newTodo);
  if(detected) {
    newTodo.date = detected;
    newTodo.autoDate = true;
    const normalized = normalizeRelativeTimeInText(newTodo.text, detected);
    if(normalized !== newTodo.text) newTodo.text = normalized;
  }

  mod.todos.push(newTodo);
  saveState();
  input.value = '';
  renderDay();
  toast(`✅ 已添加到「${mod.emoji} ${mod.name}」`);
}

// Get the most recent week's infos for a module (when current week has none)

function togglePrevInfos(modId) {
  const body = document.getElementById('prevBody-' + modId);
  const arrow = document.getElementById('prevArrow-' + modId);
  if(!body) return;
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  if(arrow) arrow.textContent = isHidden ? '▼' : '▶';
}

// Returns { infos: [...], label: '上周' / '04/07 ~ 04/13' }
function getRecentInfosForModule(mod, currentWeekDates) {
  const curMon = getCurrentWeekMonday();
  // Search backwards up to 8 weeks
  for(let w = 1; w <= 8; w++) {
    const mon = new Date(curMon);
    mon.setDate(curMon.getDate() - 7 * w);
    const dates = [];
    for(let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate() + i); dates.push(fmtDate(d)); }
    const infos = mod.infos.filter(i => infoInWeek(i, dates));
    if(infos.length > 0) {
      // Build label: w===1 → "上周", otherwise "MM/DD ~ MM/DD"
      let label;
      if(w === 1) {
        label = '上周';
      } else {
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        label = `${fmtDate(mon)} ~ ${fmtDate(sun)}`;
      }
      return { infos, label };
    }
  }
  return { infos: [], label: '' };
}

let infoDetailModId = null;

function openInfoDetail(modId) {
  const mod = findMod(modId);
  if(!mod) return;
  infoDetailModId = modId;
  document.body.classList.add('show-info-detail');
  renderInfoDetailPage(mod);
  window.scrollTo(0,0);
}

function closeInfoDetail() {
  document.body.classList.remove('show-info-detail');
  infoDetailModId = null;
  renderWeek();
}

function renderInfoDetailPage(mod) {
  const c = document.getElementById('pageInfoDetail');
  const allInfos = mod.infos;

  let h = '';

  h += `<div class="info-detail-header fade-in">`;
  h += `<button class="info-back-btn" onclick="closeInfoDetail()">◀</button>`;
  h += `<div class="info-detail-title">`;
  h += `<span class="big-emoji">${mod.emoji}</span>`;
  h += `<span class="title-name">${mod.name}</span>`;
  h += `<span class="title-sub">· 全部信息备注（${allInfos.length} 条）</span>`;
  h += `</div>`;
  h += `<button class="info-detail-add" onclick="addInfoInDetail('${mod.id}')">+ 添加信息</button>`;
  h += `</div>`;

  if(!allInfos.length) {
    h += `<div class="info-empty-page fade-in"><div class="big-icon">📝</div><div>暂无信息备注</div></div>`;
    c.innerHTML = h;
    return;
  }

  const weekGroups = {};
  allInfos.forEach(i => {
    const wk = i.week || '04/14';
    const monDate = getMonday(dateToObj(wk));
    const key = fmtDate(monDate);
    if(!weekGroups[key]) weekGroups[key] = { monday: monDate, items: [] };
    weekGroups[key].items.push(i);
  });

  const sortedKeys = Object.keys(weekGroups).sort((a,b) => weekGroups[b].monday - weekGroups[a].monday);

  sortedKeys.forEach(key => {
    const grp = weekGroups[key];
    const label = getWeekLabelForMonday(grp.monday);

    h += `<div class="info-wk-card fade-in">`;
    h += `<div class="info-wk-header"><span>${label}</span><span class="range">${grp.items.length} 条</span></div>`;
    h += `<div class="info-wk-body">`;

    grp.items.forEach(i => {
      h += `<div class="info-row ${i.highlighted?'highlighted':''}" data-id="${i.id}">`;
      h += `<div class="dot"></div>`;
      h += `<textarea class="i-text i-text-area" rows="1" onblur="editInfoInDetail('${i.id}',this.value)" oninput="autoResizeTextarea(this)" placeholder="写点什么…">${esc(i.text)}</textarea>`;
      h += `<div class="i-actions">`;
      h += `<button class="act-btn ${i.highlighted?'hl-on':''}" onclick="hlInfoInDetail('${i.id}')" title="高亮">💡</button>`;
      h += `<button class="act-btn del" onclick="delInfoInDetail('${i.id}')" title="删除">✕</button>`;
      h += `</div></div>`;
    });

    h += `</div></div>`;
  });

  c.innerHTML = h;
  setTimeout(initAllTextareas, 10);
}

function editInfoInDetail(id, text) {
  const r = findInfo(id);
  if(!r) return;
  r.info.text = text.trim();
  saveState();
}

function hlInfoInDetail(id) {
  const r = findInfo(id);
  if(!r) return;
  r.info.highlighted = !r.info.highlighted;
  saveState();
  const mod = findMod(infoDetailModId);
  if(mod) renderInfoDetailPage(mod);
  toast('💡 高亮已切换');
}

let _delInfoDetailLock = false;
async function delInfoInDetail(id) {
  if(_delInfoDetailLock) return;
  _delInfoDetailLock = true;
  try {
    const ok = await showConfirm('确定要删除这条信息吗？');
    if(!ok) return;
    MODULES.forEach(m => { m.infos = m.infos.filter(i=>i.id!==id); });
    saveState();
    const mod = findMod(infoDetailModId);
    if(mod) renderInfoDetailPage(mod);
    toast('🗑️ 已删除');
  } finally {
    _delInfoDetailLock = false;
  }
}

function addInfoInDetail(modId) {
  const mod = findMod(modId);
  if(!mod) return;
  const newId = uid();
  const currentMonday = fmtDate(getCurrentWeekMonday());
  mod.infos.push({id:newId, text:'', highlighted:false, week:currentMonday});
  saveState();
  renderInfoDetailPage(mod);
  setTimeout(()=>{
    const el = document.querySelector(`#pageInfoDetail [data-id="${newId}"] .i-text-area`);
    if(el) { el.focus(); autoResizeTextarea(el); }
  }, 50);
  toast('➕ 已添加信息');
}

function switchView(v) {
  const fromView = currentView;
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('weekView').classList.toggle('active',v==='week');
  document.getElementById('dayView').classList.toggle('active',v==='day');
  document.getElementById('aiView').classList.toggle('active',v==='ai');

  // 切到 AI tab 时自动恢复配置和聚焦
  if (v === 'ai') {
    restoreAiConfig();
    setTimeout(() => document.getElementById('aiInputArea')?.focus(), 100);
  }

  // Day → Week: sync weekOffset to the week of the currently selected day
  if(v==='week' && fromView==='day') {
    const dayDate = new Date(NOW);
    dayDate.setDate(dayDate.getDate() + dayOffset);
    const dayMon = getMonday(dayDate);
    const thisMon = getMonday(NOW);
    weekOffset = Math.round((dayMon - thisMon) / (7*24*60*60*1000));
    document.getElementById('weekLabel').textContent = getWeekLabel();
  }
  // Week → Day: do NOT sync dayOffset (keep day view independent)

  if(v==='day') renderDay();
  if(v==='week') renderWeek();
}

// Switch a todo's module via a dropdown menu near the clicked tag
function switchTodoModule(todoId, tagEl, event) {
  event.stopPropagation();
  // Remove any existing menu
  const old = document.getElementById('modSwitchMenu');
  if(old) old.remove();

  const r = findTodo(todoId);
  if(!r) return;

  const menu = document.createElement('div');
  menu.id = 'modSwitchMenu';
  menu.style.cssText = 'position:fixed;z-index:9999;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:4px 0;min-width:140px;';
  const rect = tagEl.getBoundingClientRect();
  menu.style.left = rect.left + 'px';
  menu.style.top = (rect.bottom + 4) + 'px';

  MODULES.forEach(mod => {
    const item = document.createElement('div');
    const isCurrent = mod.id === r.mod.id;
    item.style.cssText = 'padding:8px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;' + (isCurrent ? 'background:var(--primary-soft);font-weight:600;' : '');
    item.innerHTML = `<span>${mod.emoji}</span><span>${mod.name}</span>${isCurrent ? '<span style="margin-left:auto;color:var(--primary)">✓</span>' : ''}`;
    item.onmouseenter = () => { if(!isCurrent) item.style.background = '#f5f5f5'; };
    item.onmouseleave = () => { if(!isCurrent) item.style.background = ''; };
    item.onclick = (e) => {
      e.stopPropagation();
      menu.remove();
      if(isCurrent) return;
      // Move todo from current module to target module
      const todo = r.todo;
      r.mod.todos = r.mod.todos.filter(t => t.id !== todoId);
      mod.todos.push(todo);
      saveState();
      if(currentView === 'day') renderDay();
      else renderWeek();
      toast(`📂 已移到「${mod.emoji} ${mod.name}」`);
    };
    menu.appendChild(item);
  });

  document.body.appendChild(menu);
  // Close on click outside
  setTimeout(() => {
    const closeHandler = (e) => {
      if(!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closeHandler); }
    };
    document.addEventListener('click', closeHandler);
  }, 0);
}

function editTodoText(id,text) {

      const el = document.querySelector(`[data-id="${id}"] .row-text`) || document.querySelector(`.ts-item[data-id="${id}"] .ts-item-text`);

// Centralized auto-detect date logic — used by editTodoText, oninput, and addTodo
function tryAutoDetectDate(todo) {
  const detected = detectDateFromItem(todo);
  if(detected && detected !== todo.date) {
    todo.date = detected;
    todo.autoDate = true;
    todo.week = fmtDate(getMonday(dateToObj(detected)));

    const normalized = normalizeRelativeTimeInText(todo.text, detected);
    if(normalized !== todo.text) {
      todo.text = normalized;
    }
    if(todo.note) {
      const normalizedNote = normalizeRelativeTimeInText(todo.note, detected);
      if(normalizedNote !== todo.note) todo.note = normalizedNote;
    }

    toast(`🔍 自动识别日期：${detected}`);
    saveState();
    setTimeout(()=>{ renderWeek(); if(currentView==='day') renderDay(); }, 100);
    return true;
  }
  return false;
}

// ================================================================
// DRAG & DROP for time planner
// ================================================================
let dragTodoId = null;

// --- Auto-scroll during drag (fixes "can't drag upward" bug) ---
let _dragScrollRAF = null;
const SCROLL_EDGE = 60;   // px from viewport edge to start scrolling
const SCROLL_SPEED = 12;  // px per frame

function _startDragScroll(clientY) {
  _stopDragScroll();
  const h = window.innerHeight;
  let delta = 0;
  if (clientY < SCROLL_EDGE) {
    delta = -SCROLL_SPEED * Math.max(0.3, 1 - clientY / SCROLL_EDGE);
  } else if (clientY > h - SCROLL_EDGE) {
    delta = SCROLL_SPEED * Math.max(0.3, 1 - (h - clientY) / SCROLL_EDGE);
  }
  if (delta !== 0 && dragTodoId) {
    window.scrollBy(0, delta);
    _dragScrollRAF = requestAnimationFrame(() => _startDragScroll(clientY));
  }
}

function _stopDragScroll() {
  if (_dragScrollRAF) { cancelAnimationFrame(_dragScrollRAF); _dragScrollRAF = null; }
}

// Global dragover drives auto-scroll (more reliable coordinates than 'drag' event)
document.addEventListener('dragover', function _autoScrollOnDragOver(e) {
  if (!dragTodoId) return;
  _startDragScroll(e.clientY);
});

function onTodoDragStart(event, todoId) {
  dragTodoId = todoId;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', todoId);
  setTimeout(() => {
    // Support both .row and .ts-item drag sources
    const el = event.target.closest('.row') || event.target.closest('.ts-item');
    if(el) el.classList.add('dragging');
  }, 0);
}

document.addEventListener('dragend', () => {
  _stopDragScroll();
  document.querySelectorAll('.row.dragging, .ts-item.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.time-slot.drag-over').forEach(el => el.classList.remove('drag-over'));
  // Clean up sort indicators
  document.querySelectorAll('.sort-indicator').forEach(el => el.remove());
  document.querySelectorAll('.todo-sort-zone.sort-drag-over').forEach(el => el.classList.remove('sort-drag-over'));
  dragTodoId = null;
});

// ================================================================
// DRAG & DROP for todo REORDERING (within a module's todo list)
// ================================================================
document.addEventListener('dragover', function(e) {
  const zone = e.target.closest('.todo-sort-zone');
  if(!zone) return;

  // Only handle if dragging a todo
  if(!dragTodoId) return;

  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  // Find the closest .row.todo to determine insertion point
  const rows = [...zone.querySelectorAll('.row.todo:not(.dragging)')];
  if(rows.length === 0) {
    zone.classList.add('sort-drag-over');
    return;
  }

  // Remove previous indicators
  zone.querySelectorAll('.sort-indicator').forEach(el => el.remove());

  // Find insertion point
  let insertBefore = null;
  for(const row of rows) {
    const rect = row.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    if(e.clientY < midY) {
      insertBefore = row;
      break;
    }
  }

  // Create indicator line
  const indicator = document.createElement('div');
  indicator.className = 'sort-indicator';
  if(insertBefore) {
    zone.insertBefore(indicator, insertBefore);
  } else {
    zone.appendChild(indicator);
  }
});

document.addEventListener('dragleave', function(e) {
  const zone = e.target.closest('.todo-sort-zone');
  if(zone && !zone.contains(e.relatedTarget)) {
    zone.classList.remove('sort-drag-over');
    zone.querySelectorAll('.sort-indicator').forEach(el => el.remove());
  }
});

// Shared sort-drop handler (used by both document-level drop and onTodoListDrop)
function handleSortDrop(e, zone, todoId) {
  // Only handle reordering drops here (not slot drops)
  const modId = zone.dataset.modId;
  if(!modId) return;

  // Check if this is a reorder within the same module's todo zone
  const draggedTodoResult = findTodo(todoId);
  if(!draggedTodoResult) return;

  // If different module, skip (let slot logic handle it)
  if(draggedTodoResult.mod.id !== modId) return;

  e.preventDefault();

  // Clean up indicators
  zone.querySelectorAll('.sort-indicator').forEach(el => el.remove());
  zone.classList.remove('sort-drag-over');

  // Get the current visible order of todo IDs in this zone
  const rows = [...zone.querySelectorAll('.row.todo:not(.dragging)')];
  const orderedIds = rows.map(r => r.dataset.id);

  // Find where the dragged item should go
  let insertIdx = orderedIds.length; // default: end
  for(let i = 0; i < rows.length; i++) {
    const rect = rows[i].getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    if(e.clientY < midY) {
      insertIdx = i;
      break;
    }
  }

  // Build new sorted ID list
  const finalOrder = [...orderedIds];
  // Remove dragged item if it's already in the list
  const existIdx = finalOrder.indexOf(todoId);
  if(existIdx !== -1) finalOrder.splice(existIdx, 1);
  // Insert at new position
  if(insertIdx > finalOrder.length) insertIdx = finalOrder.length;
  finalOrder.splice(insertIdx, 0, todoId);

  // Apply sortIndex to the module's todos based on this order
  const mod = draggedTodoResult.mod;
  finalOrder.forEach((id, idx) => {
    const t = mod.todos.find(x => x.id === id);
    if(t) t.sortIndex = idx;
  });

  saveState();
  if(currentView === 'week') renderWeek(); else renderDay();
  toast('↕️ 已调整顺序');
}

document.addEventListener('drop', function(e) {
  const zone = e.target.closest('.todo-sort-zone');
  if(!zone) return;

  const todoId = e.dataTransfer.getData('text/plain') || dragTodoId;
  if(!todoId) return;

  handleSortDrop(e, zone, todoId);
});

function onSlotDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const slot = event.target.closest('.time-slot');
  if(slot) slot.classList.add('drag-over');
}

function onSlotDragLeave(event) {

let _dropLock = false;
function onSlotDrop(event, slotKey, dateStr) {
  event.preventDefault();
  event.stopPropagation();
  const slot = event.target.closest('.time-slot');
  if(slot) slot.classList.remove('drag-over');

  if(_dropLock) return;
  const todoId = event.dataTransfer.getData('text/plain') || dragTodoId;
  if(!todoId) return;
  if(!findTodo(todoId)) return; // Don't add non-existent todo
  _dropLock = true;

  const slots = getTimeSlots(dateStr);
  if(!slots.morning) slots.morning = [];
  if(!slots.afternoon) slots.afternoon = [];
  if(!slots.evening) slots.evening = [];

  // Remove from all slots first
  ['morning','afternoon','evening'].forEach(k => {
    slots[k] = slots[k].filter(id => id !== todoId);
  });
  slots[slotKey].push(todoId);
  setTimeSlots(dateStr, slots);
  renderDay();
  _dropLock = false;

  const slotNames = { morning: '上午', afternoon: '下午', evening: '晚上' };
  toast(`⏰ 已安排到${slotNames[slotKey]}`);
}

// 规范化所有 info 的 week 字段
function normalizeInfoWeeks() {
  MODULES.forEach(mod => {
    mod.infos.forEach(i => {
      if(!i.week) {
        i.week = fmtDate(getMonday(NOW));
      } else {
        const d = dateToObj(i.week);
        const mon = getMonday(d);
        i.week = fmtDate(mon);
      }
    });
  });
}

// 补全 todo 的 week 字段（旧数据兼容）
function normalizeTodoWeeks() {
  MODULES.forEach(mod => {
    mod.todos.forEach(t => {
      if(!t.week) {
        // If todo has a date, derive week from date; otherwise default to current week
        if(t.date) {
          t.week = fmtDate(getMonday(dateToObj(t.date)));
        } else {
          t.week = fmtDate(getMonday(NOW));
        }
      }
    });
  });
}

function deduplicateTodos() {
  const seenTodoIds = new Set();
  MODULES.forEach(mod => {
    mod.todos = mod.todos.filter(t => {
      if(seenTodoIds.has(t.id)) return false;
      seenTodoIds.add(t.id);
      return true;
    });
  });
}

function autoDetectAllDates() {
  let autoFixed = 0;
  MODULES.forEach(mod => {
    mod.todos.forEach(t => {
      if(!t.date || t.date === '') {
        const detected = detectDateFromItem(t);
        if(detected) {
          t.date = detected;
          t.autoDate = true;
          const normalized = normalizeRelativeTimeInText(t.text, detected);
          if(normalized !== t.text) t.text = normalized;
          if(t.note) {
            const normalizedNote = normalizeRelativeTimeInText(t.note, detected);
            if(normalizedNote !== t.note) t.note = normalizedNote;
          }
          autoFixed++;
        }
      } else if(t.autoDate && t.date) {
        const detected = detectDateFromItem(t);
        if(detected && detected !== t.date) {
          t.date = detected;
          const normalized = normalizeRelativeTimeInText(t.text, detected);
          if(normalized !== t.text) t.text = normalized;
          if(t.note) {
            const normalizedNote = normalizeRelativeTimeInText(t.note, detected);
            if(normalizedNote !== t.note) t.note = normalizedNote;
          }
          autoFixed++;
        } else {
          const normalized = normalizeRelativeTimeInText(t.text, t.date);
          if(normalized !== t.text) t.text = normalized;
          if(t.note) {
            const normalizedNote = normalizeRelativeTimeInText(t.note, t.date);
            if(normalizedNote !== t.note) t.note = normalizedNote;
          }
        }
      }
    });
  });
  return autoFixed;
}

async function bootAppData() {
  // Reset state for clean boot
  MODULES = JSON.parse(JSON.stringify(DEFAULT_MODULES));
  _versions = [];
  _cloudReady = false;
  _userHasEdited = false;
  _localUpdatedAt = null;

  // Always start at current week's week-view (regardless of previous user's state)
  currentView = 'week';
  weekOffset = 0;
  dayOffset = 0;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'week'));
  document.getElementById('weekView').classList.add('active');
  document.getElementById('dayView').classList.remove('active');
  document.getElementById('aiView').classList.remove('active');
  document.getElementById('weekLabel').textContent = getWeekLabel();

  const result = await pullFromCloud({ silent: false, isInit: true });
  if(result.ok && result.updated) {
    // Got cloud data — use it
    restoreUidCounter();
    normalizeInfoWeeks(); normalizeTodoWeeks();
    deduplicateTodos();
    let autoFixed = autoDetectAllDates();
    if(autoFixed > 0) {
      setTimeout(() => toast(`🔍 自动识别了 ${autoFixed} 条待办的日期`), 500);
    }
    document.getElementById('weekLabel').textContent = getWeekLabel();
    if(currentView === 'week') renderWeek(); else renderDay();
    _cloudReady = true;
    showSyncStatus('saved');
    console.log('✅ Cloud data loaded. updated_at=' + _localUpdatedAt);
  } else if(result.ok && !result.updated) {
    // Cloud exists but local is same or newer — load from localStorage
    if(loadState()) {
      normalizeInfoWeeks(); normalizeTodoWeeks(); deduplicateTodos(); autoDetectAllDates();
      if(currentView === 'week') renderWeek(); else renderDay();
    }
    _cloudReady = true;
    showSyncStatus('saved');
  } else {
    // Cloud not available — fallback to localStorage (offline mode)
    if(loadState()) {
      normalizeInfoWeeks(); normalizeTodoWeeks(); deduplicateTodos(); autoDetectAllDates();
      if(currentView === 'week') renderWeek(); else renderDay();
      console.log('📴 Using localStorage fallback (offline mode)');
    }
    _cloudReady = true;
    _pendingSync = _userHasEdited;
    showSyncStatus('offline');
    console.log('⚠️ Cloud load failed, using offline data');
  }
  // Load version history in background
  loadVersions().then(() => console.log(`📸 ${_versions.length} version(s) loaded`));
}

// Convert File/Blob → base64 data URL
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

## ⚠️ 首要规则：区分"指令"和"内容"

用户输入框里的文字可能包含两种信息：
1. **指令**：告诉你如何处理截图/内容的操作要求（如"周三提醒我""加个备注""放到XX模块"）
2. **内容**：需要被提取为事项的实际信息

**判断方法**：
- 如果用户文字是在**指挥你怎么做**（含"提醒我""帮我""增加备注""放到""标记为"等），这是指令，不要把指令本身变成一条待办
- 如果用户文字是在**描述一件事**（含具体的工作内容、会议、任务等），这是内容，需要提取
- 当同时有指令 + 截图时：**从截图中提取事项，按指令中的要求设置日期/备注/模块等属性**

**示例**：
- 用户写"周三周四提醒，增加备注" + 贴了截图 → 指令是"设日期为周三/周四，给每条事项加详细备注"，内容来自截图
- 用户写"明天下午3点开会讨论方案" → 这是内容，提取为待办
- 用户写"把这个加到产品模块" + 贴了截图 → 指令是"放入产品模块"，内容来自截图

## 可用模块
${moduleDescriptions}

## 模块分类策略
1. **如果用户指令指定了模块**，直接用指定的模块
2. **优先看已有内容示例**：如果某个模块已有的 todo 和新事项属于同一类话题/工作领域，就放进那个模块
3. **其次看模块名**：根据模块名的语义判断
4. **实在匹配不上**：放入第一个模块 "${MODULES[0] ? MODULES[0].id : 'inbox'}" 作为收件箱

## 输出格式
输出一个 JSON 数组，每个元素包含：
- "type": "todo"（需要执行/跟进/关注的事项）或 "info"（值得记住的问题、结论、认知）
- "module": 最匹配的模块 ID（从上面的列表选择）
- "text": 事项的简洁描述，不超过 30 字
- "date": 截止日期或发生日期，格式 "MM/DD"（例如 "04/21"），没有则为 ""
- "note": 关键上下文信息，包括背景原因、前置依赖、决策逻辑等，不超过 100 字，没有则为 ""

## note 字段的写法
note 不是简单复述标题，而是补充"为什么"和"关键细节"：
- ✅ "入口是红点推送的前置依赖，没有入口被推了红点不会生效。需先把入口放量到100%，过1天再推红点" — 解释了因果关系和执行顺序
- ✅ "等插件页跳转定位需求上线后再推。入口放量是前置条件" — 说明了前置条件
- ❌ "图片1内容" — 没有任何信息量
- ❌ "预计周三/周四" — 这只是把日期重复了一遍

## type 判断规则
### todo（需要行动的事项）
- 含有"要做/记得/别忘了/deadline/提交/完成/安排/准备/跟进/推进/关注" → todo
- 有明确行动动词（做/写/改/发/约/确认/检查/整理） → todo
- 面试、会议、约会等有时间点的事项 → todo
- 需要关注某个问题的进展 → todo

### info（值得记住的认知/结论/问题，但不需要直接行动）
- 纯信息记录、新闻、动态 → info
- ⚠️ 如果不确定是否值得记录为 info，就不要生成这条 info

### ⚠️ info 的核心原则：提炼问题本质，不记录案例细节
记录的是**这件事反映出的问题/认知/结论**，而不是复述原始内容中的具体案例、环境信息或技术参数。
好的 info 示例：
  ✅ "语音转文字后用户手动修改的词不生效" — 提炼了问题本质
  ❌ "安卓正式环境，uin:884813085，转字结果错误" — 这是在抄案例细节
环境信息（系统版本、uin、时间戳等）只是调试素材，不应出现在 text 字段中，可放入 note。

## 截图/聊天记录处理
- 截图通常是工作聊天记录、bug 反馈、日程表等
- **关键**：理解截图在讨论什么事情，提取需要关注/需要做的事
- **详细备注**：从截图中提取关键的决策逻辑、因果关系、前置条件等写入 note 字段
- 忽略 UI 元素（按钮、导航栏、头像、时间戳等）
- **来源追踪**：如果能从用户文字或截图中识别出来源（群名、频道名、发言人），在 note 开头标注"来自：xxx"；识别不出就不要编造

## 日期识别
- "明天" = ${todayStr} 的下一天，"周X" = 本周的星期X，"下周X" = 下周的星期X，"X月X日" 直接转换
- 如果用户指令中指定了日期（如"周三提醒"），所有从截图提取的事项都应用这个日期
- 如果截图内容中也有时间信息，优先用用户指令中的时间

## 重要
- 只输出 JSON 数组，不要任何其他文字、解释或 markdown 标记
- 一条消息中可能包含多个事项，请拆分为多个 JSON 对象
- 如果消息内容模糊，倾向于标记为 todo（宁多勿漏）
- 宁少勿滥：如果一条事项既不需要行动，其问题本质也不值得记住，就不要生成
- **绝对不要把用户的操作指令本身变成一条待办事项**`;
}

// --- Call LLM API (text only — images pre-processed via OCR) ---
async function callLLM(userText) {
  const cfg = loadAiConfig();
  if (!cfg.apiUrl || !cfg.apiKey) {
    throw new Error('请先配置 API URL 和 API Key（点击 ⚙️ 配置 API）');
  }

  const systemPrompt = buildAiSystemPrompt();

  const body = {
    model: cfg.modelName || 'deepseek-chat',
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userText }
    ],
    temperature: 0.1,
    max_tokens: 2000
  };

  const resp = await fetch(cfg.apiUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${cfg.apiKey}`
    },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`API 请求失败 (${resp.status}): ${errText.substring(0, 200)}`);
  }

  const data = await resp.json();

  let content = '';
  if (data.choices && data.choices[0]) {
    content = data.choices[0].message?.content || data.choices[0].text || '';
  } else if (data.content) {
    content = typeof data.content === 'string' ? data.content : JSON.stringify(data.content);
  } else if (data.result) {
    content = typeof data.result === 'string' ? data.result : JSON.stringify(data.result);
  }

  content = content.trim();
  if (content.startsWith('```')) {
    content = content.replace(/^```(?:json)?\s*/, '').replace(/\s*```$/, '');
  }

  try {
    const items = JSON.parse(content);
    return Array.isArray(items) ? items : [items];
  } catch(e) {
    throw new Error('AI 返回的格式无法解析，请重试。原始响应：' + content.substring(0, 200));
  }
}

// --- OCR: extract text from images using Tesseract.js ---
async function ocrImages(dataUrls) {
  if (!dataUrls || dataUrls.length === 0) return '';
  if (typeof Tesseract === 'undefined') {
    throw new Error('OCR 组件加载失败，请刷新页面重试');
  }

  const results = [];
  for (let i = 0; i < dataUrls.length; i++) {
    try {
      const { data: { text } } = await Tesseract.recognize(dataUrls[i], 'chi_sim+eng', {
        logger: () => {} // silent
      });
      if (text && text.trim()) {
        results.push(`[图片${i+1}内容]:\n${text.trim()}`);
      }
    } catch(e) {
      console.error('OCR failed for image', i, e);
      results.push(`[图片${i+1}]: OCR 识别失败`);
    }
  }
  return results.join('\n\n');
}

// --- Parse button handler (OCR images → merge text → LLM) ---
async function aiParse() {
  const text = document.getElementById('aiInputArea').value.trim();
  const hasImages = _aiImages.length > 0;

  if (!text && !hasImages) {
    toast('请输入文字或上传截图');
    document.getElementById('aiInputArea').focus();
    return;
  }

  const btn = document.getElementById('aiParseBtn');
  const btnText = document.getElementById('aiParseBtnText');
  const errEl = document.getElementById('aiErrorMsg');

  btn.disabled = true;
  errEl.classList.remove('show');

  try {
    // Step 1: OCR images if any
    let finalText = text;
    if (hasImages) {
      btnText.innerHTML = '<span class="ai-spin">⏳</span> 识别图片…';
      const ocrText = await ocrImages(_aiImages);
      if (ocrText) {
        finalText = finalText ? finalText + '\n\n' + ocrText : ocrText;
      }
    }

    if (!finalText.trim()) {
      throw new Error('图片中未识别到文字，请手动输入或换一张清晰的截图');
    }

    // Step 2: Send merged text to LLM
    btnText.innerHTML = '<span class="ai-spin">⏳</span> AI 解析中…';
    const items = await callLLM(finalText);
    _aiParsedItems = items.map((item, i) => ({
      _idx: i,
      type: item.type === 'info' ? 'info' : 'todo',
      module: item.module || (MODULES[0] ? MODULES[0].id : ''),
      text: item.text || '未识别内容',
      date: item.date || '',
      note: item.note || ''
    }));
    renderAiPreview();
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btnText.textContent = '✨ 解析';
  }
}

// --- Render preview cards ---
function renderAiPreview() {
  const container = document.getElementById('aiPreviewCards');
  const wrapper = document.getElementById('aiPreview');

  if (!_aiParsedItems.length) {
    wrapper.style.display = 'none';
    return;
  }

  wrapper.style.display = 'block';
  document.getElementById('aiPreviewCount').textContent = `(${_aiParsedItems.length} 条)`;

  let html = '';
  _aiParsedItems.forEach((item, i) => {
    const mod = findMod(item.module);
    const modEmoji = mod ? mod.emoji : '📥';
    const modName = mod ? mod.name : item.module;
    const typeLabel = item.type === 'todo' ? '待办' : '信息';
    const typeClass = item.type === 'todo' ? 'type-todo' : 'type-info';

    html += `<div class="ai-preview-card" data-ai-idx="${i}" id="aiCard${i}">
      <span class="ai-pc-icon">${modEmoji}</span>
      <div class="ai-pc-body">
        <div class="ai-pc-text" id="aiCardText${i}">${escHtml(item.text)}</div>
        <div class="ai-pc-meta">
          <span class="ai-pc-tag ${typeClass}">${typeLabel}</span>
          <span class="ai-pc-tag mod-tag">${modName}</span>
          ${item.date ? `<span class="ai-pc-tag date-tag">📅 ${item.date}</span>` : ''}
        </div>
        ${item.note ? `<div class="ai-pc-note" style="font-size:11px;color:var(--text-tri);margin-top:4px;">${escHtml(item.note)}</div>` : ''}
        <div class="ai-pc-edit-form" id="aiEditForm${i}" style="display:none;"></div>
      </div>
      <div class="ai-pc-actions">
        <button class="ai-pc-edit" onclick="openAiEdit(${i})" title="编辑">✏️</button>
        <button class="ai-pc-remove" onclick="removeAiItem(${i})" title="移除">✕</button>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function removeAiItem(idx) {
  _aiParsedItems.splice(idx, 1);
  renderAiPreview();
  if (!_aiParsedItems.length) {
    document.getElementById('aiPreview').style.display = 'none';
  }
}

function openAiEdit(idx) {
  const item = _aiParsedItems[idx];
  if (!item) return;
  const form = document.getElementById('aiEditForm' + idx);
  if (!form) return;

  // Build module options
  const modOpts = MODULES.map(m =>
    `<option value="${m.id}" ${m.id === item.module ? 'selected' : ''}>${m.emoji} ${m.name}</option>`
  ).join('');

  form.innerHTML = `
    <div class="ai-pc-edit-row">
      <label>内容</label>
      <input type="text" id="aiEditText${idx}" value="${escAttr(item.text)}" placeholder="事项描述">
    </div>
    <div class="ai-pc-edit-row">
      <label>备注</label>
      <input type="text" id="aiEditNote${idx}" value="${escAttr(item.note || '')}" placeholder="补充信息">
    </div>
    <div class="ai-pc-edit-row">
      <label>模块</label>
      <select id="aiEditMod${idx}">${modOpts}</select>
    </div>
    <div class="ai-pc-edit-row">
      <label>类型</label>
      <select id="aiEditType${idx}">
        <option value="todo" ${item.type === 'todo' ? 'selected' : ''}>待办</option>
        <option value="info" ${item.type === 'info' ? 'selected' : ''}>信息</option>
      </select>
    </div>
    <div class="ai-pc-edit-row">
      <label>日期</label>
      <input type="text" id="aiEditDate${idx}" value="${escAttr(item.date || '')}" placeholder="MM/DD 或留空">
    </div>
    <div class="ai-pc-edit-actions">
      <button class="ai-pc-edit-cancel" onclick="cancelAiEdit(${idx})">取消</button>
      <button class="ai-pc-edit-save" onclick="saveAiEdit(${idx})">保存</button>
    </div>
  `;
  form.style.display = 'flex';
}

function saveAiEdit(idx) {
  const item = _aiParsedItems[idx];
  if (!item) return;
  item.text = (document.getElementById('aiEditText' + idx)?.value || '').trim() || item.text;
  item.note = (document.getElementById('aiEditNote' + idx)?.value || '').trim();
  item.module = document.getElementById('aiEditMod' + idx)?.value || item.module;
  item.type = document.getElementById('aiEditType' + idx)?.value || item.type;
  item.date = (document.getElementById('aiEditDate' + idx)?.value || '').trim();
  renderAiPreview();
}

function cancelAiEdit(idx) {
  const form = document.getElementById('aiEditForm' + idx);
  if (form) { form.style.display = 'none'; form.innerHTML = ''; }
}

function escAttr(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function clearAiPreview() {
  _aiParsedItems = [];
  document.getElementById('aiPreview').style.display = 'none';
  document.getElementById('aiPreviewCards').innerHTML = '';
}

// --- Confirm & write to MODULES ---
function aiConfirmAll() {
  if (!_aiParsedItems.length) return;

  let addedCount = 0;
  const weekMonday = fmtDate(getCurrentWeekMonday());

  _aiParsedItems.forEach(item => {
    let mod = findMod(item.module);
    if (!mod && MODULES.length > 0) {
      mod = MODULES[0]; // fallback to first module
    }
    if (!mod) return;

    const newId = uid();

    if (item.type === 'todo') {
      const todoObj = {
        id: newId,
        text: item.text,
        status: 'pending',
        note: item.note || '',
        date: item.date || '',
        week: weekMonday
      };
      // Auto-detect date from text if not provided by AI
      if (!todoObj.date) {
        const detected = parseTimeFromText(todoObj.text, null);
        if (detected) todoObj.date = detected;
      }
      mod.todos.push(todoObj);
    } else {
      mod.infos.push({
        id: newId,
        text: item.text + (item.note ? '\n' + item.note : ''),
        highlighted: false,
        week: weekMonday
      });
    }
    addedCount++;
  });

  if (addedCount > 0) {
    saveState();
    if (currentView === 'week') renderWeek(); else renderDay();
    toast(`✅ 已添加 ${addedCount} 条事项`);
  }

  // Clean up
  clearAiPreview();
  document.getElementById('aiInputArea').value = '';
  _aiImages = [];
  renderAiImagePreviews();
  closeAiPanel();
}

  restoreAiConfig();
  initAiImageDragDrop();
